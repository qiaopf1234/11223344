<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运维月报生成器</title>
<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
}
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16233e 50%, #0f1a30 100%);
  color: #e0e0e0;
  overflow-x: hidden;
}

/* 粒子背景 */
#tsparticles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* 科技发光卡片容器 */
.container {
  max-width: 900px;
  margin: 50px auto;
  padding: 35px;
  background: rgba(22, 33, 62, 0.6);
  border-radius: 20px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(114, 237, 242, 0.2);
  box-shadow: 0 0 30px rgba(114, 237, 242, 0.15), 0 8px 32px rgba(0, 0, 0, 0.4);
  position: relative;
  z-index: 1;
  transition: all 0.3s ease;
}
.container:hover {
  box-shadow: 0 0 40px rgba(114, 237, 242, 0.25);
}

/* 科技渐变发光标题 */
h2 {
  text-align: center;
  margin-bottom: 35px;
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(90deg, #72edf2, #5151e5, #ee00ff, #72edf2);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleGradient 6s linear infinite;
}
@keyframes titleGradient {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.item {
  margin-bottom: 26px;
}

label {
  display: block;
  margin-bottom: 10px;
  font-weight: 500;
  color: #c0cfff;
  font-size: 15px;
}

/* 发光输入框 */
input, textarea {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid rgba(114, 237, 242, 0.25);
  border-radius: 10px;
  font-size: 15px;
  background: rgba(255, 255, 255, 0.04);
  color: #fff;
  transition: all 0.3s ease;
  backdrop-filter: blur(4px);
}
input:focus, textarea:focus {
  outline: none;
  border-color: #72edf2;
  box-shadow: 0 0 18px rgba(114, 237, 242, 0.3);
  background: rgba(255, 255, 255, 0.08);
  transform: translateY(-1px);
}

/* 动态边框下拉框 */
select {
  width: 100%;
  padding: 14px 18px;
  border: 1px solid rgba(114, 237, 242, 0.3);
  border-radius: 10px;
  font-size: 15px;
  background: #141a35;
  color: #ffffff;
  transition: all 0.3s ease;
  cursor: pointer;
}
select:focus {
  outline: none;
  border-color: #72edf2;
  box-shadow: 0 0 18px rgba(114, 237, 242, 0.3);
  background: #182042;
}
select option {
  background: #141a35;
  color: #fff;
}

.date-row {
  display: flex;
  gap: 15px;
}
.date-row .item {
  flex: 1;
}

.btn-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

/* 霓虹发光按钮 */
button {
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.1);
  transition: left 0.4s;
}
button:hover::before {
  left: 100%;
}

.btn-blue {
  background: linear-gradient(90deg, #5151e5, #72edf2);
  color: white;
  box-shadow: 0 0 12px rgba(114, 237, 242, 0.3);
}
.btn-blue:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(114, 237, 242, 0.5);
}

.btn-green {
  background: linear-gradient(90deg, #00b894, #55efc4);
  color: white;
  box-shadow: 0 0 12px rgba(85, 239, 196, 0.3);
}
.btn-green:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(85, 239, 196, 0.5);
}

.btn-gray {
  background: linear-gradient(90deg, #636e72, #b2bec3);
  color: white;
  box-shadow: 0 0 12px rgba(178, 190, 195, 0.3);
}
.btn-gray:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(178, 190, 195, 0.5);
}

.btn-red {
  background: linear-gradient(90deg, #d63031, #ff7675);
  color: white;
  box-shadow: 0 0 12px rgba(255, 118, 117, 0.3);
}
.btn-red:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(255, 118, 117, 0.5);
}

textarea {
  resize: vertical;
  min-height: 120px;
  border-radius: 10px;
}

::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

/* ======================= */
/* ✨ uiverse 风格年份选择器 */
/* ======================= */
.glass-selector {
  position: relative;
  width: 100%;
}
.year-select {
  width: 100%;
  padding: 14px 40px 14px 18px;
  border-radius: 10px;
  font-size: 15px;
  background: rgba(20, 26, 53, 0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(114, 237, 242, 0.35);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
  appearance: none;
  -webkit-appearance: none;
}
.year-select:focus {
  outline: none;
  border-color: #72edf2;
  box-shadow: 0 0 20px rgba(114, 237, 242, 0.35);
  background: rgba(24, 32, 66, 0.85);
}
.year-select option {
  background: #141a35;
  color: #fff;
}
.glass-selector::after {
  content: "▼";
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: rgba(114, 237, 242, 0.8);
  pointer-events: none;
  transition: transform 0.3s;
}
.glass-selector:hover::after {
  transform: translateY(-50%) rotate(180deg);
}
</style>
</head>

<body>

<!-- 粒子背景 -->
<div id="tsparticles"></div>

<div class="container">
  <h2>运维月报生成器</h2>

  <div class="item">
    <label>选择/自定义报告标题</label>
    <select id="titleSel">
      <option value="教育厅基础教育大数据服务平台">教育厅基础教育大数据服务平台</option>
      <option value="教育厅机关智能化管理平台、学生体质健康监测数据管理平台、民办机构管理系统运维服务">多系统模式</option>
      <option value="自定义">手动自定义输入</option>
    </select>
  </div>
  <div class="item" id="titleInputBox" style="display:none;">
    <input type="text" id="customTitle" placeholder="请手动输入报告主标题">
  </div>

  <div class="date-row">
    <div class="item">
      <label>报告年份</label>
      <div class="glass-selector">
        <select id="reportYear" class="year-select"></select>
      </div>
    </div>
    <div class="item">
      <label>报告月份</label>
      <select id="reportMonth">
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05" selected>5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
  </div>

  <div class="date-row">
    <div class="item">
      <label>开始日期</label>
      <input type="date" id="startDate">
    </div>
    <div class="item">
      <label>结束日期</label>
      <input type="date" id="endDate">
    </div>
  </div>

  <div class="item">
    <label>本月工作内容（可编辑修改模板）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyWork()">复制</button>
      <button class="btn-gray" onclick="cutWork()">剪切</button>
      <button class="btn-red" onclick="resetTemplate()">恢复默认模板</button>
    </div>
    <textarea id="mainWork" placeholder="系统工作模板内容"></textarea>
  </div>

  <div class="item">
    <label id="eventLabel">运维事件记录表（粘贴字段：事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyEvent()">复制</button>
      <button class="btn-gray" onclick="cutEvent()">剪切</button>
      <button class="btn-red" onclick="clearEvent()">清空</button>
    </div>
    <textarea id="eventList" placeholder="直接从Excel整行粘贴数据"></textarea>
  </div>

  <div class="item" style="text-align:center;">
    <button class="btn-blue" onclick="generateAndExport()">生成并导出 Word 总结报告</button>
  </div>
</div>

<script>
const defaultTemplate = ``;
document.getElementById('mainWork').value = defaultTemplate;
const titleSel = document.getElementById('titleSel');
const titleInputBox = document.getElementById('titleInputBox');
const eventLabel = document.getElementById('eventLabel');

// ===== 自动生成年份：2020–2030，默认选中今年 =====
const yearSelect = document.getElementById('reportYear');
const currentYear = new Date().getFullYear();
for (let y = 2020; y <= 2030; y++) {
  const opt = document.createElement('option');
  opt.value = y;
  opt.textContent = y + '年';
  if (y === currentYear) opt.selected = true;
  yearSelect.appendChild(opt);
}

function updateLabel() {
  let val = titleSel.value;
  titleInputBox.style.display = val === '自定义' ? 'block' : 'none';
  if (val === '自定义' || val.indexOf('、') > -1) {
    eventLabel.innerText = '运维事件记录表（粘贴字段：系统名称、事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）';
  } else {
    eventLabel.innerText = '运维事件记录表（粘贴字段：事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）';
  }
}
titleSel.addEventListener('change', updateLabel);
updateLabel();

function fmt(dateStr){
  if(!dateStr) return '';
  let d=new Date(dateStr);
  let y=d.getFullYear();
  let m=String(d.getMonth()+1).padStart(2,'0');
  let d2=String(d.getDate()).padStart(2,'0');
  return `${y}年${m}月${d2}日`;
}

function splitLine(str){
  return str.trim().split(/\t/);
}

function copyWork(){
  let t=document.getElementById('mainWork');
  t.select();document.execCommand('copy');alert('复制成功');
}
function cutWork(){
  let t=document.getElementById('mainWork');
  t.select();document.execCommand('cut');alert('剪切成功');
}
function resetTemplate(){
  document.getElementById('mainWork').value = defaultTemplate;
  alert('已恢复默认工作模板');
}

function copyEvent(){
  let t=document.getElementById('eventList');
  t.select();document.execCommand('copy');alert('复制成功');
}
function cutEvent(){
  let t=document.getElementById('eventList');
  t.select();document.execCommand('cut');alert('剪切成功');
}
function clearEvent(){
  document.getElementById('eventList').value='';
}

function generateAndExport(){
  let titleSelVal = titleSel.value;
  let mainTitle = titleSelVal === '自定义' ? document.getElementById('customTitle').value.trim() : titleSel.value;
  const isMultiSys = (titleSelVal === '自定义') || (mainTitle.indexOf('、') > -1);

  let reportYear = document.getElementById('reportYear').value;
  let reportMonth = document.getElementById('reportMonth').value;
  let start=document.getElementById('startDate').value;
  let end=document.getElementById('endDate').value;

  let startStr = fmt(start);
  let endStr = fmt(end);
  let periodText = `（${startStr}-${endStr}）`;
  let monthText = `${reportMonth.replace('0','')}月`;
  let titleLine1 = `${mainTitle}${reportYear}年${reportMonth.replace('0','')}月月度总结报告`;

  let mainWorkContent = document.getElementById('mainWork').value.trim();
  mainWorkContent = mainWorkContent.replace(/^本月/g, monthText);

  let eventLines = document.getElementById('eventList').value.trim().split('\n').filter(x=>x.trim());
  let eventRows = '';

  eventLines.forEach((line,idx)=>{
    let arr = splitLine(line);
    let xh = idx+1;
    let sysName, nr, zt, dw, xq, rq, clr;

    if(isMultiSys){
      sysName = arr[0] || '';
      nr = arr[1] || '';
      zt = arr[3] || '';
      dw = arr[4] || '';
      xq = arr[5] || '';
      rq = arr[6] || '';
      clr = arr[7] || '';

      eventRows += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xh}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${sysName}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${nr}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${zt}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dw}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${rq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${clr}</td>
      </tr>`;
    }else{
      nr = arr[0] || '';
      zt = arr[2] || '';
      dw = arr[3] || '';
      xq = arr[4] || '';
      rq = arr[5] || '';
      clr = arr[6] || '';

      eventRows += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xh}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${nr}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${zt}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dw}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${rq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${clr}</td>
      </tr>`;
    }
  });

  let tableHead = '';
  if(isMultiSys){
    tableHead = `<tr>
      <th>序号</th>
      <th>系统名称</th>
      <th>事件内容</th>
      <th>完成状态</th>
      <th>服务对象</th>
      <th>需求提出</th>
      <th>处理日期</th>
      <th>处理人</th>
    </tr>`;
  }else{
    tableHead = `<tr>
      <th>序号</th>
      <th>事件内容</th>
      <th>完成状态</th>
      <th>服务对象</th>
      <th>需求提出</th>
      <th>处理日期</th>
      <th>处理人</th>
    </tr>`;
  }

  let html=`<html
xmlns:v="urn:schemas-microsoft-com:vml"
xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns:m="http://schemas.microsoft.com/office/2004/12/omml"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<![if gte mso 9]><xml>
<w:WordDocument>
  <w:View>Print</w:View>
  <w:Zoom>100</w:Zoom>
</w:WordDocument>
</xml><![endif]>
<style>
body{margin:0;padding:20px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
.main-title-line1, .main-title-line2{
  font-family:"方正小标宋简体";
  font-size:22pt;
  font-weight:normal;
  text-align:center;
}
.main-title-line1{
  margin-bottom:5px;
}
.main-title-line2{
  margin-bottom:20px;
}
.main-content p{
  font-family:"仿宋";
  font-size:16pt;
  line-height:1.5;
  text-indent:2em;
  margin:0 0 8px 0;
}
.sub-title{
  font-family:"黑体";
  font-size:16pt;
  font-weight:normal;
  margin:15px 0 8px 0;
  text-indent:0;
}
th{
  font-family:宋体;
  font-size:11pt;
  border:1px solid #333;padding:6px;text-align:center;background:#f5f5f5;
}
</style>
</head>
<body>

<div class="main-title-line1">${titleLine1}</div>
<div class="main-title-line2">${periodText}</div>

<div class="sub-title">一、本月工作</div>
<div class="main-content">
  ${mainWorkContent.split('\n').map(p => `<p>${p}</p>`).join('')}
</div>

<div class="sub-title">二、服务配合与支撑</div>
<table>
  ${tableHead}
  ${eventRows}
</table>

</body>
</html>`;

  let fileName = `${mainTitle}${reportYear}年${reportMonth.replace('0','')}月月度总结报告.doc`;
  let blob=new Blob([html],{type:'application/msword'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;
  a.download=fileName;
  a.click();
  URL.revokeObjectURL(url);
}
</script>

<!-- 高级粒子背景 -->
<script type="module">
import { tsParticles } from "https://cdn.jsdelivr.net/npm/@tsparticles/engine@3.0.3/+esm";
import { loadAll } from "https://cdn.jsdelivr.net/npm/@tsparticles/all@3.0.3/+esm";

async function loadParticles(options) {
  await loadAll(tsParticles);
  await tsParticles.load({ id: "tsparticles", options });
}

const configs = {
  particles: {
    number: { value: 50, density: { enable: true } },
    color: { value: "#72edf2" },
    effect: { type: "trail", options: { trail: { fade: true, length: 8 } } },
    shape: { type: "circle" },
    size: { value: 3 },
    move: {
      path: { enable: true, options: { size: 15, increment: 0.002 }, generator: "simplexNoise" },
      enable: true,
      speed: { min: 1, max: 4 }
    }
  },
  background: { color: "transparent" }
};

loadParticles(configs);
</script>

</body>
</html>
