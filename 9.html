<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学校账号生成工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:#f4f5f7;font-family:"Microsoft Yahei",sans-serif;}
.box{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 8px #eee;}
h2{text-align:center;margin-bottom:20px;color:#333;}
.row{margin:12px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
label{display:inline-block;width:90px;font-weight:bold;color:#555;}
input, textarea{padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;}
input[type="text"]{width:280px;}
input[type="number"]{width:100px;}
iframe{width:100%;height:420px;border:1px solid #ddd;border-radius:6px;margin:10px 0;}
.btn{padding:9px 20px;background:#2d8cf0;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-right:10px;}
.btn:hover{background:#1b76d8;}
textarea#pinyinInput, textarea#resultBox{width:100%;min-height:80px;resize:vertical;}
.tip{font-size:13px;color:#666;margin-top:5px;}
</style>
</head>
<body>
<div class="box">
    <h2>学校账号生成工具</h2>

    <div class="row">
        <label>固定前缀：</label>
        <input type="text" id="prefix" value="byz_">
    </div>

    <div class="row">
        <label>固定后缀：</label>
        <input type="text" id="suffix" value="_">
        <label style="width:auto;margin-left:10px;">生成数量：</label>
        <input type="number" id="count" value="1" min="1" max="999">
    </div>

    <div class="row">
        <label>拼音结果：</label>
        <textarea id="pinyinInput" placeholder="请在这里粘贴从hzzpy.net复制出来的拼音（如fk）"></textarea>
    </div>

    <!-- 内嵌原网站拼音工具 -->
    <iframe src="https://www.hzzpy.net/" frameborder="0"></iframe>

    <div class="row">
        <button class="btn" onclick="generate()">生成账号名称</button>
        <button class="btn" onclick="copyResult()">复制结果</button>
        <button class="btn" onclick="clearAll()">清空</button>
    </div>

    <div class="row">
        <label>生成结果：</label>
        <textarea id="resultBox" readonly placeholder="生成的账号会显示在这里..."></textarea>
    </div>

    <div class="tip">
        使用说明：<br>
        1. 在上方内嵌网站输入汉字，转换成拼音并复制；<br>
        2. 把拼音粘贴到“拼音结果”输入框中；<br>
        3. 可修改前缀、后缀和生成数量；<br>
        4. 点击「生成账号名称」即可批量生成；<br>
        5. 点击「复制结果」一键复制所有账号。
    </div>
</div>

<script>
function generate(){
    const prefix = document.getElementById('prefix').value.trim();
    const suffix = document.getElementById('suffix').value.trim();
    const pinyin = document.getElementById('pinyinInput').value.trim();
    const count = parseInt(document.getElementById('count').value) || 1;

    if(!pinyin){
        alert("请先粘贴从hzzpy.net复制的拼音！");
        return;
    }

    let results = [];
    for(let i=1;i<=count;i++){
        results.push(prefix + pinyin + suffix + i);
    }

    document.getElementById('resultBox').value = results.join('\n');
}

function copyResult(){
    const text = document.getElementById('resultBox').value;
    if(!text){
        alert("暂无内容可复制");
        return;
    }
    navigator.clipboard.writeText(text).then(()=>{
        alert("已复制到剪贴板");
    }).catch(()=>{
        // 兼容旧浏览器
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert("已复制到剪贴板");
    });
}

function clearAll(){
    document.getElementById('prefix').value = 'byz_';
    document.getElementById('suffix').value = '_';
    document.getElementById('count').value = '1';
    document.getElementById('pinyinInput').value = '';
    document.getElementById('resultBox').value = '';
}
</script>
</body>
</html>
