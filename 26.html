<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>漏洞处置报告生成器 · 赛博星云版</title>
<style>
/* ========== 全局重置 & 基础 ========== */
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
}
body {
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  background: #0a0c12;
  color: #e2e8f0;
  overflow-x: hidden;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 隐藏原2D粒子画布，使用Three.js星云 */
#particles-canvas {
  display: none !important;
}

/* Three.js 星云画布 */
#bg-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: radial-gradient(circle at 20% 30%, #0a0a1a, #020308);
  pointer-events: none;
}

/* 鼠标跟随光晕层 */
.mouse-glow {
  position: fixed;
  width: 450px;
  height: 450px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 999;
  transition: transform 0.05s linear;
  will-change: transform;
}

/* ========== 毛玻璃主容器 ========== */
.wrap {
  max-width: 1400px;
  width: 100%;
  display: grid;
  grid-template-columns: 520px 1fr;
  gap: 24px;
  position: relative;
  z-index: 20;
  margin: 0 auto;
}

/* 左右面板毛玻璃卡片 */
.panel {
  background: rgba(15, 25, 45, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 32px;
  border: 1px solid rgba(139, 92, 246, 0.35);
  box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
  padding: 28px;
  transition: transform 0.25s ease, box-shadow 0.3s ease;
}
.panel:hover {
  transform: translateY(-4px);
  border-color: rgba(139, 92, 246, 0.7);
  box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.25) inset;
}

/* 标题霓虹渐变 */
h2 {
  text-align: center;
  margin: 0 0 24px;
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.3px;
}

/* 表单元素 */
.form-item {
  margin-bottom: 18px;
}
label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  color: #c084fc;
  font-size: 0.85rem;
  letter-spacing: 0.5px;
}
input, textarea {
  width: 100%;
  padding: 10px 14px;
  background: rgba(10, 18, 30, 0.7);
  border: 1.5px solid rgba(139, 92, 246, 0.4);
  border-radius: 14px;
  font-size: 0.9rem;
  color: #e2e8f0;
  transition: all 0.2s ease;
  outline: none;
}
input:focus, textarea:focus {
  border-color: #8b5cf6;
  box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
  background: rgba(20, 32, 50, 0.85);
}
textarea {
  resize: vertical;
  font-family: 'Fira Code', monospace;
  min-height: 80px;
  line-height: 1.5;
}
input[type="date"] {
  color-scheme: dark;
  color: #ffffff;
}
::placeholder {
  color: #5c6f87;
}

/* 霓虹流光按钮 */
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 40px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
  background: linear-gradient(95deg, #06b6d4, #8b5cf6);
  color: #e0e7ff;
  margin-top: 10px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(4px);
}
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
  transition: left 0.5s ease;
}
.btn:hover::before {
  left: 100%;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
  color: white;
}

/* ========== 右侧预览面板（保留原有表格样式，底色改为半透明） ========== */
.preview-box {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(4px);
  padding: 30px;
  border-radius: 20px;
  border: 1px solid rgba(139, 92, 246, 0.25);
}
.preview-title {
  font-family: "方正小标宋简体", "SimHei", sans-serif;
  font-size: 22pt;
  text-align: center;
  margin: 0 auto 20px;
  font-weight: normal;
  color: #ffffff;
  text-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
}
.preview-table {
  width: 100%;
  border-collapse: collapse;
  font-family: "仿宋_GB2312", "SimSun", serif;
  font-size: 14pt;
  font-weight: normal;
}
.preview-table td {
  border: 1px solid rgba(139, 92, 246, 0.4);
  padding: 10px 12px;
  vertical-align: top;
  font-weight: normal;
  color: #f0f6ff;
}
.preview-table td:first-child {
  width: 22%;
  background: rgba(139, 92, 246, 0.15);
  text-align: center;
  font-weight: normal;
  color: #c084fc;
}

/* ========== 滚动条 ========== */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: #0f172a;
  border-radius: 8px;
}
::-webkit-scrollbar-thumb {
  background: #8b5cf6;
  border-radius: 8px;
}

/* ========== 响应式 ========== */
@media (max-width: 900px) {
  .wrap {
    grid-template-columns: 1fr;
    gap: 20px;
  }
  .panel {
    padding: 20px;
  }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- 原2D粒子画布（已隐藏，保留JS不报错） -->
<canvas id="particles-canvas" style="display:none;"></canvas>

<div class="wrap">
  <!-- 左侧表单 -->
  <div class="panel">
    <h2>漏洞处置报告录入</h2>
    <div class="form-item">

  </div>

  <!-- 右侧实时预览 -->
  <div class="panel">
    <h2>实时预览效果</h2>
    <div class="preview-box" id="previewWrap">
      <div style="text-align:center;">
        <div class="preview-title" id="previewTitle">漏洞处置报告（编号：GZ-20251015）</div>
      </div>
      <table class="preview-table" id="previewTable">
        <tr>
          <td>项目</td>
          <td>内容</td>
        </tr>
        <tr>
          <td>系统名称</td>
          <td id="p-sysName"></td>
        </tr>
        <tr>
          <td>漏洞模块</td>

<!-- Three.js 星云粒子背景（紫青粉三色） -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03050b);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 14);
camera.lookAt(0, 0, 0);

// 主粒子群 (紫罗兰)
const particleCount = 2100;
const geom = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 38;
  positions[i*3+1] = (Math.random() - 0.5) * 24;
  positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
}
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
const particleSys = new THREE.Points(geom, particleMat);
scene.add(particleSys);

// 第二层粒子 (青色)
const geom2 = new THREE.BufferGeometry();
const pos2 = new Float32Array(1400 * 3);
for (let i = 0; i < 1400; i++) {
  pos2[i*3] = (Math.random() - 0.5) * 44;
  pos2[i*3+1] = (Math.random() - 0.5) * 28;
  pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
}
geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
const particleSys2 = new THREE.Points(geom2, mat2);
scene.add(particleSys2);

// 第三层粒子 (粉晶)
const geom3 = new THREE.BufferGeometry();
const pos3 = new Float32Array(900 * 3);
for (let i = 0; i < 900; i++) {
  pos3[i*3] = (Math.random() - 0.5) * 48;
  pos3[i*3+1] = (Math.random() - 0.5) * 30;
  pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
}
geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
const particleSys3 = new THREE.Points(geom3, mat3);
scene.add(particleSys3);

// 装饰环
const ringCount = 380;
const ringGeo = new THREE.BufferGeometry();
const ringPositions = new Float32Array(ringCount * 3);
for (let i = 0; i < ringCount; i++) {
  const angle = (i / ringCount) * Math.PI * 2;
  const r = 5.2;
  ringPositions[i*3] = Math.cos(angle) * r;
  ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
  ringPositions[i*3+2] = -1.8;
}
ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
scene.add(ringPoints);

scene.fog = new THREE.FogExp2(0x03050b, 0.008);

let targetCamX = 0, targetCamY = 0;
window.addEventListener('mousemove', (e) => {
  let mx = (e.clientX / window.innerWidth) * 2 - 1;
  let my = (e.clientY / window.innerHeight) * 2 - 1;
  targetCamX = mx * 0.9;
  targetCamY = my * 0.6;
});

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.007;
  particleSys.rotation.y = time * 0.06;
  particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
  particleSys2.rotation.y = time * 0.04;
  particleSys3.rotation.x = time * 0.03;
  ringPoints.rotation.z = time * 0.12;
  camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
  camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
window.addEventListener('resize', onResize);
animate();
</script>

<script>

<!-- ========== 以下为原始业务逻辑（一字未改） ========== -->
<script>
// 原2D粒子物理效果（保留但画布已隐藏）
const canvasOrig = document.getElementById('particles-canvas');
const ctxOrig = canvasOrig.getContext('2d');
let width, height, particles = [];
function resizeCanvasOrig(){
  width = canvasOrig.width = window.innerWidth;
  height = canvasOrig.height = window.innerHeight;
}
resizeCanvasOrig();
window.addEventListener('resize', resizeCanvasOrig);
class ParticleOrig{
  constructor(){this.reset()}
  reset(){
    this.x = Math.random()*width;
    this.y = Math.random()*height;
    this.size = Math.random()*1.5+0.5;
    this.speedX = (Math.random()-0.5)*0.3;
    this.speedY = (Math.random()-0.5)*0.3;
    this.opacity = Math.random()*0.5+0.2;
  }
  update(){
    this.x += this.speedX;
    this.y += this.speedY;
    if(this.x<0||this.x>width||this.y<0||this.y>height) this.reset();
  }
  draw(){
    ctxOrig.fillStyle = `rgba(138,138,255,${this.opacity})`;
    ctxOrig.beginPath();
    ctxOrig.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctxOrig.fill();
  }
}
for(let i=0;i<80;i++) particles.push(new ParticleOrig());
function connectParticles(){
  for(let a=0;a<particles.length;a++){
    for(let b=a;b<particles.length;b++){
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dis = Math.sqrt(dx*dx+dy*dy);
      if(dis<120){
        ctxOrig.strokeStyle = `rgba(138,138,255,${0.15*(1-dis/120)})`;
        ctxOrig.lineWidth = 0.5;
        ctxOrig.beginPath();
        ctxOrig.moveTo(particles[a].x,particles[a].y);
        ctxOrig.lineTo(particles[b].x,particles[b].y);
        ctxOrig.stroke();
      }
    }
  }
}
function animateOrig(){
  ctxOrig.clearRect(0,0,width,height);
  particles.forEach(p=>{p.update();p.draw()});
  connectParticles();
  requestAnimationFrame(animateOrig);
}
animateOrig();

// --- 日期格式化 ---
function formatDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}年${m}月${day}日`;
}

// --- 实时预览同步 ---
const inputs = [
  {id:'reportDate', previewId:'previewTitle', type:'title'},
  {id:'sysName', previewId:'p-sysName'},
  {id:'bugModule', previewId:'p-bugModule'},
  {id:'bugTimeDate', previewId:'p-bugTime', type:'date'},
  {id:'proposer', previewId:'p-proposer'},
  {id:'handler', previewId:'p-handler'},
  {id:'bugDesc', previewId:'p-bugDesc'},
  {id:'bugReason', previewId:'p-bugReason'},
  {id:'dealProcess', previewId:'p-dealProcess'},
  {id:'dealResult', previewId:'p-dealResult'},
];
inputs.forEach(item=>{
  const el = document.getElementById(item.id);
  el.addEventListener('input',()=>{
    if(item.type === 'title'){
      const val = el.value.replace(/-/g,'');
      document.getElementById(item.previewId).innerText = `漏洞处置报告（编号：GZ-${val}）`;
    }else if(item.type === 'date'){
      document.getElementById(item.previewId).innerText = formatDate(el.value);
    }else{
      document.getElementById(item.previewId).innerText = el.value || '（无）';
    }
  })
});

// --- 导出Word（完全保留原逻辑）---
function exportWord(){
  const reportDateRaw = document.getElementById('reportDate').value;
  const reportDateNum = reportDateRaw.replace(/-/g,'');
  const sysName = document.getElementById('sysName').value;
  const bugModule = document.getElementById('bugModule').value;
  const bugTimeRaw = document.getElementById('bugTimeDate').value;
  const bugTimeShow = formatDate(bugTimeRaw);
  const proposer = document.getElementById('proposer').value;
  const handler = document.getElementById('handler').value;
  const bugDesc = document.getElementById('bugDesc').value;
  const bugReason = document.getElementById('bugReason').value;
  const dealProcess = document.getElementById('dealProcess').value;
  const dealResult = document.getElementById('dealResult').value;

  const html = `
<!DOCTYPE html>
<html xmlns:w="urn:schemas-microsoft-com:office:word">
<head>
<meta charset="utf-8">
<xml>
<w:WordDocument>
<w:View>Print</w:View>
<w:Zoom>100</w:Zoom>
</w:WordDocument>
</xml>
<style>
body{padding:30px;}
.title-box{text-align:center;margin-bottom:24px;}
.main-title{
  font-family:"方正小标宋简体";
  font-size:22pt;
  font-weight:normal;
}
table{width:100%;border-collapse:collapse;font-family:"仿宋_GB2312";font-size:14pt;font-weight:normal;}
td{border:1px solid #333;padding:10px 12px;vertical-align:top;font-weight:normal;}
td:first-child{width:22%;background:#f8f8f8;text-align:center;font-weight:normal;}
</style>
</head>
<body>
<div class="title-box">
  <div class="main-title">漏洞处置报告（编号：GZ-${reportDateNum}）</div>
</div>
<table>
  <tr><td>项目</td><td>内容</td></tr>
  <tr><td>系统名称</td><td>${sysName}</td></tr>
  <tr><td>漏洞模块</td><td>${bugModule}</td></tr>
  <tr><td>漏洞发生时间</td><td>${bugTimeShow}</td></tr>
  <tr><td>漏洞提出人员</td><td>${proposer}</td></tr>
  <tr><td>处理人</td><td>${handler}</td></tr>
  <tr><td>漏洞现象描述</td><td>${bugDesc}</td></tr>
  <tr><td>漏洞原因分析</td><td>${bugReason}</td></tr>
  <tr><td>处置过程</td><td>${dealProcess}</td></tr>
  <tr><td>处置结果</td><td>${dealResult}</td></tr>
  <tr>
    <td>运维人员签字</td>
    <td></td>
  </tr>
  <tr>
    <td>甲方确认签字</td>
    <td></td>
  </tr>
</table>
</body>
</html>
`;
  const blob = new Blob([html], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `漏洞处置报告_GZ-${reportDateNum}.doc`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
