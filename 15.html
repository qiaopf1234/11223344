    <style type="text/tailwindcss">

<body class="px-4 py-6 md:px-10 md:py-10">

                        <textarea id="batchOrgList" rows="3" class="fluid-input w-full rounded-fluid-sm p-2 text-sm resize-v" placeholder="苏尼特左旗教育局
锡林郭勒盟教育局"></textarea>

        <div class="text-right mb-8 text-fluidOrange text-xs opacity-70">

<script>
// 粒子动画
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let particles = [];
const particleColors = ['rgba(0,153,255,', 'rgba(255,153,68,', 'rgba(153,119,221,'];
function resizeCanvas(){width=window.innerWidth;height=window.innerHeight;canvas.width=width;canvas.height=height;}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
class Particle{constructor(){this.x=Math.random()*width;this.y=Math.random()*height;this.radius=Math.random()*2.6+0.3;this.speedX=(Math.random()-0.5)*0.45;this.speedY=(Math.random()-0.5)*0.45;this.opacity=Math.random()*0.38+0.08;this.color=particleColors[Math.floor(Math.random()*particleColors.length)];}update(){this.x+=this.speedX;this.y+=this.speedY;if(this.x<0)this.x=width;if(this.x>width)this.x=0;if(this.y<0)this.y=height;if(this.y>height)this.y=0;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fillStyle=`${this.color}${this.opacity})`;ctx.fill();}}
function initParticles(c=80){particles=[];for(let i=0;i<c;i++)particles.push(new Particle());}
initParticles();
function animateParticles(){ctx.clearRect(0,0,width,height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animateParticles);}
animateParticles();

// 全局变量
let resultData = [];
const KEY = "global_serial_no";
let orgMapping = [];
let schoolList = [];
let excelLoadSuccess = false;
let schoolExcelSuccess = false;
let matchDebounceTimer = null;
let eduDebounceTimer = null;

const roleList = [
    "超级管理员", "特级管理员", "二级管理员", "重置密码", "教育厅制证二级管理员", "教育厅管理员", "校服系统管理员",
    "教育装备自治区管理人员", "盟市管理员", "普通角色", "测试角色", "基教处证照设置人员", "u-key登录",
    "购买校服举报", "违规招生举报", "违规征订教材", "我和我的老师", "老师，我想对您说", "我心中的好老师",
    "教育世家", "随手拍", "师德师风", "举报反馈", "校园餐", "校外培训", "校园餐投诉举报", "教师减负",
    "补课举报", "报平安人员", "报平安发布统计", "调查问卷", "教师资格证审批", "教师资格证申请", "竞赛单位", "教育局竞赛单位填报审核人员",
    "职业技术学校批量编辑", "批量编辑", "义务教育和高中教育学校证照制作负责人", "个人签名负责人", "学校盖章负责人",
    "手动导入学号并制高中毕业证", "职业技术学校证照制作负责人", "教育局数据审核人员", "基教处数据审核", "教育局盖章人员",
    "教育局证照签发确定人员", "校服管理", "报告学校角色", "报告旗县角色", "报告盟市角色", "学校校服上报", "教育局校服备案"
];

function updateOrgFileStatus(text, colorClass, icon){
    const dom=document.getElementById("orgFileStatus");
    dom.className=`fluid-frosted rounded-fluid-sm py-2 px-4 inline-block text-sm ${colorClass}`;
    dom.innerHTML=`<i class="fa ${icon} mr-1"></i>${text}`;
}

async function loadSchoolList(){
    try{
        const res=await fetch("./school_list.xlsx");
        if(!res.ok)throw new Error("文件不存在");
        const buf=await res.arrayBuffer();
        const wb=XLSX.read(buf,{type:"array"});
        const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
        const names=new Set();
        json.forEach(row=>row.forEach(cell=>{if(cell&&String(cell).trim())names.add(String(cell).trim());}));
        schoolList=Array.from(names);
        schoolExcelSuccess=true;
        return true;
    }catch(e){schoolExcelSuccess=false;schoolList=[];return false;}
}

async function loadOrgMapping(){
    updateOrgFileStatus("并行加载 org-map.xlsx、school_list.xlsx ...","text-warnYellow","fa-spinner fa-spin");
    const [orgRes,schoolOk]=await Promise.all([
        (async ()=>{
            try{
                const res=await fetch("./org-map.xlsx");
                if(!res.ok)throw new Error("文件不存在");
                const buf=await res.arrayBuffer();
                const wb=XLSX.read(buf,{type:"array"});
                const json=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(json.length===0||!json[0].parent_name||!json[0].org_name)throw new Error("表头缺失parent_name/org_name");
                orgMapping=json.map(i=>({belongOrg:i.org_name.trim(),superOrg:i.parent_name.trim()})).filter(i=>i.belongOrg&&i.superOrg);
                excelLoadSuccess=true;
                return true;
            }catch(e){excelLoadSuccess=false;orgMapping=[];return e.message;}
        })(),
        loadSchoolList()
    ]);
    let tip="";
    tip+=typeof orgRes==="string"?`org-map失败:${orgRes};`:`org-map成功(${orgMapping.length}条);`;
    tip+=schoolOk?`school_list成功(${schoolList.length}个单位)`:`school_list加载失败，学校模糊匹配失效`;
    updateOrgFileStatus(tip,schoolOk?"text-successGreen":"text-dangerRed","fa-check-circle");
}

// ==========【原有学校匹配整套函数完全保留，无任何修改】==========
function fuzzySearchSchool(keyword){
    if(!schoolExcelSuccess||!schoolList.length)return null;
    const kw=keyword.trim().replace(/[\s　\t\n]/g,"");
    if(!kw)return null;
    const weightKeys=["教育局","教体局","中学","小学","幼儿园","职校","一中","二中","三中","旗","区","市"];
    const highTail=["教育局","教体局"];
    const pool=[];
    schoolList.forEach(full=>{
        const clean=full.trim().replace(/[\s　\t\n]/g,"");
        let weight=0;
        if(clean === kw) weight += 100;
        if(clean.includes(kw)) weight += 80;
        if(kw.includes(clean)) weight += 40;
        weightKeys.forEach(k=>{if(clean.includes(k)) weight += 8;if(kw.includes(k)) weight += 12;});
        highTail.forEach(t=>{if(clean.endsWith(t)) weight += 30;if(kw.endsWith(t)) weight += 20;});
        weight += clean.length;
        weight -= Math.abs(clean.length - kw.length) / 2;
        pool.push({name: full, weight: weight});
    });
    if(!pool.length)return null;
    pool.sort((a,b)=>b.weight - a.weight);
    return pool[0].name;
}
function getSuperByBelong(rawName){
    const rawTrim=rawName.trim();
    const rawClean=rawTrim.replace(/[\s　\t\n]/g,"");
    const exactMatch = orgMapping.find(item=>{
        const orgClean = item.belongOrg.trim().replace(/[\s　\t\n]/g,"");
        return orgClean === rawClean;
    });
    if(exactMatch){
        return {
            standardName: exactMatch.belongOrg,
            super: exactMatch.superOrg,
            fuzzy: false,
            noMatch: false
        };
    }
    const stdFullName = fuzzySearchSchool(rawTrim);
    if(!stdFullName){
        return {
            standardName: rawTrim,
            super: null,
            fuzzy: false,
            noMatch: true
        };
    }
    const dbItem = orgMapping.find(item=>item.belongOrg.trim() === stdFullName.trim());
    return {
        standardName: stdFullName,
        super: dbItem ? dbItem.superOrg : null,
        fuzzy: true,
        noMatch: !dbItem
    };
}

// ==========【新增：教育局独立单表匹配函数，仅上方面板调用】==========
function eduFuzzyMatch(keyword){
    if(!excelLoadSuccess||!orgMapping.length)return null;
    const kw = keyword.trim().replace(/\s+/g,"");
    const highPriority = ["内蒙古自治区","盟","旗","市","教育局","教体局"];
    const pool = [];
    orgMapping.forEach(row=>{
        const cleanOrg = row.belongOrg.trim().replace(/\s+/g,"");
        let weight = 0;
        if(cleanOrg === kw) weight += 200;
        if(cleanOrg.includes(kw)) weight += 100;
        highPriority.forEach(word=>{
            if(cleanOrg.includes(word) || kw.includes(word)) weight += 25;
        });
        if(cleanOrg.endsWith("教育局") || cleanOrg.endsWith("教体局")) weight += 80;
        weight -= Math.abs(cleanOrg.length - kw.length) / 3;
        pool.push({
            orgRow: row,
            weight: weight
        });
    });
    pool.sort((a,b)=>b.weight - a.weight);
    return pool[0]?.orgRow || null;
}
function eduGetSuperInfo(rawInput){
    const targetRow = eduFuzzyMatch(rawInput);
    if(!targetRow){
        return {
            matchSuccess: false,
            inputName: rawInput,
            standardName: null,
            superOrg: null
        };
    }
    return {
        matchSuccess: true,
        inputName: rawInput,
        standardName: targetRow.belongOrg,
        superOrg: targetRow.superOrg,
        isExact: targetRow.belongOrg.trim().replace(/\s+/g,"") === rawInput.trim().replace(/\s+/g,"")
    };
}

// 拆分单行语法：上级、机构、自定义角色、自定义分类码
function parseUnitLine(lineText){
    const raw=lineText.trim();
    let customRole="",customCode="",mainPart=raw;
    const parts=raw.split("||").map(s=>s.trim());
    if(parts.length>=3){
        mainPart=parts[0];
        customRole=parts[1];
        customCode=parts[2];
    }else if(parts.length===2){
        mainPart=parts[0];
        customRole=parts[1];
    }
    let fixSuper="",unitName=mainPart;
    if(mainPart.includes("|")){
        const arr=mainPart.split("|").map(s=>s.trim());
        fixSuper=arr[0];
        unitName=arr[1];
    }
    return {fixSuper,unitName,customRole,customCode};
}

// 教育局批量输入框实时匹配预览（独立单表逻辑）
function eduRealTimeMatch(){
    clearTimeout(eduDebounceTimer);
    eduDebounceTimer=setTimeout(()=>{
        const eduRawList=document.getElementById("batchOrgList").value.split("\n").map(i=>i.trim()).filter(Boolean);
        const defaultSuper=document.getElementById("superOrg").value.trim();
        const batchRole=document.getElementById("batchRoleSel").value;
        const batchCode=document.getElementById("batchCodeSel").value;
        const box=document.getElementById("eduMatchBox");
        if(!eduRawList.length){
            box.innerHTML="<span class='text-fluidTextMuted'>输入教育局名称实时预览匹配结果（仅读取org-map表）</span>";
            return;
        }
        let html="",missing=0;
        eduRawList.forEach((name,idx)=>{
            const res = eduGetSuperInfo(name);
            if(!res.matchSuccess){
                missing++;
                html += `<div class="mb-1 text-dangerRed">${idx+1}.【库内无该教育局】输入「${name}」，无匹配标准全称，将使用兜底上级</div>`;
                return;
            }
            const matchLabel = res.isExact ? `<span class="text-successGreen">教育局精准匹配(org-map单表)</span>` : `<span class="text-matchCyan">教育局简写模糊匹配(org-map单表)</span>`;
            html += `<div class="mb-1">${idx+1}.${matchLabel}：输入「${res.inputName}」→全称「${res.standardName}」 上级：${res.superOrg}`;
            html += ` <span class="text-lineRolePurple">[待选角色:${batchRole||"未选择统一角色"}]</span>`;
            html += ` <span class="text-lineCodeGreen">[待选分类码:${batchCode||"未选择统一分类码"}]</span></div>`;
        });
        if(missing>0) html = `<div class="text-dangerRed mb-1">${missing}个教育局在org-map表无匹配条目，将使用兜底上级</div>` + html;
        box.innerHTML = html;
    },300);
}

// 批量教育局生成函数
function genBatchTemplate(){
    const orgText=document.getElementById("batchOrgList").value;
    const batchRole=document.getElementById("batchRoleSel").value.trim();
    const batchCode=document.getElementById("batchCodeSel").value.trim();
    const orgArr=orgText.split("\n").map(s=>s.trim()).filter(Boolean);
    if(!orgArr.length)return alert("请填写批量教育局名称列表");
    if(!batchRole) return alert("请从下拉选择统一角色");
    if(!batchCode) return alert("请从下拉选择统一分类码");
    const lines=orgArr.map(name=>`${name}||${batchRole}||${batchCode}`);
    const targetBox=document.getElementById("unitList");
    targetBox.value = (targetBox.value.trim() ? targetBox.value.trim()+"\n" : "") + lines.join("\n");
    realTimeMatchPreview();
    alert(`已生成${orgArr.length}条教育局行并追加到下方机构框`);
}

// ==========【核心修改：realTimeMatchPreview 函数（方案A修复提示文字）】==========
function realTimeMatchPreview(){
    clearTimeout(matchDebounceTimer);
    matchDebounceTimer=setTimeout(()=>{
        const unitRawList=document.getElementById("unitList").value.split("\n").map(i=>i.trim()).filter(Boolean);
        const defaultSuper=document.getElementById("superOrg").value.trim();
        const defRole=document.getElementById("roleSel").value;
        const defCode=document.getElementById("typeCode").value.trim();
        const box=document.getElementById("realTimeMatchBox");
        if(!unitRawList.length){
            box.innerHTML="<span class='text-fluidTextMuted'>输入学校/机构实时预览匹配（school_list+org-map双表逻辑）；教育局请使用上方独立面板</span>";
            return;
        }
        let html="",missing=0;
        unitRawList.forEach((rawLine,idx)=>{
            const p=parseUnitLine(rawLine);
            const {fixSuper,unitName,customRole,customCode}=p;
            let dispSuper,stdName,isFuzzy=false;
            if(fixSuper){
                dispSuper=fixSuper;stdName=unitName;
                html+=`<div class="mb-1"><span class="text-fluidBlue">${idx+1}.强制上级</span>：${rawLine} → 单位${stdName} 上级${dispSuper}`;
            }else{
                const m=getSuperByBelong(unitName);
                stdName=m.standardName;isFuzzy=m.fuzzy;
                if(m.super){
                    dispSuper=m.super;
                    html+=`<div class="mb-1"><span class="${isFuzzy?'text-matchCyan':'text-successGreen'}">${idx+1}.${isFuzzy?'简写匹配':'精准匹配'}</span>：输入「${unitName}」→全称「${stdName}」上级${dispSuper}`;
                }else{
                    dispSuper=defaultSuper||"无兜底上级";
                    // ==========方案A改动：区分「本行带自定义参数的教育局」和「纯无匹配单位」==========
                    if(customRole || customCode){
                        // 上方批量追加下来的教育局：黄色警告，不计入missing计数
                        html+=`<div class="mb-1"><span class="text-warnYellow">${idx+1}.【仅学校匹配列表无此单位，本行角色/编码已生效】</span>：${unitName}，标准全称：${stdName}，上级：${dispSuper}`;
                    }else{
                        // 纯陌生无库单位：红色危险提示，计入missing
                        missing++;
                        html+=`<div class="mb-1"><span class="text-dangerRed">${idx+1}.未匹配单位</span>：${unitName} 使用兜底${dispSuper}`;
                    }
                }
            }
            const showRole=customRole||defRole||"未选全局角色";
            const showCode=customCode||defCode||"无全局分类码";
            html+=` <span class="text-lineRolePurple">[角色:${showRole}${customRole?"(本行自定义)":"(全局)"}]</span>`;
            html+=` <span class="text-lineCodeGreen">[分类码:${showCode}${customCode?"(本行自定义)":"(全局)"}]</span>`;
            html+="</div>";
        });
        if(missing>0)html=`<div class="text-dangerRed mb-2">共${missing}个完全无匹配单位，生成时将使用兜底上级</div>`+html;
        box.innerHTML=html;
    },300);
}

function getStart(count){
    let cur=parseInt(localStorage.getItem(KEY)||"1");
    localStorage.setItem(KEY,cur+count);
    return cur;
}
function resetSerial(){
    if(confirm("确定重置流水号，下次从00001开始？")){localStorage.setItem(KEY,"1");alert("重置完成");}
}

function loadSel(key){
    const list=JSON.parse(localStorage.getItem(key+"_list")||"[]");
    const sel=document.getElementById(key+"Sel");
    sel.innerHTML="";
    list.forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;sel.appendChild(o);});
    sel.onchange=()=>document.getElementById(key).value=sel.value;
    if(key==="typeCode") refreshCodeBatchSel();
}
function add(key){
    const val=document.getElementById(key).value.trim();
    if(!val)return alert("请输入内容");
    let list=JSON.parse(localStorage.getItem(key+"_list")||"[]");
    if(!list.includes(val))list.push(val);
    localStorage.setItem(key+"_list",JSON.stringify(list));
    loadSel(key);
}

// 生成账号主逻辑（底层匹配取值完全不变，依然读取org-map真实全称+上级）
function generate(){
    const prefix=document.getElementById("prefix").value||"xfgl_";
    const globalCode=document.getElementById("typeCode").value||"";
    const suffixTpl=document.getElementById("suffix").value||"";
    const perUnit=Number(document.getElementById("countPerUnit").value)||1;
    const defSuper=document.getElementById("superOrg").value.trim();
    const globalRole=document.getElementById("roleSel").value;
    if(!globalRole)return alert("请先选择全局默认角色");

    const unitRawList=document.getElementById("unitList").value.split("\n").map(i=>i.trim()).filter(Boolean);
    const phoneList=document.getElementById("phoneList").value.split("\n").map(i=>i.trim()).filter(Boolean);
    if(!unitRawList.length)return alert("请填写所属机构列表（教育局可使用上方批量面板生成）");

    let missingList=[],html="";
    resultData=[];
    const total=unitRawList.length*perUnit;
    const startNo=getStart(total);
    let rowIdx=1;

    unitRawList.forEach((rawLine,idx)=>{
        const p=parseUnitLine(rawLine);
        const {fixSuper,unitName,customRole,customCode}=p;
        let superOrg,stdName;
        const lineRole=customRole||globalRole;
        const lineCode=customCode||globalCode;

        if(fixSuper){
            superOrg=fixSuper;stdName=unitName;
        }else{
            const m=getSuperByBelong(unitName);
            stdName=m.standardName;
            if(m.super)superOrg=m.super;
            else{
                // 仅无自定义参数的陌生单位才计入匹配缺失
                if(!customRole && !customCode){
                    missingList.push(`输入:${rawLine} 标准全称:${stdName}`);
                }
                superOrg=defSuper;
            }
        }
        const phone=phoneList[idx]||"";
        for(let n=1;n<=perUnit;n++){
            const serial=String(startNo+idx*perUnit+(n-1)).padStart(5,"0");
            const suffix=suffixTpl.replace(/N/g,n);
            const account=prefix+lineCode+serial+suffix;
            resultData.push({
                index:rowIdx,superOrg,belongOrg:stdName,role:lineRole,typeCode:lineCode,loginAccount:account,userName:account,phone
            });
            const roleHtml=customRole?`<span class="text-lineRolePurple">${lineRole}</span>`:lineRole;
            html+=`<tr class="fluid-table-row">
                <td class="py-3 px-4">${rowIdx}</td>
                <td class="py-3 px-4">${superOrg||"无上级"}</td>
                <td class="py-3 px-4">${stdName}</td>
                <td class="py-3 px-4">${roleHtml}</td>
                <td class="py-3 px-4 font-mono gradient-text">${account}</td>
                <td class="py-3 px-4">${phone}</td>
            </tr>`;
            rowIdx++;
        }
    });
    if(missingList.length>0)alert(`共${missingList.length}个完全无匹配单位，生成时将使用兜底上级：\n${missingList.join("\n")}`);
    document.getElementById("tbody").innerHTML=html;
    alert(`✅生成完成\n起始流水:${startNo}\n总条数:${total}\n完全无匹配单位:${missingList.length}`);
}

// 导出Excel，移除分类码字段
function exportXLSX(){
    if(!resultData.length)return alert("请先生成账号");
    const headers=["上级机构名称", "所属机构标准全称", "角色", "登陆账号", "用户名称", "手机号"];
    const data=[headers];
    resultData.forEach(item=>{
        data.push([
            item.superOrg||"",
            item.belongOrg||"",
            item.role||"",
            item.loginAccount||"",
            item.userName||""
        ]);
    });
    const ws=XLSX.utils.aoa_to_sheet(data);
    const colWidths=[];
    headers.forEach((_,col)=>{
        let maxLen=0;
        data.forEach(row=>{
            const s=String(row[col]||"");
            const len=[...s].reduce((a,c)=>a+(c.charCodeAt(0)>255?2:1),0);
            if(len>maxLen)maxLen=len;
        });
        colWidths.push({wch:Math.min(Math.max(maxLen*1.2,8),55)});
    });
    ws["!cols"]=colWidths;
    ws["!rows"]=data.map((_,i)=>({hpx:i===0?26:22}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"账号数据");
    XLSX.writeFile(wb,"账号导入模板.xlsx");
}

    document.getElementById("unitList").value="";

}
