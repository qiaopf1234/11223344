<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运维月报生成器</title>
<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
}
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #004aad 0%, #0066cc 50%, #0099ff 100%);
  color: #e0e0e0;
  position: relative;
  overflow-x: hidden;
}
/* 动态粒子画布 */
#particles-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 30px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  position: relative;
  z-index: 1;
}
h2 {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #ffffff, #e0e0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.item {
  margin-bottom: 24px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #ffffff;
  font-size: 14px;
}
input, textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 10px;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  transition: all 0.3s ease;
}
select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 10px;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.1);
  color: #ffffff;
  transition: all 0.3s ease;
}
select:focus {
  outline: none;
  border-color: #ffffff;
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
}
select option {
  background: #004aad;
  color: #ffffff;
}
input:focus, textarea:focus {
  outline: none;
  border-color: #ffffff;
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
}
.date-row {
  display: flex;
  gap: 12px;
}
.date-row .item {
  flex: 1;
}
.btn-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s ease;
}
.btn-blue {
  background: #ffffff;
  color: #004aad;
}
.btn-blue:hover {
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
  transform: translateY(-2px);
}
.btn-green {
  background: linear-gradient(90deg, #00b894, #55efc4);
  color: white;
}
.btn-green:hover {
  box-shadow: 0 0 15px rgba(0, 184, 148, 0.6);
  transform: translateY(-2px);
}
.btn-gray {
  background: linear-gradient(90deg, #636e72, #b2bec3);
  color: white;
}
.btn-gray:hover {
  box-shadow: 0 0 15px rgba(99, 110, 114, 0.6);
  transform: translateY(-2px);
}
.btn-red {
  background: linear-gradient(90deg, #d63031, #ff7675);
  color: white;
}
.btn-red:hover {
  box-shadow: 0 0 15px rgba(214, 48, 49, 0.6);
  transform: translateY(-2px);
}
.btn-purple {
  background: linear-gradient(90deg, #9d50bb, #6e48aa);
  color: #fff;
}
.btn-purple:hover {
  box-shadow: 0 0 15px rgba(157, 80, 187, 0.6);
  transform: translateY(-2px);
}
textarea {
  resize: vertical;
  min-height: 100px;
}
::placeholder {
  color: rgba(255, 255, 255, 0.6);
}
/* 日期输入框点击唤起选择器（页面已删除起止日期输入，样式保留不影响） */
.date-input {
  position: relative;
  width: 100%;
}
.date-input input[type="date"] {
  cursor: pointer;
}
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="container">
  <h2>运维月报生成器</h2>

  <div class="item">
    <label>选择/自定义报告标题</label>
    <select id="titleSel">
      <option value="教育厅基础教育大数据服务平台">教育厅基础教育大数据服务平台</option>
      <option value="教育厅机关智能化管理平台、学生体质健康监测数据管理平台、民办机构管理系统运维服务">多系统模式</option>
      <option value="自定义">手动自定义输入</option>
    </select>
  </div>
  <div class="item" id="titleInputBox" style="display:none;">
    <input type="text" id="customTitle" placeholder="请手动输入报告主标题">
  </div>

  <!-- 年月选择行保留 -->
  <div class="date-row">
    <div class="item">
      <label>报告年份</label>
      <select id="reportYear">
        <option value="2026">2026年</option>
        <option value="2025">2025年</option>
      </select>
    </div>
    <div class="item">
      <label>报告月份</label>
      <select id="reportMonth">
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05" selected>5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
  </div>

  <!-- 已完整删除：开始日期、结束日期整行DOM，无注释残留 -->

  <div class="item">
    <label>本月工作内容（可编辑修改模板）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyWork()">复制</button>
      <button class="btn-gray" onclick="cutWork()">剪切</button>
      <button class="btn-red" onclick="resetTemplate()">恢复默认模板</button>
    </div>
    <textarea id="mainWork" rows="12" placeholder="系统工作模板内容"></textarea>
  </div>

  <div class="item">
    <label id="eventLabel">运维事件记录表（粘贴字段：事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyEvent()">复制</button>
      <button class="btn-gray" onclick="cutEvent()">剪切</button>
      <button class="btn-red" onclick="clearEvent()">清空</button>
    </div>
    <textarea id="eventList" rows="12" placeholder="直接从Excel整行粘贴数据"></textarea>
  </div>

  <div class="item" style="text-align:center;">
    <button class="btn-blue" onclick="generateAndExport()">生成并导出 Word 总结报告</button>
  </div>
</div>

<script>
// --- 动态物理粒子效果 ---
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let width, height;
let particles = [];

function resizeCanvas() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.opacity = Math.random() * 0.5 + 0.3;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
      this.reset();
    }
  }
  draw() {
    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 初始化粒子
for (let i = 0; i < 100; i++) {
  particles.push(new Particle());
}

function connectParticles() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      const dx = particles[a].x - particles[b].x;
      const dy = particles[a].y - particles[b].y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < 150) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 * (1 - distance / 150)})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, width, height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  connectParticles();
  requestAnimationFrame(animate);
}
animate();

// 起止日期输入框已删除，对应点击绑定代码全部移除

// --- 业务全局变量 ---
const titleSel = document.getElementById('titleSel');
const titleInputBox = document.getElementById('titleInputBox');
const eventLabel = document.getElementById('eventLabel');
const reportMonthSel = document.getElementById('reportMonth');
const reportYearSel = document.getElementById('reportYear');
const mainWorkTextarea = document.getElementById('mainWork');

// 获取当月总天数
function getMonthDayCount(year, monthZero) {
  return new Date(year, monthZero + 1, 0).getDate();
}

// 判断当前是否多系统模式
function isCurrentMultiSys() {
  const val = titleSel.value;
  return val === '自定义' || val.indexOf('、') > -1;
}

// 生成对应模板（自动区分单/多系统）
function getTemplateText() {
  const y = parseInt(reportYearSel.value);
  const mNum = parseInt(reportMonthSel.value);
  const mZero = mNum - 1;
  const days = getMonthDayCount(y, mZero);
  const mStr = `${mNum}月`;

  if (isCurrentMultiSys()) {
    // 多系统固定模板
    return `${mStr}全月（${days}天）的机关智能化系统、民办教育管理系统、学生体质健康系统巡检工作已合并统计，期间各系统完成日巡检${days}次，并形成了每日巡检记录表，反映了每日系统运行状态与健康情况；${mStr}机关智能化系统、民办教育管理系统、学生体质健康系统巡检服务存储均在正常范围内无异常存储问题，同步监控存储容量波动与用户数据导出功能稳定性；巡检服务存储均在正常范围内无异常存储问题；各平台正常登录、无报错问题，系统响应速度小于4秒，未发现重大运行异常。
1.服务配合与支撑：机关智能化系统 ${mStr} 通过电话、微信等远程方式为用户提供日常运维问题解答、操作指导14 次，积极响应并闭环用户问题及咨询，保障业务顺畅推进；民办机构管理系统未开放，只进行每日系统巡检与健康检查；体质健康系统未开放，只进行每日系统巡检与健康检查；
2.安全运维：机关智能化系统、民办机构系统、体质健康系统${mStr}执行系统安全监控，并对系统进行了全面的安全审查，未发现安全隐患。
3.故障处理：机关智能化系统、民办机构系统、体质健康系统${mStr}无故障。
4.需求处置：机关智能化系统无新增功能优化需求；民办机构系统无新增功能需求；体质健康系统无新增功能需求。`;
  } else {
    // 单系统固定模板
    return `${mStr}基础教育大数据服务平台完成月巡检1次，并形成了每月巡检记录表，反映了每月系统运行状态与健康情况；系统巡检服务存储均在正常范围内无异常存储问题，平台正常登录、无报错问题，系统响应速度小于5秒，未发现重大运行异常。
1.服务配合与支撑：本月基础教育大数据系统通过电话、微信等远程方式为用户提供了日常运维问题解答、操作指导等支撑工作。
2.安全运维：基础教育大数据系统进行了全面的安全审查，未发现安全隐患。
3.故障处理：基础教育大数据系统无故障问题，运行状态良好。
4.需求处置：基础教育大数据系统无新增功能优化需求。`;
  }
}

// 刷新文本框内容
function refreshTemplate() {
  mainWorkTextarea.value = getTemplateText();
}

// 页面初始化加载模板
refreshTemplate();

// 监听月份、年份、标题切换，自动刷新模板
reportMonthSel.addEventListener('change', refreshTemplate);
reportYearSel.addEventListener('change', refreshTemplate);
titleSel.addEventListener('change', () => {
  updateLabel();
  refreshTemplate();
});

// 切换标题时更新表格字段说明
function updateLabel() {
  let val = titleSel.value;
  titleInputBox.style.display = val === '自定义' ? 'block' : 'none';
  if (val === '自定义' || val.indexOf('、') > -1) {
    eventLabel.innerText = '运维事件记录表（粘贴字段：系统名称、事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）';
  } else {
    eventLabel.innerText = '运维事件记录表（粘贴字段：事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）';
  }
}
updateLabel();

// 起止日期格式化函数fmt全部删除，不再使用

function splitLine(str){
  return str.trim().split(/\t/);
}

function copyWork(){
  let t=document.getElementById('mainWork');
  t.select();document.execCommand('copy');alert('复制成功');
}
function cutWork(){
  let t=document.getElementById('mainWork');
  t.select();document.execCommand('cut');alert('剪切成功');
}
function resetTemplate(){
  refreshTemplate();
  alert('已恢复默认工作模板');
}

function copyEvent(){
  let t=document.getElementById('eventList');
  t.select();document.execCommand('copy');alert('复制成功');
}
function cutEvent(){
  let t=document.getElementById('eventList');
  t.select();document.execCommand('cut');alert('剪切成功');
}
function clearEvent(){
  document.getElementById('eventList').value='';
}

function generateAndExport(){
  let titleSelVal = titleSel.value;
  let mainTitle = titleSelVal === '自定义' ? document.getElementById('customTitle').value.trim() : titleSelVal;
  const isMultiSys = (titleSelVal === '自定义') || (mainTitle.indexOf('、') > -1);

  let reportYear = reportYearSel.value;
  let reportMonth = reportMonthSel.value;
  // 移除startDate、endDate读取与起止周期文本
  let monthText = `${reportMonth.replace('0','')}月`;
  let titleLine1 = `${mainTitle}${reportYear}年${reportMonth.replace('0','')}月月度总结报告`;
  // 报告副标题去掉起止日期，为空
  let periodText = "";

  let mainWorkContent = mainWorkTextarea.value.trim();
  mainWorkContent = mainWorkContent.replace(/^本月/g, monthText);

  let eventLines = document.getElementById('eventList').value.trim().split('\n').filter(x=>x.trim());
  let eventRows = '';

  eventLines.forEach((line,idx)=>{
    let arr = splitLine(line);
    let xh = idx+1;
    let sysName, nr, zt, dw, xq, rq, clr;

    if(isMultiSys){
      sysName = arr[0] || '';
      nr = arr[1] || '';
      zt = arr[3] || '';
      dw = arr[4] || '';
      xq = arr[5] || '';
      rq = arr[6] || '';
      clr = arr[7] || '';

      eventRows += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xh}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${sysName}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${nr}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${zt}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dw}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${rq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${clr}</td>
      </tr>`;
    }else{
      nr = arr[0] || '';
      zt = arr[2] || '';
      dw = arr[3] || '';
      xq = arr[4] || '';
      rq = arr[5] || '';
      clr = arr[6] || '';

      eventRows += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xh}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${nr}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${zt}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dw}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${rq}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${clr}</td>
      </tr>`;
    }
  });

  let tableHead = '';
  if(isMultiSys){
    tableHead = `<tr>
      <th>序号</th>
      <th>系统名称</th>
      <th>事件内容</th>
      <th>完成状态</th>
      <th>服务对象</th>
      <th>需求提出</th>
      <th>处理日期</th>
      <th>处理人</th>
    </tr>`;
  }else{
    tableHead = `<tr>
      <th>序号</th>
      <th>事件内容</th>
      <th>完成状态</th>
      <th>服务对象</th>
      <th>需求提出</th>
      <th>处理日期</th>
      <th>处理人</th>
    </tr>`;
  }

  let html=`<html
xmlns:v="urn:schemas-microsoft-com:vml"
xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns:m="http://schemas.microsoft.com/office/2004/12/omml"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<![if gte mso 9]><xml>
<w:WordDocument>
  <w:View>Print</w:View>
  <w:Zoom>100</w:Zoom>
</w:WordDocument>
</xml><![endif]>
<style>
body{margin:0;padding:20px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
.main-title-line1, .main-title-line2{
  font-family:"方正小标宋简体";
  font-size:22pt;
  font-weight:normal;
  text-align:center;
}
.main-title-line1{
  margin-bottom:5px;
}
.main-title-line2{
  margin-bottom:20px;
}
/* 一级标题：黑体三号、不加粗 */
.sub-title{
  font-family:"黑体";
  font-size:16pt;
  font-weight:normal;
  margin:15px 0 8px 0;
  text-indent:0;
}
/* 正文：仿宋三号、首行缩进2字符、不加粗 */
.main-content p{
  font-family:"仿宋";
  font-size:16pt;
  line-height:1.5;
  text-indent:2em;
  margin:0 0 8px 0;
  font-weight:normal;
}
th{
  font-family:宋体;
  font-size:11pt;
  border:1px solid #333;
  padding:6px;
  text-align:center;
  background:#f5f5f5;
}
.sign-line{
  font-family:"仿宋";
  font-size:16pt;
  margin-top:30px;
  line-height:2;
  font-weight:normal;
}
</style>
</head>
<body>

<div class="main-title-line1">${titleLine1}</div>
<div class="main-title-line2">${periodText}</div>

<div class="sub-title">一、本月工作</div>
<div class="main-content">
  ${mainWorkContent.split('\n').map(p => `<p>${p}</p>`).join('')}
</div>

<div class="sub-title">二、服务配合与支撑</div>
<table>
  ${tableHead}
  ${eventRows}
</table>

<div class="sign-line">
  <p>运维人员：_________</p>
  <p>甲方确认：_________</p>
</div>

</body>
</html>`;

  let fileName = `${mainTitle}${reportYear}年${reportMonth.replace('0','')}月月度总结报告.doc`;
  let blob=new Blob([html],{type:'application/msword'});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;
  a.download=fileName;
  a.click();
  URL.revokeObjectURL(url);
}
