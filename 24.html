<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统每日巡检表自动生成工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            padding: 20px;
            background: #000410;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        /* 动态粒子星空背景 匹配原图粒子风格 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
        /* 整体左右布局容器 毛玻璃发光面板 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            background: rgba(10, 20, 45, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(40, 160, 255, 0.2);
            box-shadow: 0 0 35px rgba(20, 130, 255, 0.18), inset 0 0 20px rgba(20, 130, 255, 0.05);
        }
        /* 左侧配置栏 */
        .left-config {
            width: 320px;
            flex-shrink: 0;
            padding-right: 20px;
            border-right: 1px solid rgba(60, 180, 255, 0.15);
        }
        /* 右侧预览栏 */
        .right-preview {
            flex: 1;
            overflow: auto;
            min-height: 800px;
        }
        h2 {
            margin-bottom: 15px;
            color: #e8f4ff;
            text-shadow: 0 0 10px rgba(40, 180, 255, 0.5);
            letter-spacing: 1px;
        }
        .tip {
            color: #a0c8e8;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .config-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 15px;
        }
        label {
            font-size: 14px;
            color: #c6e0ff;
        }
        input, select, textarea {
            width: 100%;
            height: 36px;
            padding: 0 10px;
            border: 1px solid rgba(40, 160, 255, 0.3);
            border-radius: 6px;
            font-size: 14px;
            background: rgba(5, 15, 35, 0.6);
            color: #e0f0ff;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #28b0ff;
            box-shadow: 0 0 12px rgba(40, 180, 255, 0.4);
        }
        textarea {
            height: 80px;
            resize: vertical;
            padding: 8px;
        }
        /* 科技发光按钮 匹配原图蓝色主色调 */
        button {
            background: linear-gradient(135deg, #0a78e8, #28b8ff);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            border-radius: 6px;
            height: 38px;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(30, 150, 255, 0.3);
        }
        button:hover {
            background: linear-gradient(135deg, #1090ff, #40d0ff);
            box-shadow: 0 0 22px rgba(40, 190, 255, 0.55);
            transform: translateY(-2px);
        }
        .table-num-box {
            display: none;
        }
        /* 预览表格样式 深色适配科技风 */
        .check-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: rgba(8, 18, 40, 0.4);
            backdrop-filter: blur(6px);
        }
        .check-table td {
            border: 1px solid rgba(40, 160, 255, 0.25);
            padding: 12px 8px;
            text-align: center;
            font-family: "仿宋_GB2312", SimSun;
            font-size: 14pt;
            font-weight: normal;
            vertical-align: middle;
            color: #e6f2ff;
        }
        /* 表格内部标题单元格 霓虹发光标题 */
        .table-title-cell {
            font-family: "方正小标宋简体", SimHei;
            font-size: 22pt;
            font-weight: normal;
            text-align: center;
            padding: 20px 0;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(30, 160, 255, 0.6);
            background: rgba(15, 40, 80, 0.35);
        }
    </style>
</head>
<body>
    <!-- 动态粒子画布 匹配原图星空粒子效果 -->
    <canvas id="particleCanvas"></canvas>

    <div class="main-container">
        <!-- 左侧：所有配置、按钮区域 -->
        <div class="left-config">
            <h2>参数配置</h2>
            <p class="tip">填写参数后生成并导出Word</p>

            <div class="config-item">
                <label>开始日期</label>
                <input type="date" id="startDate" value="2025-09-29">
            </div>

            <div class="config-item">
                <label>结束日期</label>
                <input type="date" id="endDate" value="2025-10-13">
            </div>

            <div class="config-item">
                <label>通用巡检人(备用)</label>
                <input type="text" id="checkUser" value="薛涛" placeholder="请输入巡检人姓名">
            </div>

            <div class="config-item">
                <label>正常/异常之间空格数</label>
                <select id="spaceCount">
                    <option value="">无空格</option>
                    <option value="&nbsp;" selected>1个空格</option>
                    <option value="&nbsp;&nbsp;">2个空格</option>
                    <option value="&nbsp;&nbsp;&nbsp;">3个空格</option>
                    <option value="&nbsp;&nbsp;&nbsp;&nbsp;">4个空格</option>
                </select>
            </div>

            <div class="config-item">
                <label>表格模式</label>
                <select id="tableMode">
                    <option value="single">单表格（单个系统）</option>
                    <option value="multi">多表格（多个系统）</option>
                </select>
            </div>

            <div class="config-item table-num-box" id="tableNumBox">
                <label>系统数量</label>
                <select id="tableCount">
                    <option value="2">2个系统</option>
                    <option value="3" selected>3个系统</option>
                    <option value="4">4个系统</option>
                </select>
            </div>

            <div class="config-item">
                <label>系统名称（换行分隔）</label>
                <textarea id="systemNames">民办机构管理系统
教育厅机关智能化管理平台
学生体质健康监测数据管理平台</textarea>
            </div>

            <div class="config-item">
                <label>对应巡检人（一行对应一个系统）</label>
                <textarea id="userNames">薛涛
乔鹏飞
刘树清</textarea>
            </div>

            <div class="config-item">
                <button onclick="generateTable()">生成巡检表</button>
            </div>

            <div class="config-item">
                <button onclick="exportToWord()">导出 Word 文件</button>
            </div>
        </div>

        <!-- 右侧：表格预览区域 -->
        <div class="right-preview">
            <h2>表格预览</h2>
            <div class="table-wrap" id="tableBox"></div>
        </div>
    </div>

    <script>
        // ===================== 动态粒子星空物理动画（匹配原图配色：青蓝/深蓝/粉紫三色粒子） =====================
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 粒子类 物理漂浮缓慢运动
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                // 原图三色粒子：深蓝、青蓝、粉紫
                const colorPool = [
                    'rgba(30, 140, 255, ',
                    'rgba(50, 200, 255, ',
                    'rgba(180, 60, 220, '
                ];
                this.colorBase = colorPool[Math.floor(Math.random() * colorPool.length)];
                this.alpha = Math.random() * 0.6 + 0.1;
                this.radius = Math.random() * 3.2 + 0.4;
                // 微小速度 缓慢漂浮
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = (Math.random() - 0.5) * 0.35;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                // 边界循环
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.colorBase + this.alpha + ')';
                ctx.fill();
            }
        }

        // 生成800个粒子 还原原图密集星空效果
        function initParticles() {
            particles = [];
            for (let i = 0; i < 800; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // 渲染循环
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ===================== 以下全部是你原有业务JS，完全未改动 =====================
        // 切换表格数量选择框显示/隐藏
        const tableMode = document.getElementById('tableMode');
        const tableNumBox = document.getElementById('tableNumBox');
        tableMode.addEventListener('change', function(){
            tableNumBox.style.display = this.value === 'multi' ? 'flex' : 'none';
        });

        // 日期格式化 YYYY.MM.DD
        function formatDate(date){
            let y = date.getFullYear();
            let m = String(date.getMonth() + 1).padStart(2, '0');
            let d = String(date.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
        }

        // 获取起止区间所有日期
        function getDateRange(start, end){
            let dateArr = [];
            let current = new Date(start);
            let endDate = new Date(end);
            while(current <= endDate){
                dateArr.push(formatDate(new Date(current)));
                current.setDate(current.getDate() + 1);
            }
            return dateArr;
        }

        // 生成单个巡检表格HTML
        function createSingleTable(dateList, userName, systemName, spaceStr){
            let html = `
                <table class="check-table">
                    <tr>
                        <td colspan="5" class="table-title-cell">${systemName}每日巡检记录</td>
                    </tr>
                    <tr>
                        <td rowspan="2">时间</td>
                        <td rowspan="2">巡检人</td>
                        <td colspan="3">巡检要求</td>
                    </tr>
                    <tr>
                        <td>系统各功能均可<br>正常访问使用</td>
                        <td>系统功能响应速<br>度正常无延迟</td>
                        <td>系统服务存储占<br>用正常</td>
                    </tr>
            `;
            dateList.forEach(date => {
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${userName}</td>
                        <td>☐正常${spaceStr}☐异常</td>
                        <td>☐正常${spaceStr}☐异常</td>
                        <td>☐正常${spaceStr}☐异常</td>
                    </tr>
                `;
            });
            html += `
                    <tr>
                        <td colspan="5" style="text-align:left; padding-left:12px;">甲方确认：</td>
                    </tr>
                </table>
                <br><br>
            `;
            return html;
        }

        // 主生成函数：系统与巡检人一对一绑定（修复之前循环传参bug）
        function generateTable(){
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const mode = document.getElementById('tableMode').value;
            const tableBox = document.getElementById('tableBox');
            const systemText = document.getElementById('systemNames').value;
            const userText = document.getElementById('userNames').value;
            const spaceStr = document.getElementById('spaceCount').value;

            let systemList = systemText.split('\n').filter(item => item.trim() !== '');
            let userList = userText.split('\n').filter(item => item.trim() !== '');

            if(!start || !end){
                alert('请选择起止日期！');
                return;
            }
            if(new Date(start) > new Date(end)){
                alert('开始日期不能晚于结束日期！');
                return;
            }

            const dateList = getDateRange(start, end);
            let totalHtml = '';

            if(mode === 'single'){
                let sysName = systemList[0] || '民办机构管理系统';
                let userName = userList[0] || '巡检人';
                totalHtml = createSingleTable(dateList, userName, sysName, spaceStr);
            }else{
                let count = parseInt(document.getElementById('tableCount').value);
                for(let i = 0; i < count; i++){
                    let sysName = systemList[i] || `民办机构管理系统${i+1}`;
                    let userName = userList[i] || '巡检人';
                    totalHtml += createSingleTable(dateList, userName, sysName, spaceStr);
                }
            }
            tableBox.innerHTML = totalHtml;
        }

        // 【完整重写导出函数，强制打开为页面视图，兼容Office+WPS】
        function exportToWord() {
            const tableBox = document.getElementById('tableBox');
            if (!tableBox.innerHTML) {
                alert('请先生成巡检表再导出！');
                return;
            }

            const wordStyle = `
                <style>
                    /* Word标准A4尺寸磅值，强化打印页面渲染 */
                    @page WordSection1 {
                        size:595.3pt 841.9pt;
                        margin: 72pt 90pt 72pt 90pt;
                        mso-page-orientation: portrait;
                        mso-header-margin:36pt;
                        mso-footer-margin:36pt;
                    }
                    div.WordSection1 {
                        page: WordSection1;
                    }
                    .table-title-cell {
                        font-family: "方正小标宋简体";
                        font-size: 22pt;
                        font-weight: normal;
                        text-align: center;
                        padding: 20px 0;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-bottom: 30px;
                    }
                    td {
                        border: 1px solid #333333;
                        padding: 12px 8px;
                        text-align: center;
                        font-family: "仿宋_GB2312";
                        font-size: 14pt;
                        font-weight: normal;
                        vertical-align: middle;
                    }
                </style>
            `;

            // 全套官方命名空间，缺一不可；完整WordDocument配置强制Print页面视图
            const fullHtml = `
                <html 
                    xmlns:v="urn:schemas-microsoft-com:vml"
                    xmlns:o="urn:schemas-microsoft-com:office:office"
                    xmlns:w="urn:schemas-microsoft-com:office:word"
                    xmlns:m="http://schemas.microsoft.com/office/2004/12/omml"
                    xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset="UTF-8">
                        <title>系统每日巡检记录表</title>
                        ${wordStyle}
                        <!--[if gte mso 9]>
                        <xml>
                            <w:WordDocument>
                                <!-- 核心：Print=页面打印视图，禁止Web版式 -->
                                <w:View>Print</w:View>
                                <w:TrackMoves>false</w:TrackMoves>
                                <w:TrackFormatting>false</w:TrackFormatting>
                                <w:ValidateAgainstSchemas/>
                                <w:SaveIfXMLInvalid>false</w:SaveIfXMLInvalid>
                                <w:IgnoreMixedContent>false</w:IgnoreMixedContent>
                                <w:AlwaysShowPlaceholderText>false</w:AlwaysShowPlaceholderText>
                                <w:DoNotOptimizeForBrowser/>
                                <w:LidThemeAsian>ZH-CN</w:LidThemeAsian>
                                <w:Compatibility>
                                    <w:BreakWrappedTables/>
                                    <w:SnapToGridInCell/>
                                    <w:WrapTextPunct/>
                                </w:Compatibility>
                            </w:WordDocument>
                        </xml>
                        <![endif]-->
                    </head>
                    <body>
                        <div class="WordSection1">
                            ${tableBox.innerHTML}
                        </div>
                    </body>
                </html>
            `;

            const blob = new Blob(['\ufeff' + fullHtml], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '系统每日巡检记录表.doc';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 页面加载自动生成表格
        window.onload = generateTable;
    </script>
</body>
</html>
