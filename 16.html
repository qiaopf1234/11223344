    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(139, 92, 246, 0.3);

    <style>
        /* 覆盖原有背景为透明，Three.js 画布全屏背景 */
        body {
            background: transparent !important;
            position: relative;
            overflow-x: hidden;
        }
        .dark body {
            background: transparent !important;
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        /* 鼠标光晕层 */
        .mouse-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            transition: transform 0.05s linear;
            will-change: transform;
        }
        /* 所有卡片已有毛玻璃，强化霓虹边框 */
        .glass, .glass-card, .bg-white\/40 {
            backdrop-filter: blur(12px);
            background: rgba(20, 30, 50, 0.55) !important;
            border: 1px solid rgba(139, 92, 246, 0.4);
        }
        .dark .glass, .dark .bg-white\/40 {
            background: rgba(20, 30, 50, 0.5) !important;
        }
        /* 按钮流光效果 */
        button:not(.btn-primary) {
            position: relative;
            overflow: hidden;
        }
        button:not(.btn-primary)::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.3), transparent);
            transition: left 0.5s;
        }
        button:not(.btn-primary):hover::before {
            left: 100%;
        }
        /* 修复标题颜色：星空紫/淡紫色 */
        .glass h2,
        .glass .text-xl.font-bold,
        .glass-card h2,
        .glass-card .text-xl.font-bold,
        .rounded-2xl h2,
        .rounded-2xl .text-xl.font-bold {
            background: linear-gradient(135deg, #c084fc, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
            text-shadow: 0 0 5px rgba(139, 92, 246, 0.3);
        }
        .dark .glass h2,
        .dark .glass .text-xl.font-bold,
        .dark .glass-card h2,
        .dark .glass-card .text-xl.font-bold,
        .dark .rounded-2xl h2,
        .dark .rounded-2xl .text-xl.font-bold {
            background: linear-gradient(135deg, #d8b4fe, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
        }
        /* 修复 SQL 标题备注文字颜色（亮白色/淡紫） */
        .sql-card-title {
            color: #f0f3ff !important;
            font-weight: 500;
        }
        .dark .sql-card-title {
            color: #f0f3ff !important;
        }
        /* 版本历史卡片 */
        .history-item {
            background: rgba(10, 20, 35, 0.5);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .history-item:hover {
            background: rgba(139, 92, 246, 0.2);
            transform: translateX(4px);
        }
        .sql-content-collapsed::after {
            background: linear-gradient(to top, rgba(20,30,50,0.9), transparent);
        }
        .dark .sql-content-collapsed::after {
            background: linear-gradient(to top, rgba(20,30,50,0.9), transparent);
        }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 6px;
        }
        /* 折叠区域过渡 */
        .sql-content-collapsed {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
    </style>
</head>

    <!-- Three.js 粒子背景脚本（与之前相同，略作精简） -->
    <script type="module">
        import * as THREE from 'three';
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);
        
        const particleCount = 2100;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 38;
            positions[i*3+1] = (Math.random() - 0.5) * 24;
            positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);
        
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1400 * 3);
        for (let i = 0; i < 1400; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 44;
            pos2[i*3+1] = (Math.random() - 0.5) * 28;
            pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);
        
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(900 * 3);
        for (let i = 0; i < 900; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 30;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);
        
        const ringCount = 380;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 5.2;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
            ringPositions[i*3+2] = -1.8;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        scene.fog = new THREE.FogExp2(0x03050b, 0.008);
        
        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            let mx = (e.clientX / window.innerWidth) * 2 - 1;
            let my = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mx * 0.9;
            targetCamY = my * 0.6;
        });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            particleSys.rotation.y = time * 0.06;
            particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSys2.rotation.y = time * 0.04;
            particleSys3.rotation.x = time * 0.03;
            ringPoints.rotation.z = time * 0.12;
            camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onResize);
        animate();
    </script>

    <script>
        const glow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // ----- 原有 Supabase 配置、本地存储变量、辅助函数保持不变 -----
        const SUPA_URL = "https://idmfuazwpzlkooohbxil.supabase.co";
        const SUPA_KEY = "sb_publishable_1MNTRsfYYf86DQ-hhppn9g_9-37yos7";
        const DEVICE_ID = localStorage.getItem("dev_id") || (()=>{
            let uid = Date.now() + "_" + Math.random().toString(32).slice(2);
            localStorage.setItem("dev_id", uid);
            return uid;
        })();
        let autoTimer = null;
        const MAX_CELL_TEXT_LEN = 32000;
        // 超长SQL截断阈值（展示用，防止渲染卡死）
        const DISPLAY_TRUNCATE_LEN = 2000;

        let data = JSON.parse(localStorage.getItem('sqlTool')) || {
            categories: ['用户数据','订单数据','商品数据'],
            sqlList: [],
            currentCate: '用户数据',
            config: {
                collapseHeight: 120,
                sortBy: "time",
                sortOrder: "desc",
                darkMode: false
            }
        };
        const uniqueIdMap = new Map();
        data.sqlList = data.sqlList.filter(item=>{
            if(uniqueIdMap.has(item.id)) return false;
            uniqueIdMap.set(item.id, true);
            return true;
        });

        // 版本历史
        let versionHistory = JSON.parse(localStorage.getItem('sql_version_history')) || [];
        const MAX_VERSIONS = 30;
        function addVersionSnapshot(action, snapshotData = null) {
            const snapshot = {
                id: Date.now(),
                time: new Date().toLocaleString(),
                action: action,
                data: snapshotData ? JSON.parse(JSON.stringify(snapshotData)) : JSON.parse(JSON.stringify(data))
            };
            versionHistory.unshift(snapshot);
            if (versionHistory.length > MAX_VERSIONS) versionHistory.pop();
            localStorage.setItem('sql_version_history', JSON.stringify(versionHistory));
            renderVersionHistory();
        }
        function restoreVersion(version) {
            if (confirm(`确定恢复到 ${version.time} 的版本吗？当前数据将被覆盖。`)) {
                data = version.data;
                if (!data.config) data.config = { collapseHeight: 120, sortBy: "time", sortOrder: "desc", darkMode: false };
                saveData();
                renderAll();
                showToast(`已恢复到 ${version.time} 的版本`);
                addVersionSnapshot(`恢复到版本 ${version.time}`);
            }
        }
        function renderVersionHistory() {
            const container = document.getElementById('versionList');
            if (!versionHistory.length) {
                container.innerHTML = '<div class="text-gray-400 text-center py-4">暂无版本记录，编辑或保存SQL后将自动创建版本快照</div>';
                return;
            }
            let html = '';
            versionHistory.forEach(v => {
                html += `
                    <div class="history-item" data-id="${v.id}">
                        <div class="flex justify-between items-center">
                            <div>
                                <span class="text-primary text-sm">📌 ${v.action}</span><br>
                                <span class="text-xs text-gray-400">${v.time}</span>
                            </div>
                            <button class="restore-version-btn text-xs bg-purple-600 px-3 py-1 rounded-full hover:bg-purple-500">恢复</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            document.querySelectorAll('.history-item').forEach(item => {
                const btn = item.querySelector('.restore-version-btn');
                const id = parseInt(item.dataset.id);
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const ver = versionHistory.find(v => v.id === id);
                    if (ver) restoreVersion(ver);
                };
            });
        }

        function saveData() {
            localStorage.setItem('sqlTool', JSON.stringify(data));
            autoSaveCloud();
            renderAll();
        }

        function initTheme(){
            if(data.config.darkMode){
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').className = 'fa fa-sun-o mr-1';
            }
        }
        function toggleTheme(){
            data.config.darkMode = !data.config.darkMode;
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').className = data.config.darkMode ? 'fa fa-sun-o mr-1' : 'fa fa-moon-o mr-1';
            saveData();
        }
        let isResizing = false;
        const sqlArea = document.getElementById('sqlContent');
        document.querySelectorAll('.resize-handle').forEach(handle=>{
            handle.onmousedown = ()=>isResizing = true;
        });
        window.onmouseup = ()=>isResizing = false;
        window.onmousemove = (e)=>{
            if(!isResizing) return;
            let h = parseInt(sqlArea.style.height || "160px");
            sqlArea.style.height = Math.max(80, h + e.movementY) + "px";
        };
        function setCollapseHeight(){
            let h = prompt("设置SQL默认折叠高度(px)", data.config.collapseHeight);
            if(h && !isNaN(h)){
                data.config.collapseHeight = parseInt(h);
                saveData();
                renderAll();
            }
        }
        function toggleSort(){
            const sortList = ['time','name'];
            let idx = sortList.indexOf(data.config.sortBy);
            idx = (idx + 1) % sortList.length;
            data.config.sortBy = sortList[idx];
            data.config.sortOrder = data.config.sortOrder === 'desc' ? 'asc' : 'desc';
            saveData();
            renderAll();
            showToast(`已按${sortList[idx]==='time'?'时间':'名称'}${data.config.sortOrder==='desc'?'倒序':'正序'}`);
        }
        function highlightSql(sql){
            let ret = sql;
            const keywords = /\b(SELECT|FROM|WHERE|AND|OR|JOIN|LEFT|INNER|RIGHT|GROUP|ORDER|BY|LIMIT|INSERT|UPDATE|DELETE|CREATE|TABLE|ALTER|DROP|UNION|ALL|DISTINCT|AS|ON|IN|LIKE|BETWEEN|IS|NULL|NOT|CASE|WHEN|THEN|ELSE|END)\b/gi;
            const funcs = /\b(COUNT|SUM|AVG|MAX|MIN|IFNULL|COALESCE|CONCAT|SUBSTRING|REPLACE|UPPER|LOWER|DATE|NOW|CURDATE)\b/gi;
            const strs = /'[^']*'|"[^"]*"/g;
            const comments = /--.*$/gm;
            ret = ret.replace(comments, m=>`<span class="sql-comment">${m}</span>`);
            ret = ret.replace(strs, m=>`<span class="sql-string">${m}</span>`);
            ret = ret.replace(funcs, m=>`<span class="sql-function">${m}</span>`);
            ret = ret.replace(keywords, m=>`<span class="sql-keyword">${m}</span>`);
            return ret;
        }
        function showToast(msg){
            const div = document.createElement('div');
            div.className = 'toast bg-primary/90';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(()=>div.remove(), 1800);
        }
        function renderCate(){
            const list = document.getElementById('cateList');
            list.innerHTML = "";
            data.categories.forEach(cate=>{
                const li = document.createElement('li');
                li.className = `p-3 rounded-lg cursor-pointer transition-all ${cate === data.currentCate ? 'bg-primary/20 border-l-4 border-primary font-medium' : 'bg-white/30 dark:bg-gray-700/30 hover:bg-white/50'}`;
                li.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span style="color: #E8EDF5;">${cate}</span>
                        <div class="flex gap-2">
                            <button onclick="renameCategory('${cate}')" class="text-yellow-500 text-xs"><i class="fa fa-pencil"></i></button>
                            <button onclick="delCategory('${cate}')" class="text-red-400 text-xs"><i class="fa fa-trash"></i></button>
                        </div>
                    </div>
                `;
                li.onclick = e=>{
                    if(e.target.tagName === 'BUTTON') return;
                    data.currentCate = cate;
                    saveData();
                    renderAll();
                };
                list.appendChild(li);
            });
        }
        function addCategory(){
            const name = document.getElementById('cateName').value.trim();
            if(!name) return alert("请输入分类名称");
            if(data.categories.includes(name)) return alert("分类已存在");
            data.categories.push(name);
            document.getElementById('cateName').value = "";
            saveData();
            renderAll();
            addVersionSnapshot(`新增分类 “${name}”`);
        }
        function delCategory(cate){
            if(!confirm("确定删除该分类及所有关联SQL？")) return;
            data.categories = data.categories.filter(c=>c!==cate);
            data.sqlList = data.sqlList.filter(s=>s.cate!==cate);
            if(data.currentCate === cate) data.currentCate = data.categories[0] || "";
            saveData();
            renderAll();
            addVersionSnapshot(`删除分类 “${cate}”`);
        }
        function renameCategory(oldName){
            let newName = prompt("请输入新分类名称", oldName);
            if(!newName) return;
            if(newName !== oldName && data.categories.includes(newName)) return alert("分类名称已存在");
            data.categories = data.categories.map(c=>c===oldName?newName:c);
            data.sqlList.forEach(s=>{if(s.cate === oldName) s.cate = newName;});
            if(data.currentCate === oldName) data.currentCate = newName;
            saveData();
            renderAll();
            showToast("分类重命名成功");
            addVersionSnapshot(`重命名分类 “${oldName}” -> “${newName}”`);
        }
        function saveSql(){
            const title = document.getElementById('sqlTitle').value.trim();
            const content = document.getElementById('sqlContent').value.trim();
            if(!title || !content) return alert("请填写名称和SQL内容");
            let editDom = document.getElementById('editId');
            if(editDom){
                let id = editDom.value;
                let idx = data.sqlList.findIndex(item=>item.id == id);
                const oldTitle = data.sqlList[idx].title;
                data.sqlList[idx] = {id:id, title, content, cate:data.currentCate, time:Date.now()};
                editDom.remove();
                addVersionSnapshot(`编辑SQL “${oldTitle}” -> “${title}”`);
            }else{
                data.sqlList.push({
                    id: Date.now(),
                    title,
                    content,
                    cate: data.currentCate,
                    time: Date.now()
                });
                addVersionSnapshot(`新增SQL “${title}”`);
            }
            const uniqueIdMap = new Map();
            data.sqlList = data.sqlList.filter(item=>{
                if(uniqueIdMap.has(item.id)) return false;
                uniqueIdMap.set(item.id, true);
                return true;
            });
            document.getElementById('sqlTitle').value = "";
            document.getElementById('sqlContent').value = "";
            saveData();
            renderAll();
            showToast("SQL保存成功");
        }

        // ========== 修复 renderSql：超长 SQL 截断，默认折叠 ==========
        function renderSql(){
            const list = document.getElementById('sqlList');
            let items = data.sqlList.filter(item=>item.cate === data.currentCate);
            if(data.config.sortBy === 'name'){
                items.sort((a,b)=> data.config.sortOrder === 'asc' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title));
            }else{
                items.sort((a,b)=> data.config.sortOrder === 'asc' ? a.time - b.time : b.time - a.time);
            }
            if(items.length === 0){
                list.innerHTML = '<div class="text-center py-10 text-gray-500">暂无保存的SQL</div>';
                return;
            }
            list.innerHTML = "";
            const collapseH = data.config.collapseHeight + "px";
            items.forEach(item=>{
                const fullSql = item.content;
                let displaySql = fullSql;
                let isTruncated = false;
                if (fullSql.length > DISPLAY_TRUNCATE_LEN) {
                    displaySql = fullSql.substring(0, DISPLAY_TRUNCATE_LEN) + "\n... [已截断，点击展开查看完整内容]";
                    isTruncated = true;
                }
                const highlighted = highlightSql(displaySql);
                const div = document.createElement('div');
                div.className = 'bg-white/40 dark:bg-gray-800/40 rounded-xl p-4 border border-white/50';
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-file-text-o text-primary"></i>
                            <span class="font-medium sql-card-title">${escapeHtml(item.title)}</span>
                            ${item.content.length > MAX_CELL_TEXT_LEN ? '<span class="text-red-400 text-xs">[超长SQL]</span>' : ''}
                            ${isTruncated ? '<span class="text-yellow-400 text-xs ml-2">[已截断]</span>' : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copySql(${item.id})" class="bg-primary/20 text-primary px-3 py-1 rounded text-sm"><i class="fa fa-copy"></i> 复制</button>
                            <button onclick="editSql(${item.id})" class="bg-green-100 dark:bg-green-900/30 text-green-600 px-3 py-1 rounded text-sm"><i class="fa fa-pencil"></i> 编辑</button>
                            <button onclick="delSql(${item.id})" class="bg-red-100 text-red-600 px-3 py-1 rounded text-sm"><i class="fa fa-trash"></i> 删除</button>
                        </div>
                    </div>
                    <div id="sql-${item.id}" class="sql-content-collapsed bg-gray-100 dark:bg-gray-800/60 p-3 rounded-lg font-mono text-sm whitespace-pre-wrap" style="max-height:${collapseH}">
                        ${highlighted}
                    </div>
                    <div class="text-center mt-2">
                        <button onclick="toggleSql(${item.id}, ${item.content.length > DISPLAY_TRUNCATE_LEN ? item.content.replace(/[\\"]/g, '\\$&') : 'null'})" class="text-primary text-sm">
                            <i class="fa fa-chevron-down"></i> 展开
                        </button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // 由于需要传递完整SQL用于展开，修改 toggleSql 支持完整内容
        window.toggleSql = function(id, fullSqlArg) {
            const el = document.getElementById(`sql-${id}`);
            const btn = el.nextElementSibling.querySelector('button');
            const isCollapsed = el.classList.contains('sql-content-collapsed');
            if (isCollapsed) {
                // 展开：需要加载完整内容（如果是截断的）
                const currentContent = el.innerText.trim();
                // 如果当前内容包含截断标记，则需要从数据中获取完整SQL
                if (fullSqlArg && currentContent.includes('[已截断]')) {
                    const fullSql = fullSqlArg;
                    const highlightedFull = highlightSql(fullSql);
                    el.innerHTML = highlightedFull;
                }
                el.classList.remove('sql-content-collapsed');
                btn.innerHTML = '<i class="fa fa-chevron-up"></i> 收起';
            } else {
                el.classList.add('sql-content-collapsed');
                btn.innerHTML = '<i class="fa fa-chevron-down"></i> 展开';
            }
        };

        function copySql(id){
            let sql = data.sqlList.find(item=>item.id == id).content;
            navigator.clipboard.writeText(sql).then(()=>showToast("复制成功"));
        }
        function editSql(id){
            let item = data.sqlList.find(item=>item.id == id);
            document.getElementById('sqlTitle').value = item.title;
            document.getElementById('sqlContent').value = item.content;
            let input = document.createElement('input');
            input.type = 'hidden';
            input.id = 'editId';
            input.value = id;
            document.querySelector('.md\\:col-span-3').appendChild(input);
        }
        function delSql(id){
            if(!confirm("确定删除这条SQL？")) return;
            const sqlItem = data.sqlList.find(item=>item.id == id);
            data.sqlList = data.sqlList.filter(item=>item.id != id);
            saveData();
            renderAll();
            addVersionSnapshot(`删除SQL “${sqlItem.title}”`);
        }

        // 导出ZIP和导入ZIP函数（与之前相同，此处保留完整）
        async function exportSqlZip() {
            try {
                if (!data.sqlList || data.sqlList.length === 0) {
                    alert("暂无SQL记录，无法导出");
                    return;
                }
                showToast("正在打包备份ZIP文件...");
                const zip = new JSZip();
                const sqlFolder = zip.folder("sql_files");
                const wroteTxtIds = new Set();

                const header = ["分类名称","SQL唯一ID","SQL备注标题","SQL内容/超长文本文件名","创建时间戳"];
                const sheetRows = [header];

                data.sqlList.forEach(sqlItem => {
                    const cateName = data.categories.find(c => c === sqlItem.cate) || "未分类";
                    const sqlText = sqlItem.content;
                    const txtFileName = `${sqlItem.id}.sql.txt`;
                    let cellDisplayText;

                    if(sqlText.length <= MAX_CELL_TEXT_LEN){
                        cellDisplayText = sqlText;
                    }else{
                        cellDisplayText = `【超长SQL，请查看sql_files/${txtFileName}】`;
                        if(!wroteTxtIds.has(sqlItem.id)){
                            sqlFolder.file(txtFileName, sqlText, {encoding:"utf-8"});
                            wroteTxtIds.add(sqlItem.id);
                        }
                    }

                    sheetRows.push([
                        cateName,
                        String(sqlItem.id),
                        sqlItem.title,
                        cellDisplayText,
                        sqlItem.time
                    ]);
                });

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(sheetRows);
                for(let r = 0; r < sheetRows.length; r++){
                    const cellAddr = XLSX.utils.encode_cell({r, c: 1});
                    if(ws[cellAddr]) ws[cellAddr].t = 's';
                }
                ws['!cols'] = [{wch:16},{wch:20},{wch:30},{wch:120},{wch:16}];
                const range = ws['!ref'] ? XLSX.utils.decode_range(ws['!ref']) : null;
                if(range){
                    for(let r = range.s.r; r <= range.e.r; r++){
                        const cellKey = XLSX.utils.encode_cell({r, c: 3});
                        if(ws[cellKey]) ws[cellKey].s = { alignment: { wrapText: true, vertical: "top" } };
                    }
                }
                XLSX.utils.book_append_sheet(wb, ws, "SQL索引表");
                const xlsxBuf = XLSX.write(wb, {type:"array", bookType:"xlsx"});
                zip.file("SQL索引表.xlsx", xlsxBuf);

                const zipBuf = await zip.generateAsync({ type:"uint8array", compression: "DEFLATE", compressionOptions: { level: 6 } });
                const blob = new Blob([zipBuf], {type:"application/x-zip-compressed"});
                const dateStr = new Date().toLocaleDateString().replace(/[\/:]/g,"-");
                saveAs(blob, `SQL完整备份_${dateStr}.zip`);
                showToast("ZIP导出完成！");
            } catch(err){
                alert("导出出错："+err.message);
            }
        }
        function triggerZipImport(){
            document.getElementById("zipImportFile").click();
        }
        document.getElementById("zipImportFile").onchange = async function(e){
            const file = e.target.files[0];
            if(!file) return;
            try{
                showToast("正在解析ZIP备份包...");
                const zipData = await JSZip.loadAsync(file);
                const xlsxFile = zipData.file("SQL索引表.xlsx");
                if(!xlsxFile) throw new Error("压缩包内未找到SQL索引表.xlsx");
                const xlsxBuf = await xlsxFile.async("arraybuffer");
                const wb = XLSX.read(xlsxBuf, {type:"array"});
                const ws = wb.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(wb.Sheets[ws], {header:1});
                if(jsonData.length <=1) throw new Error("索引表格无有效数据");

                const newCateSet = new Set();
                const tempSqlMap = new Map();
                const sqlFolder = zipData.folder("sql_files");
                const fileCache = new Map();
                for(const filePath of Object.keys(sqlFolder.files)){
                    const zipFile = sqlFolder.file(filePath);
                    if(!zipFile || zipFile.dir) continue;
                    const txtContent = await zipFile.async("string");
                    const sqlId = filePath.replace(".sql.txt","");
                    fileCache.set(sqlId, txtContent);
                }

                for(let i=1; i<jsonData.length; i++){
                    const row = jsonData[i];
                    if(!row || row.length <5) continue;
                    const [cateName, sqlId, sqlTitle, cellText, sqlTime] = row;
                    newCateSet.add(cateName);
                    let fullSql;
                    if(cellText.startsWith("【超长SQL，请查看sql_files/")){
                        fullSql = fileCache.get(String(sqlId)) || "";
                    }else{
                        fullSql = cellText;
                    }
                    tempSqlMap.set(String(sqlId), {
                        id: sqlId,
                        cate: cateName,
                        title: sqlTitle,
                        time: sqlTime,
                        content: fullSql
                    });
                }

                const newSqlList = Array.from(tempSqlMap.values());
                const mergeCategories = [...new Set([...data.categories, ...newCateSet])];
                if(confirm("导入将合并分类，同ID SQL覆盖，确认导入？")){
                    const idMap = new Map();
                    newSqlList.forEach(item => idMap.set(String(item.id), item));
                    const remainSql = data.sqlList.filter(old => !idMap.has(String(old.id)));
                    const finalSql = [...remainSql, ...newSqlList];
                    data.categories = mergeCategories;
                    data.sqlList = finalSql;
                    const uniqueIdMap = new Map();
                    data.sqlList = data.sqlList.filter(item=>{
                        if(uniqueIdMap.has(item.id)) return false;
                        uniqueIdMap.set(item.id, true);
                        return true;
                    });
                    saveData();
                    addVersionSnapshot("导入ZIP备份包");
                    location.reload();
                    alert("ZIP备份导入成功，页面刷新加载全部数据");
                }
            }catch(err){
                alert("导入解析失败："+err.message);
            }
        };

        async function backupToCloud(){
            const sql = localStorage.getItem("sqlTool");
            if(!sql) return alert("暂无SQL数据可备份");
            try{
                await fetch(`${SUPA_URL}/rest/v1/sqlbackup`,{ method:"POST", headers:{ "apikey":SUPA_KEY, "Content-Type":"application/json" }, body:JSON.stringify({ device_id:DEVICE_ID, backup_time:new Date().toLocaleString(), sql_data:sql }) });
                showToast("✅ 云端备份成功！");
                addVersionSnapshot("手动云端备份");
            }catch(e){ alert("❌ 备份失败："+e.message); }
        }
        async function restoreFromCloud(){
            if(!confirm("恢复将覆盖本地全部现有数据，确定吗？")) return;
            try{
                const res = await fetch(`${SUPA_URL}/rest/v1/sqlbackup?device_id=eq.${DEVICE_ID}&order=backup_time.desc&limit=1`,{ headers:{"apikey":SUPA_KEY} });
                const arr = await res.json();
                if(!arr || arr.length===0) return alert("暂无云端备份记录");
                localStorage.setItem("sqlTool",arr[0].sql_data);
                addVersionSnapshot("从云端恢复数据");
                location.reload();
                alert("✅ 云端数据恢复成功！");
            }catch(e){ alert("❌ 恢复失败："+e.message); }
        }
        function autoSaveCloud(){
            clearTimeout(autoTimer);
            autoTimer = setTimeout(async()=>{
                const sql = localStorage.getItem("sqlTool");
                if(!sql) return;
                try{
                    await fetch(`${SUPA_URL}/rest/v1/sqlbackup`,{ method:"POST", headers:{ "apikey":SUPA_KEY, "Content-Type":"application/json" }, body:JSON.stringify({ device_id:DEVICE_ID, backup_time:new Date().toLocaleString(), sql_data:sql }) });
                    console.log("✅自动云端备份成功");
                }catch(e){ console.log("❌自动备份异常",e) }
            },3000);
        }
        function renderAll(){
            renderCate();
            renderSql();
        }
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.saveSql = saveSql;
        window.delSql = delSql;
        window.editSql = editSql;
        window.copySql = copySql;
        window.toggleSql = toggleSql;
        window.addCategory = addCategory;
        window.delCategory = delCategory;
        window.renameCategory = renameCategory;
        window.setCollapseHeight = setCollapseHeight;
        window.toggleSort = toggleSort;
        window.toggleTheme = toggleTheme;
        window.backupToCloud = backupToCloud;
        window.restoreFromCloud = restoreFromCloud;
        window.exportSqlZip = exportSqlZip;
        window.triggerZipImport = triggerZipImport;

        initTheme();
        renderAll();
        renderVersionHistory();
    </script>
</body>
</html>
