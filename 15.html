<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script>

            theme: {
                extend: {
                    colors: {
                        fluidBlue: '#0099FF',

        <div class="fluid-frosted-heavy rounded-fluid-lg p-6 md:p-8 mb-8">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-gradient-to-r from-fluidBlue to-fluidOrange inline-flex items-center justify-center text-xs">1</span>
                生成规则配置
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>

                        <input id="superOrg" placeholder="" class="fluid-input w-full max-w-48 rounded-fluid-sm px-3 py-2.5">
                        <select id="superOrgSel" class="fluid-select rounded-fluid-sm px-2 py-2.5 w-48"></select>
                        <button onclick="add('superOrg')" class="fluid-btn bg-gradient-to-r from-fluidBlue to-fluidOrange px-3 py-2.5 rounded-fluid-sm shadow-btnGlow">

                        </button>
                    </div>
                </div>
                <div>
                    <label class="block mb-2 text-sm text-fluidTextMuted">角色（内置下拉选择）</label>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

                        <input id="prefix" value="xfgl_" class="fluid-input w-full max-w-48 rounded-fluid-sm px-3 py-2.5">
                        <select id="prefixSel" class="fluid-select rounded-fluid-sm px-2 py-2.5 w-48"></select>
                        <button onclick="add('prefix')" class="fluid-btn bg-gradient-to-r from-fluidBlue to-fluidOrange px-3 py-2.5 rounded-fluid-sm shadow-btnGlow">
                            <i class="fa fa-plus"></i>

                    </div>
                </div>

                    <label class="block mb-2 text-sm text-fluidTextMuted">分类码</label>
                    <div class="flex gap-2 items-center">

                        <select id="typeCodeSel" class="fluid-select rounded-fluid-sm px-2 py-2.5 w-48"></select>
                        <button onclick="add('typeCode')" class="fluid-btn bg-gradient-to-r from-fluidBlue to-fluidOrange px-3 py-2.5 rounded-fluid-sm shadow-btnGlow">
                            <i class="fa fa-plus"></i>
                        </button>
                    </div>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

                    <label class="block mb-2 text-sm text-fluidTextMuted">后缀模板（用N代表序号）</label>

                        <button onclick="add('suffix')" class="fluid-btn bg-gradient-to-r from-fluidBlue to-fluidOrange px-3 py-2.5 rounded-fluid-sm shadow-btnGlow">

                    </div>

                    <label class="block mb-2 text-sm text-fluidTextMuted">每个单位生成数量</label>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-2">

                    <textarea id="phoneList" class="fluid-input w-full h-32 rounded-fluid-sm p-3 resize-none"></textarea>
                </div>
            </div>
            <p class="text-fluidOrange text-xs mb-8">匹配规则：1.行内「上级|所属机构」强制指定；2.自动读取org-map.xlsx（表头parent_name/org_name）匹配；3.无匹配统一使用兜底上级；红色标注未匹配单位</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <button onclick="generate()" class="fluid-btn bg-gradient-to-r from-fluidBlue via-fluidPurple to-fluidOrange py-3 rounded-fluid-sm font-medium shadow-btnGlow">
                    <i class="fa fa-magic mr-1"></i>一键生成账号
                </button>
                <button onclick="exportXLSX()" class="fluid-btn bg-gradient-to-r from-fluidOrange via-fluidPurple to-fluidBlue py-3 rounded-fluid-sm font-medium shadow-btnGlow">
                    <i class="fa fa-download mr-1"></i>导出XLSX
                </button>

                    <i class="fa fa-trash mr-1 text-fluidOrange"></i>清空内容
                </button>
                <button onclick="resetSerial()" class="fluid-btn bg-white/5 border border-fluidBorder py-3 rounded-fluid-sm font-medium">
                    <i class="fa fa-refresh mr-1 text-fluidBlue"></i>重置流水号（从1开始）

        <div class="fluid-frosted rounded-fluid-lg p-6 md:p-8">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-gradient-to-r from-fluidPurple to-fluidOrange inline-flex items-center justify-center text-xs">2</span>
                生成结果预览
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-fluidBorder">
                            <th class="text-left py-3 px-4 text-fluidTextMuted font-normal">序号</th>
                            <th class="text-left py-3 px-4 text-fluidTextMuted font-normal">上级机构</th>
                            <th class="text-left py-3 px-4 text-fluidTextMuted font-normal">所属机构</th>
                            <th class="text-left py-3 px-4 text-fluidTextMuted font-normal">角色</th>
                            <th class="text-left py-3 px-4 font-mono bg-gradient-to-r from-fluidBlue to-fluidOrange bg-clip-text text-transparent font-normal">登录账号/用户名</th>
                            <th class="text-left py-3 px-4 text-fluidTextMuted font-normal">手机号</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
// 粒子动画
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let particles = [];
const particleColors = [
    'rgba(0,153,255,',
    'rgba(255,153,68,',
    'rgba(153,119,221,'
];

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.radius = Math.random() * 2.6 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.45;
        this.speedY = (Math.random() - 0.5) * 0.45;
        this.opacity = Math.random() * 0.38 + 0.08;
        this.color = particleColors[Math.floor(Math.random() * particleColors.length)];
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `${this.color}${this.opacity})`;
        ctx.fill();
    }
}
function initParticles(count = 80) {
    particles = [];
    for (let i = 0; i < count; i++) particles.push(new Particle());
}
initParticles();
function animateParticles() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// ===================== 业务全局变量 =====================
let resultData = [];
const KEY = "global_serial_no";
let orgMapping = [];
let excelLoadSuccess = false;
let matchDebounceTimer = null;

// 内置完整角色列表
const roleList = [
    "超级管理员", "特级管理员", "二级管理员", "重置密码", "教育厅制证二级管理员", "教育厅管理员", "校服系统管理员",
    "教育装备自治区管理人员", "盟市管理员", "普通角色", "测试角色", "基教处证照设置人员", "u-key登录",
    "购买校服举报", "违规招生举报", "违规征订教材", "我和我的老师", "老师，我想对您说", "我心中的好老师",
    "教育世家", "随手拍", "师德师风", "举报反馈", "校园餐", "校外培训", "校园餐投诉举报", "教师减负",
    "补课举报", "报平安人员", "报平安发布统计", "调查问卷", "教师资格证审批", "教师资格证申请", "竞赛单位", "教育局竞赛单位填报审核人员",
    "职业技术学校批量编辑", "批量编辑", "义务教育和高中教育学校证照制作负责人", "个人签名负责人", "学校盖章负责人",
    "手动导入学号并制高中毕业证", "职业技术学校证照制作负责人", "教育局数据审核人员", "基教处数据审核", "教育局盖章人员",
    "教育局证照签发确定人员", "校服管理", "报告学校角色", "报告旗县角色", "报告盟市角色", "学校校服上报", "教育局校服备案"
];

// 更新组织机构文件加载状态显示
function updateOrgFileStatus(text, colorClass, icon) {
    const statusDom = document.getElementById("orgFileStatus");
    statusDom.className = `fluid-frosted rounded-fluid-sm py-2 px-4 inline-block text-sm ${colorClass}`;
    statusDom.innerHTML = `<i class="fa ${icon} mr-1"></i>${text}`;
}

// 读取Excel组织机构映射文件【已适配你的表头 parent_name / org_name】
async function loadOrgMapping() {
    updateOrgFileStatus("正在加载 org-map.xlsx ...", "text-warnYellow", "fa-spinner fa-spin");
    try {
        const res = await fetch("./org-map.xlsx");
        if (!res.ok) throw new Error("文件不存在或路径错误，请确认文件名为org-map.xlsx且和index.html同目录");
        const arrayBuffer = await res.arrayBuffer();
        // 解析Excel文件
        const workbook = XLSX.read(arrayBuffer, { type: "array" });
        // 取第一个工作表
        const sheetName = workbook.SheetNames[0];
        const worksheet = workbook.Sheets[sheetName];
        // 转换为JSON数组
        const jsonData = XLSX.utils.sheet_to_json(worksheet);
        // 校验你的表头：必须存在 parent_name（上级）、org_name（所属）
        if (jsonData.length === 0 || !jsonData[0].hasOwnProperty("parent_name") || !jsonData[0].hasOwnProperty("org_name")) {
            throw new Error("Excel表头必须包含两列：parent_name（上级机构）、org_name（所属机构），C列full_path无需处理");
        }
        // 转换为映射数组，自动去除空格、空行
        orgMapping = jsonData.map(item => ({
            belongOrg: String(item["org_name"]).trim(),
            superOrg: String(item["parent_name"]).trim()
        })).filter(item => item.belongOrg && item.superOrg);
        excelLoadSuccess = true;
        updateOrgFileStatus(`组织机构Excel加载成功，共${orgMapping.length}条上下级对应关系`, "text-successGreen", "fa-check-circle");
    } catch (e) {
        excelLoadSuccess = false;
        orgMapping = [];
        updateOrgFileStatus(`组织机构Excel加载失败：${e.message}，本地打开会跨域拦截，部署GitHub Pages可正常读取`, "text-dangerRed", "fa-times-circle");
    }
}

// 根据所属机构匹配上级
function getSuperByBelong(name) {
    const item = orgMapping.find(o => o.belongOrg === name);
    return item ? item.superOrg : null;
}

// 实时解析所属机构，底部预览匹配结果（输入防抖）
function realTimeMatchPreview() {
    clearTimeout(matchDebounceTimer);
    matchDebounceTimer = setTimeout(() => {
        const unitRawList = document.getElementById("unitList").value.split("\n").map(i => i.trim()).filter(Boolean);
        const defaultSuper = document.getElementById("superOrg").value.trim();
        const boxDom = document.getElementById("realTimeMatchBox");
        if (unitRawList.length === 0) {
            boxDom.innerHTML = "<span class='text-fluidTextMuted'>输入所属机构后实时展示匹配结果</span>";
            return;
        }
        let html = "";
        let missingCount = 0;
        unitRawList.forEach((rawUnit, idx) => {
            let superOrg, belongOrg;
            if (rawUnit.includes("|")) {
                const arr = rawUnit.split("|").map(i => i.trim());
                superOrg = arr[0];
                belongOrg = arr[1];
                html += `<div class="mb-1"><span class="text-fluidBlue">${idx+1}.强制指定</span>：${belongOrg} → ${superOrg}</div>`;
            } else {
                belongOrg = rawUnit;
                const mapSuper = getSuperByBelong(belongOrg);
                if (mapSuper) {
                    superOrg = mapSuper;
                    html += `<div class="mb-1"><span class="text-successGreen">${idx+1}.匹配成功</span>：${belongOrg} → ${superOrg}</div>`;
                } else {
                    superOrg = defaultSuper || "无兜底上级";
                    missingCount++;
                    html += `<div class="mb-1"><span class="text-dangerRed">${idx+1}.未匹配</span>：${belongOrg} → ${superOrg}</div>`;
                }
            }
        });
        if(missingCount > 0){
            html = `<div class="text-dangerRed mb-2">共${missingCount}个单位未在org-map.xlsx找到对应上级</div>` + html;
        }
        boxDom.innerHTML = html;
    }, 300);
}

// 初始化角色下拉
function initRoleSelect() {
    const sel = document.getElementById("roleSel");
    sel.innerHTML = "";
    roleList.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        sel.appendChild(opt);
    });
    sel.value = "普通角色";
}

// 流水号
function getStart(count) {
    let cur = parseInt(localStorage.getItem(KEY) || "1");
    localStorage.setItem(KEY, cur + count);
    return cur;
}
function resetSerial() {
    if (confirm("确定重置流水号？下次生成从00001开始！")) {
        localStorage.setItem(KEY, "1");
        alert("流水号重置完成");
    }
}

// 历史下拉缓存
function loadSel(key) {
    const list = JSON.parse(localStorage.getItem(key + "_list") || "[]");
    const sel = document.getElementById(key + "Sel");
    sel.innerHTML = "";
    list.forEach(v => {
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        sel.appendChild(o);
    });
    sel.onchange = () => document.getElementById(key).value = sel.value;
}
function add(key) {
    const val = document.getElementById(key).value.trim();
    if (!val) return alert("请输入内容");
    let list = JSON.parse(localStorage.getItem(key + "_list") || "[]");
    if (!list.includes(val)) list.push(val);
    localStorage.setItem(key + "_list", JSON.stringify(list));
    loadSel(key);
}

// 核心生成逻辑：批量匹配 + 缺失机构弹窗提醒
function generate() {
    const prefix = document.getElementById("prefix").value || "xfgl_";
    const typeCode = document.getElementById("typeCode").value || "";
    const suffixTemplate = document.getElementById("suffix").value || "";
    const countPerUnit = Number(document.getElementById("countPerUnit").value) || 1;
    const defaultSuper = document.getElementById("superOrg").value.trim();
    const role = document.getElementById("roleSel").value;

    const unitRawList = document.getElementById("unitList").value.split("\n").map(i => i.trim()).filter(Boolean);
    const phoneList = document.getElementById("phoneList").value.split("\n").map(i => i.trim()).filter(Boolean);
    if (unitRawList.length === 0) return alert("请填写所属机构列表");

    let missingOrgList = [];
    let html = "";
    resultData = [];
    const total = unitRawList.length * countPerUnit;
    const startNo = getStart(total);
    let rowIndex = 1;

    unitRawList.forEach((rawUnit, idx) => {
        let superOrg, belongOrg;
        if (rawUnit.includes("|")) {
            const arr = rawUnit.split("|").map(i => i.trim());
            superOrg = arr[0];
            belongOrg = arr[1];
        } else {
            belongOrg = rawUnit;
            const mapSuper = getSuperByBelong(belongOrg);
            if (mapSuper) {
                superOrg = mapSuper;
            } else {
                missingOrgList.push(belongOrg);
                superOrg = defaultSuper;
            }
        }
        const phone = phoneList[idx] || "";
        for (let n = 1; n <= countPerUnit; n++) {
            const globalSerial = startNo + idx * countPerUnit + (n - 1);
            const serial5 = String(globalSerial).padStart(5, "0");
            const suffix = suffixTemplate.replace(/N/g, n);
            const account = prefix + typeCode + serial5 + suffix;
            resultData.push({
                index: rowIndex,
                superOrg: superOrg,
                belongOrg: belongOrg,
                role: role,
                loginAccount: account,
                userName: account,
                phone: phone
            });
            html += `<tr class="fluid-table-row">
                <td class="py-3 px-4">${rowIndex}</td>
                <td class="py-3 px-4">${superOrg || "无上级"}</td>
                <td class="py-3 px-4">${belongOrg}</td>
                <td class="py-3 px-4">${role}</td>
                <td class="py-3 px-4 font-mono bg-gradient-to-r from-fluidBlue to-fluidOrange bg-clip-text text-transparent">${account}</td>
                <td class="py-3 px-4">${phone}</td>
            </tr>`;
            rowIndex++;
        }
    });

    if (missingOrgList.length > 0) {
        alert(`以下${missingOrgList.length}个所属机构未在org-map.xlsx中匹配到上级机构：\n${missingOrgList.join("、")}\n可修改Excel补充对应行，或使用「上级|所属机构」格式强制指定`);
    }
    document.getElementById("tbody").innerHTML = html;
    alert(`✅ 生成完成\n起始流水号：${startNo}\n总条数：${total}\n未匹配上级单位：${missingOrgList.length}个`);
}

// 导出XLSX文件，自动设置最适合的列宽和行高
function exportXLSX() {
    if (!resultData.length) return alert("请先生成账号");
    // 准备表头和数据
    const headers = ["上级机构名称", "所属机构名称", "角色", "登陆账号", "用户名称", "手机号"];
    const data = [headers];
    resultData.forEach(item => {
        data.push([
            item.superOrg || "",
            item.belongOrg || "",
            item.role || "",
            item.loginAccount || "",
            item.userName || "",
            item.phone || ""
        ]);
    });
    // 生成工作表
    const ws = XLSX.utils.aoa_to_sheet(data);
    // 设置最适合的列宽
    const colWidths = [];
    for (let col = 0; col < headers.length; col++) {
        let maxLen = 0;
        for (let row = 0; row < data.length; row++) {
            const cellVal = String(data[row][col] || "");
            // 计算内容长度，中文按2字符算，英文按1
            const len = cellVal.split("").reduce((acc, char) => {
                return acc + (char.charCodeAt(0) > 255 ? 2 : 1);
            }, 0);
            if (len > maxLen) maxLen = len;
        }
        // 设置列宽，最小8，最大50，乘以1.2倍留白保证美观
        colWidths.push({ wch: Math.min(Math.max(maxLen * 1.2, 8), 50) });
    }
    ws['!cols'] = colWidths;
    // 设置最适合的行高，表头24px，数据行20px
    const rowHeights = [];
    for (let row = 0; row < data.length; row++) {
        rowHeights.push({ hpx: row === 0 ? 24 : 20 });
    }
    ws['!rows'] = rowHeights;
    // 生成工作簿
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "账号数据");
    // 导出文件
    XLSX.writeFile(wb, "账号导入模板.xlsx");
}

function clearAll() {
    document.getElementById("unitList").value = "";
    document.getElementById("phoneList").value = "";
    document.getElementById("tbody").innerHTML = "";
    document.getElementById("realTimeMatchBox").innerHTML = "<span class='text-fluidTextMuted'>输入所属机构后实时展示匹配结果</span>";
    resultData = [];
}
