<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>管理局用户查询工具 · 毛玻璃粒子版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0c12;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== 3D 粒子画布背景 ===== */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 30% 20%, #0a0a1a, #020308);
        }

        /* ===== 鼠标跟随光晕 ===== */
        .mouse-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        /* ===== 主容器 — 毛玻璃卡片 ===== */
        .glass-container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 1000px;
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(139, 92, 246, 0.35);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 2.2rem 2rem 2.5rem;
        }

        .glass-container:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.65);
            box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.25) inset;
        }

        /* 标题区 */
        .title-section {
            text-align: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.6rem;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 1px dashed rgba(139, 92, 246, 0.5);
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        /* 模式切换按钮 */
        .mode-switch {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .mode-btn {
            background: linear-gradient(95deg, #8b5cf655, #06b6d455);
            border: 1px solid #8b5cf6;
            color: #fff;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .mode-btn:hover {
            transform: scale(1.05);
            border-color: #06b6d4;
        }

        /* 步骤卡片 — 毛玻璃子面板 */
        .step-card {
            margin: 1.8rem 0;
            padding: 1.6rem 1.8rem;
            background: rgba(20, 30, 50, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(139, 92, 246, 0.25);
            transition: all 0.25s ease;
        }

        .step-card:hover {
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(25, 38, 60, 0.55);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.08);
        }

        .step-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.2rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: #a78bfa;
            letter-spacing: 0.5px;
            border-left: 3px solid #06b6d4;
            padding-left: 14px;
        }

        .step-title::before {
            content: "✨";
            font-size: 1rem;
        }

        /* 输入框组 */
        .input-group {
            margin: 0.8rem 0 1.2rem 0;
        }

        .glass-input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(10, 18, 30, 0.7);
            border: 1.5px solid rgba(139, 92, 246, 0.35);
            border-radius: 1.2rem;
            font-size: 0.9rem;
            color: #e2e8f0;
            transition: all 0.25s ease;
            outline: none;
        }

        .glass-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
            background: rgba(20, 32, 50, 0.8);
        }

        .glass-input::placeholder {
            color: #5c6f87;
        }

        /* 按钮组 — 流光霓虹风 */
        .btn-group {
            display: flex;
            gap: 1rem;
            margin: 1rem 0 1.2rem;
            flex-wrap: wrap;
        }

        .glass-btn {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 0.7rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #e0e7ff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .glass-btn:hover::before {
            left: 100%;
        }

        .glass-btn:hover {
            transform: translateY(-2px);
            border-color: #a78bfa;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
            color: white;
        }

        .btn-copy {
            background: linear-gradient(95deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.15));
            border-color: rgba(6, 182, 212, 0.6);
        }

        /* SQL 输出文本框 */
        .sql-output {
            width: 100%;
            min-height: 150px;
            padding: 1rem 1.2rem;
            background: rgba(8, 15, 25, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 1.2rem;
            font-size: 0.8rem;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            color: #b9e6f3;
            resize: vertical;
            line-height: 1.6;
            transition: all 0.2s;
        }

        .sql-output:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
        }

        /* 提示小字 */
        .info-tip {
            font-size: 0.7rem;
            color: #7e8ba0;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-tip span {
            background: rgba(139, 92, 246, 0.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 6px;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .glass-container {
                padding: 1.3rem;
            }
            .step-card {
                padding: 1rem;
            }
            .btn-group {
                gap: 0.8rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="glass-container">
        <div class="title-section">
            <h1>📋 管理局用户查询工具</h1>
            <div class="sub">⚡ 两步法 · 毛玻璃粒子 · 精准SQL生成</div>
        </div>

        <div class="mode-switch">
            <button class="mode-btn" id="modeBtn">🔀 切换到两步模式</button>
        </div>

        <!-- ========= 第一步 ========= -->
        <div class="step-card" id="step1">
            <div class="step-title" id="stepTitle">部门名称 → 一键生成最终SQL</div>
            <div class="input-group">
                <input type="text" id="deptName" class="glass-input" placeholder="" value="">
                <div class="info-tip"><span>💡 支持模糊匹配</span> 大青山/呼和浩特/包头/乌兰察布分局</div>
            </div>
            <div class="btn-group" id="btnGroup1">
                <button class="glass-btn" id="genStep1Btn">⚡ 生成查ID SQL</button>
                <button class="glass-btn btn-copy" id="copyStep1Btn">📋 复制SQL</button>
                <button class="glass-btn" id="genDirectBtn" style="background: linear-gradient(95deg, #06b6d433, #8b5cf633); border-color: #06b6d4;">🚀 一键生成最终SQL</button>
            </div>
            <textarea id="sql1" class="sql-output" readonly placeholder="SQL将显示在这里..."></textarea>
        </div>

        <!-- ========= 第二步 ========= -->
        <div class="step-card" id="step2">
            <div class="step-title">第二步：部门ID → 生成查询用户的SQL</div>
            <div class="input-group">
                <input type="text" id="deptId" class="glass-input" placeholder="" value="">
                <div class="info-tip"><span>🔑 自动去除数字逗号</span> 支持多个ID组合 (使用 / 分隔)</div>
            </div>
            <div class="btn-group">
                <button class="glass-btn" id="genStep2Btn">⚡ 生成SQL</button>
                <button class="glass-btn btn-copy" id="copyStep2Btn">📋 复制SQL</button>
            </div>
            <textarea id="sql2" class="sql-output" readonly placeholder="第二步SQL将显示在这里..."></textarea>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 14);
        camera.lookAt(0, 0, 0);
        
        const particleCount = 2100;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 38;
            positions[i*3+1] = (Math.random() - 0.5) * 24;
            positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending
        });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);
        
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1400 * 3);
        for (let i = 0; i < 1400; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 44;
            pos2[i*3+1] = (Math.random() - 0.5) * 28;
            pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({
            color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending
        });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);
        
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(900 * 3);
        for (let i = 0; i < 900; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 30;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({
            color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending
        });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);
        
        const ringCount = 380;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 5.2;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
            ringPositions[i*3+2] = -1.8;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        scene.fog = new THREE.FogExp2(0x03050b, 0.008);
        
        let mouseX = 0, mouseY = 0;
        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mouseX * 0.9;
            targetCamY = mouseY * 0.6;
        });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            
            particleSys.rotation.y = time * 0.06;
            particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSys2.rotation.y = time * 0.04;
            particleSys2.rotation.z = time * 0.02;
            particleSys3.rotation.x = time * 0.03;
            ringPoints.rotation.z = time * 0.12;
            ringPoints.rotation.x = Math.sin(time * 0.25) * 0.1;
            
            camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onWindowResize);
        animate();
    </script>

    <script>
        const glowDiv = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glowDiv.style.left = e.clientX + 'px';
            glowDiv.style.top = e.clientY + 'px';
        });

        const DEPT_MAP = {
            "大青山管理局本级": "1501",
            "乌兰察布分局": "10056998",
            "包头分局": "10056997",
            "呼和浩特分局": "10056996"
        };

        let isSingleMode = true;

        // 模式切换核心逻辑
        document.getElementById('modeBtn').addEventListener('click', () => {
            isSingleMode = !isSingleMode;
            const step2 = document.getElementById('step2');
            const title = document.getElementById('stepTitle');
            const btn = document.getElementById('modeBtn');
            const g1 = document.getElementById('genStep1Btn');
            const g2 = document.getElementById('genDirectBtn');

            if (isSingleMode) {
                // 模式一：只显示一键最终SQL
                step2.style.display = 'none';
                title.innerText = '部门名称 → 一键生成最终SQL';
                btn.innerText = '🔀 切换到两步模式';
                g1.style.display = 'none';
                g2.style.display = 'flex';
            } else {
                // 模式二：显示传统两步，隐藏一键按钮
                step2.style.display = 'block';
                title.innerText = '第一步：部门名称 → 生成查ID的SQL';
                btn.innerText = '🔀 切换到一键模式';
                g1.style.display = 'flex';
                g2.style.display = 'none';
            }
        });

        // 第一步SQL
        function generateStep1Sql() {
            let name = document.getElementById("deptName").value.trim();
            let sql = `SELECT ID, NAME, FULLPATH FROM BASE_ORG WHERE NAME LIKE '%${name}%';`;
            document.getElementById("sql1").value = sql;
        }

        function copyStep1Sql() {
            let sqlArea = document.getElementById("sql1");
            sqlArea.select();
            navigator.clipboard.writeText(sqlArea.value).then(() => {
                showTempTip("✅ SQL已复制", "sql1");
            }).catch(() => alert("复制失败"));
        }

        // 一键最终SQL
        function generateDirectSql() {
            let inputName = document.getElementById("deptName").value.trim();
            let targetId = null;
            for (let key in DEPT_MAP) {
                if (inputName.includes(key) || key.includes(inputName)) {
                    targetId = DEPT_MAP[key];
                    break;
                }
            }
            if (!targetId) {
                document.getElementById("sql1").value = "-- 未匹配，请输入：大青山管理局本级/呼和浩特分局/包头分局/乌兰察布分局";
                return;
            }
            let sql = `SELECT
    u.NAME AS "姓名",
    u.LOGIN_CODE AS "登录账号",
    u.RANGE AS "权重",
    o.NAME AS "部门"
FROM
    BASE_USER u
LEFT JOIN
    BASE_ORG o ON u.MEMBERSHIP_ORG_ID = o.ID
WHERE
    u.IS_DELETE = 0
    AND o.FULLPATH LIKE '%/${targetId}/%'
ORDER BY
    o.NAME, u.NAME;`;
            document.getElementById("sql1").value = sql;
        }

        // 第二步SQL
        function generateStep2Sql() {
            let id = document.getElementById("deptId").value.trim().replace(/,/g, '');
            if (id === "") {
                document.getElementById("sql2").value = "-- 请输入部门ID";
                return;
            }
            let sql = `SELECT
    u.NAME AS "姓名",
    u.LOGIN_CODE AS "登录账号",
    u.RANGE AS "权重",
    o.NAME AS "部门"
FROM
    BASE_USER u
LEFT JOIN
    BASE_ORG o ON u.MEMBERSHIP_ORG_ID = o.ID
WHERE
    u.IS_DELETE = 0
    AND o.FULLPATH LIKE '%/${id}/%'
ORDER BY
    o.NAME, u.NAME;`;
            document.getElementById("sql2").value = sql;
        }

        function copyStep2Sql() {
            let sqlArea = document.getElementById("sql2");
            sqlArea.select();
            navigator.clipboard.writeText(sqlArea.value).then(() => {
                showTempTip("✅ 第二步SQL已复制", "sql2");
            }).catch(() => alert("复制失败"));
        }

        function showTempTip(msg, targetId) {
            const target = document.getElementById(targetId);
            if (!target) return;
            const tipDiv = document.createElement('div');
            tipDiv.innerText = msg;
            tipDiv.style.position = 'absolute';
            tipDiv.style.backgroundColor = '#1e293b';
            tipDiv.style.color = '#a78bfa';
            tipDiv.style.fontSize = '12px';
            tipDiv.style.padding = '4px 12px';
            tipDiv.style.borderRadius = '40px';
            tipDiv.style.border = '1px solid #a78bfa';
            tipDiv.style.backdropFilter = 'blur(8px)';
            tipDiv.style.zIndex = '100';
            tipDiv.style.whiteSpace = 'nowrap';
            tipDiv.style.pointerEvents = 'none';
            const rect = target.getBoundingClientRect();
            tipDiv.style.left = rect.left + 'px';
            tipDiv.style.top = (rect.top - 28) + 'px';
            document.body.appendChild(tipDiv);
            setTimeout(() => tipDiv.remove(), 1800);
        }

        document.getElementById('genStep1Btn').addEventListener('click', generateStep1Sql);
        document.getElementById('copyStep1Btn').addEventListener('click', copyStep1Sql);
        document.getElementById('genDirectBtn').addEventListener('click', generateDirectSql);
        document.getElementById('genStep2Btn').addEventListener('click', generateStep2Sql);
        document.getElementById('copyStep2Btn').addEventListener('click', copyStep2Sql);

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('genStep1Btn').style.display = 'none';
            document.getElementById('sql1').value = 'SQL将显示在这里...';
            document.getElementById('sql2').value = '第二步SQL将显示在这里...';
        });
    </script>
</body>
</html>
