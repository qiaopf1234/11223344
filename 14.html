<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运维周报生成器 · 赛博渐变毛玻璃版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
}

body {
  min-height: 100vh;
  background: #0b061a;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 3rem 2rem;
  position: relative;
  overflow-x: hidden;
}

/* 顶部全局渐变霓虹光晕（匹配原图顶部粉紫渐变） */
.top-gradient-glow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 420px;
  background: radial-gradient(ellipse at top center, rgba(168, 85, 247, 0.35) 0%, rgba(236, 72, 153, 0.22) 40%, transparent 72%);
  pointer-events: none;
  z-index: 1;
}

/* Three.js 粒子画布背景 */
#bg-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background: radial-gradient(circle at 20% 30%, #0e0722, #05020e);
  pointer-events: none;
}

/* 鼠标跟随光晕 */
.mouse-glow {
  position: fixed;
  width: 540px;
  height: 540px;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.18) 0%, rgba(236, 72, 153, 0) 70%);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 10;
  transition: transform 0.06s linear;
  will-change: transform;
}

/* 毛玻璃主容器 匹配原图卡片圆角与通透质感 */
.glass-container {
  position: relative;
  z-index: 20;
  width: 100%;
  max-width: 1120px;
  background: rgba(22, 12, 44, 0.38);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 28px;
  border: 1px solid rgba(168, 85, 247, 0.22);
  box-shadow: 0 24px 50px -14px rgba(0, 0, 0, 0.65), 0 0 0 1px rgba(168, 85, 247, 0.08) inset;
  transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
  padding: 2.6rem 2.4rem 2.8rem;
}

.glass-container:hover {
  transform: translateY(-4px);
  border-color: rgba(168, 85, 247, 0.48);
  box-shadow: 0 32px 56px -12px rgba(168, 85, 247, 0.22), 0 0 0 1px rgba(168, 85, 247, 0.18) inset;
}

/* 标题区 原图大渐变柔和文字 */
.title-section {
  text-align: center;
  margin-bottom: 2.6rem;
}

h2 {
  font-size: 2.2rem;
  font-weight: 700;
  background: linear-gradient(130deg, #ffffff, #c4b5fd, #f472b6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.4px;
  margin-bottom: 0.6rem;
}

.sub {
  color: #a8a29e;
  font-size: 0.86rem;
  letter-spacing: 1.2px;
  border-bottom: 1px dashed rgba(168, 85, 247, 0.4);
  display: inline-block;
  padding-bottom: 0.45rem;
}

/* 内嵌毛玻璃卡片 原图深色内嵌卡片风格 */
.glass-card-item {
  margin-bottom: 1.6rem;
  background: rgba(30, 16, 58, 0.42);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1px solid rgba(168, 85, 247, 0.18);
  padding: 1.4rem 1.6rem;
  transition: all 0.28s ease;
}

.glass-card-item:hover {
  border-color: rgba(236, 72, 153, 0.36);
  background: rgba(36, 20, 66, 0.48);
  box-shadow: 0 0 24px rgba(168, 85, 247, 0.07);
}

/* 表单标签 */
label {
  display: block;
  margin-bottom: 0.6rem;
  font-weight: 500;
  color: #c4b5fd;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}

/* 输入框 原图深色通透输入控件 */
.glass-input, .glass-select, textarea {
  width: 100%;
  padding: 0.9rem 1.1rem;
  background: rgba(14, 6, 30, 0.68);
  border: 1.5px solid rgba(168, 85, 247, 0.28);
  border-radius: 16px;
  font-size: 0.92rem;
  color: #e7e5e4;
  transition: all 0.28s ease;
  outline: none;
}

.glass-select {
  cursor: pointer;
}

.glass-input:focus, .glass-select:focus, textarea:focus {
  border-color: #a855f7;
  box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.18);
  background: rgba(20, 10, 40, 0.76);
}

textarea {
  font-family: 'Fira Code', monospace;
  resize: vertical;
  line-height: 1.55;
}

::placeholder {
  color: #78716c;
}

/* 日期双栏布局 */
.date-row {
  display: flex;
  gap: 1.2rem;
  margin-bottom: 0;
}
.date-row .glass-card-item {
  flex: 1;
  margin-bottom: 0;
}

/* 按钮行容器 */
.btn-bar, .button-group {
  display: flex;
  flex-wrap: wrap;
  gap: 0.9rem;
  margin: 0.9rem 0 0.6rem;
}

/* 基础霓虹按钮 匹配原图圆角渐变按钮 */
.neon-btn {
  position: relative;
  background: rgba(26, 14, 48, 0.6);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(168, 85, 247, 0.4);
  padding: 0.6rem 1.4rem;
  border-radius: 999px;
  font-weight: 600;
  font-size: 0.84rem;
  color: #e7e5e4;
  cursor: pointer;
  transition: all 0.32s cubic-bezier(0.2, 0, 0, 1);
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.neon-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.32), transparent);
  transition: left 0.55s ease;
}

.neon-btn:hover::before {
  left: 100%;
}

.neon-btn:hover {
  transform: translateY(-3px);
  border-color: #c4b5fd;
  box-shadow: 0 6px 18px rgba(168, 85, 247, 0.26);
  color: white;
}

/* 按钮色系 对齐原图紫/粉/青渐变 */
.btn-primary {
  background: linear-gradient(98deg, rgba(168, 85, 247, 0.28), rgba(236, 72, 153, 0.16));
  border-color: #a855f7;
}
.btn-success {
  background: linear-gradient(98deg, rgba(34, 197, 94, 0.26), rgba(16, 185, 129, 0.14));
  border-color: #10b981;
}
.btn-danger {
  background: linear-gradient(98deg, rgba(239, 68, 68, 0.26), rgba(220, 38, 38, 0.14));
  border-color: #ef4444;
}
.btn-warning {
  background: linear-gradient(98deg, rgba(245, 158, 11, 0.26), rgba(249, 115, 22, 0.14));
  border-color: #f59e0b;
}
.btn-purple {
  background: linear-gradient(98deg, rgba(192, 132, 252, 0.28), rgba(168, 85, 247, 0.16));
  border-color: #c084fc;
}
/* 主导出按钮 原图大渐变主CTA */
.btn-export {
  background: linear-gradient(98deg, #a855f7, #ec4899);
  border: none;
  padding: 0.8rem 2.4rem;
  font-size: 1.05rem;
}
.btn-export:hover {
  box-shadow: 0 8px 24px rgba(168, 85, 247, 0.35);
}

/* 生成按钮居中容器 */
.generate-btn-wrap {
  text-align: center;
  margin-top: 1.4rem;
}

/* 滚动条适配暗紫主题 */
::-webkit-scrollbar {
  width: 7px;
}
::-webkit-scrollbar-track {
  background: #150c2b;
  border-radius: 8px;
}
::-webkit-scrollbar-thumb {
  background: #a855f7;
  border-radius: 8px;
}

/* 响应式适配移动端 */
@media (max-width: 760px) {
  body {
    padding: 1.2rem;
  }
  .glass-container {
    padding: 1.6rem 1.4rem 2rem;
  }
  h2 {
    font-size: 1.7rem;
  }
  .date-row {
    flex-direction: column;
    gap: 1.2rem;
  }
  .neon-btn {
    padding: 0.55rem 1rem;
    font-size: 0.78rem;
  }
}
</style>
</head>
<body>
<!-- 顶部全局渐变光晕 匹配原图顶部粉紫渐变 -->
<div class="top-gradient-glow"></div>

<!-- Three.js 粒子画布 -->
<canvas id="bg-canvas"></canvas>
<div class="mouse-glow" id="mouseGlow"></div>

<div class="glass-container">
  <div class="title-section">
    <h2>⚙️ 运维周报生成器</h2>
    <div class="sub">毛玻璃 · 星云粒子 · 智能导出</div>

  <div class="glass-card-item">

  <!-- 生成导出按钮 -->

    <button class="neon-btn btn-export" onclick="generateAndExport()">📄 生成并导出 Word 周报</button>

<!-- Three.js 动态粒子背景脚本 -->

    "imports": {

<script type="module">
  import * as THREE from 'three';

  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05020e);

  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.5, 14);
  camera.lookAt(0, 0, 0);

  // 主粒子群 (紫罗兰)
  const particleCount = 2100;
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 38;
    positions[i*3+1] = (Math.random() - 0.5) * 24;
    positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({ color: 0xa855f7, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
  const particleSys = new THREE.Points(geom, particleMat);
  scene.add(particleSys);

  // 第二层粒子 (青蓝)
  const geom2 = new THREE.BufferGeometry();
  const pos2 = new Float32Array(1400 * 3);
  for (let i = 0; i < 1400; i++) {
    pos2[i*3] = (Math.random() - 0.5) * 44;
    pos2[i*3+1] = (Math.random() - 0.5) * 28;
    pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
  }
  geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
  const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
  const particleSys2 = new THREE.Points(geom2, mat2);
  scene.add(particleSys2);

  // 第三层粒子 (粉晶)
  const geom3 = new THREE.BufferGeometry();
  const pos3 = new Float32Array(900 * 3);
  for (let i = 0; i < 900; i++) {
    pos3[i*3] = (Math.random() - 0.5) * 48;
    pos3[i*3+1] = (Math.random() - 0.5) * 30;
    pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
  }
  geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
  const mat3 = new THREE.PointsMaterial({ color: 0xec4899, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
  const particleSys3 = new THREE.Points(geom3, mat3);
  scene.add(particleSys3);

  // 装饰环
  const ringCount = 380;
  const ringGeo = new THREE.BufferGeometry();
  const ringPositions = new Float32Array(ringCount * 3);
  for (let i = 0; i < ringCount; i++) {
    const angle = (i / ringCount) * Math.PI * 2;
    const r = 5.2;
    ringPositions[i*3] = Math.cos(angle) * r;
    ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
    ringPositions[i*3+2] = -1.8;
  }
  ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
  const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xc4b5fd, size: 0.09, blending: THREE.AdditiveBlending }));
  scene.add(ringPoints);

  scene.fog = new THREE.FogExp2(0x05020e, 0.008);

  let targetCamX = 0, targetCamY = 0;
  window.addEventListener('mousemove', (e) => {
    let mx = (e.clientX / window.innerWidth) * 2 - 1;
    let my = (e.clientY / window.innerHeight) * 2 - 1;
    targetCamX = mx * 0.9;
    targetCamY = my * 0.6;
  });

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.007;
    particleSys.rotation.y = time * 0.06;
    particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
    particleSys2.rotation.y = time * 0.04;
    particleSys3.rotation.x = time * 0.03;
    ringPoints.rotation.z = time * 0.12;
    camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
    camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  window.addEventListener('resize', onResize);
  animate();
</script>

<!-- 鼠标光晕跟随 + 完整业务逻辑（所有原有功能100%保留无修改） -->
<script>
  // 鼠标光晕
  const glow = document.getElementById('mouseGlow');
  document.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  // 标题自定义切换
  const titleSel = document.getElementById('titleSel');
  const titleInputBox = document.getElementById('titleInputBox');
  titleSel.addEventListener('change', () => {
    titleInputBox.style.display = titleSel.value === '自定义' ? 'block' : 'none';
  });

  // 模式切换（保留原逻辑无额外处理）
  // ========== 工具函数 ==========
  function fmt(dateStr) {
    if (!dateStr) return '';
    let d = new Date(dateStr);
    let y = d.getFullYear();
    let m = String(d.getMonth() + 1).padStart(2, '0');
    let d2 = String(d.getDate()).padStart(2, '0');
    return `${y}.${m}.${d2}`;
  }

  function splitLine(str) {
    return str.trim().split(/\s+/);
  }

  function copyWork() {
    let t = document.getElementById('mainWork');
    t.select();
    document.execCommand('copy');
    alert('✅ 复制成功');
  }
  function cutWork() {
    let t = document.getElementById('mainWork');
    t.select();
    document.execCommand('cut');
    alert('✂️ 剪切成功');
  }
  function clearWork() {
    document.getElementById('mainWork').value = '';
  }
  function copyEvent() {
    let t = document.getElementById('eventList');
    t.select();
    document.execCommand('copy');
    alert('✅ 复制成功');
  }
  function cutEvent() {
    let t = document.getElementById('eventList');
    t.select();
    document.execCommand('cut');
    alert('✂️ 剪切成功');
  }
  function clearEvent() {
    document.getElementById('eventList').value = '';
  }

  // 本地润色总结 (无网络版)
  function localSummary() {
    const eventText = document.getElementById('eventList').value.trim();
    const mode = document.getElementById('modeSel').value;
    if (!eventText) {
      alert('请先粘贴运维事件内容！');
      return;
    }
    const lines = eventText.split('\n').filter(x => x.trim());
    const sysMap = {};
    lines.forEach(line => {
      const arr = splitLine(line);
      const sysName = arr[0] || '未知系统';
      const eventContent = arr.slice(1).join(' ');
      if (!sysMap[sysName]) sysMap[sysName] = new Set();
      sysMap[sysName].add(eventContent);
    });
    const templates = {
      '巡检': '常态化开展系统运维巡检，对应用服务、数据库、中间件等核心组件进行多轮排查，重点核查资源占用、连接稳定性及日志报错情况，未发现异常隐患。',
      '检查': '全面校验系统各业务页面与核心功能入口，检查数据展示效果、业务操作响应速度，平台整体运行基线稳定，各项功能均正常可用。',
      '安装': '部署安装主机防护程序，强化系统主机安全防护能力，提升整体安全防护等级。',
      '默认': '完成系统日常运维工作，保障业务平稳有序开展。'
    };
    let summary = [];
    let totalIdx = 1;
    if (mode === 'multi') {
      for (let sys in sysMap) {
        summary.push(`一、${sys}`);
        const events = Array.from(sysMap[sys]);
        events.forEach(event => {
          let text = templates['默认'];
          if (event.includes('巡检')) text = templates['巡检'];
          else if (event.includes('检查')) text = templates['检查'];
          else if (event.includes('安装')) text = templates['安装'];
          summary.push(`${totalIdx}. ${text}`);
          totalIdx++;
        });
      }
    } else {
      const events = new Set();
      lines.forEach(line => {
        const arr = splitLine(line);
        events.add(arr.join(' '));
      });
      Array.from(events).forEach(event => {
        let text = templates['默认'];
        if (event.includes('巡检')) text = templates['巡检'];
        else if (event.includes('检查')) text = templates['检查'];
        else if (event.includes('安装')) text = templates['安装'];
        summary.push(`${totalIdx}. ${text}`);
        totalIdx++;
      });
    }
    document.getElementById('mainWork').value = summary.join('\n');
    alert('✅ 已完成本地润色！无需联网');
  }

  // 生成文件名
  function getFileName(titleSelText, period) {
    if (titleSelText.includes('教育厅机关智能化管理平台')) return `教育厅3大系统运维周报（${period}）`;
    if (titleSelText.includes('教育厅基础教育大数据系统')) return `教育厅基础教育大数据系统运维周报（${period}）`;
    if (titleSelText.includes('大青山管理局协同办公系统')) return `大青山管理局协同办公系统运维周报（${period}）`;
    return `运维周报（${period}）`;
  }

  // 导出Word 【已修复默认页面视图】
  function generateAndExport() {
    let titleRaw = document.getElementById('titleSel').value;
    let reportTitle = titleRaw === '自定义' ? document.getElementById('reportTitle').value : titleRaw;
    let mode = document.getElementById('modeSel').value;
    let start = document.getElementById('startDate').value;
    let end = document.getElementById('endDate').value;
    let period = (start && end) ? fmt(start) + '-' + fmt(end) : '';
    let reportUser = document.getElementById('reportUser').value;
    let helper = document.getElementById('helper').value;
    let mainWorkLines = document.getElementById('mainWork').value.trim().split('\n').filter(x => x.trim());
    let eventLines = document.getElementById('eventList').value.trim().split('\n').filter(x => x.trim());

    let mainWorkHtml = mainWorkLines.map((line, i) => `${i+1}. ${line}`).join('<br>');

    let eventRows = '';
    eventLines.forEach((line, idx) => {
      let arr = splitLine(line);
      if (mode === 'multi') {
        let sysName = arr[0] || '';
        let eventText = arr[1] || '';
        let proposer = arr[4] || '';
        let handler = arr[7] || '';
        let dealTime = arr[8] || '';
        eventRows += `<tr>
          <td style="text-align:center;font-size:12pt;">${idx+1}</td>
          <td style="text-align:center;font-size:12pt;">${sysName}</td>
          <td style="text-align:center;font-size:12pt;">${eventText}</td>
          <td style="text-align:center;font-size:12pt;">${proposer}</td>
          <td style="text-align:center;font-size:12pt;">${handler}</td>
          <td style="text-align:center;font-size:12pt;">${dealTime}</td>
        </tr>`;
      } else {
        let eventText = arr[0] || '';
        let proposer = arr[3] || '';
        let handler = arr[6] || '';
        let dealTime = arr[7] || '';
        eventRows += `<tr>
          <td style="text-align:center;font-size:12pt;">${idx+1}</td>
          <td style="text-align:center;font-size:12pt;">${eventText}</td>
          <td style="text-align:center;font-size:12pt;">${proposer}</td>
          <td style="text-align:center;font-size:12pt;">${handler}</td>
          <td style="text-align:center;font-size:12pt;">${dealTime}</td>
        </tr>`;
      }
    });

    let headHtml = '';
    let colSpanVal = mode === 'multi' ? 6 : 5;
    if (mode === 'multi') {
      headHtml = `
        <th style="font-size:12pt;text-align:center;">序号</th>
        <th style="font-size:12pt;text-align:center;">系统名称</th>
        <th style="font-size:12pt;text-align:center;">运维事件</th>
        <th style="font-size:12pt;text-align:center;">提出人</th>
        <th style="font-size:12pt;text-align:center;">处理人</th>
        <th style="font-size:12pt;text-align:center;">处理时间</th>`;
    } else {
      headHtml = `
        <th style="font-size:12pt;text-align:center;">序号</th>
        <th style="font-size:12pt;text-align:center;">运维事件</th>
        <th style="font-size:12pt;text-align:center;">提出人</th>
        <th style="font-size:12pt;text-align:center;">处理人</th>
        <th style="font-size:12pt;text-align:center;">处理时间</th>`;
    }

    // ========== 关键修改：增加Word视图配置，强制页面视图Print ==========
    let html = `<html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns:m="http://schemas.microsoft.com/office/2004/12/omml" xmlns="http://www.w3.org/TR/REC-html40">
    <head>
    <meta charset="utf-8">
    <style>
      body{font-family:宋体;} 
      table{width:100%;border-collapse:collapse;} 
      td,th{border:1px solid #000;padding:8px;font-family:宋体;} 
      .title{font-size:22pt;font-weight:bold;text-align:center;} 
      .period{font-size:14pt;font-weight:bold;text-align:center;}
    </style>
    <!-- 强制Word打开为页面视图 Print -->
    <!--[if gte mso 9]>
    <xml>
      <w:WordDocument>
        <w:View>Print</w:View>
        <w:TrackMoves>false</w:TrackMoves>
        <w:TrackFormatting/>
      </w:WordDocument>
    </xml>
    <![endif]-->
    </head>
    <body>
    <table>
      <tr><td colspan="${colSpanVal}" class="title">${reportTitle}</td></tr>
      <tr><td colspan="${colSpanVal}" class="period">报告周期：${period}</td></tr>
      <tr>
        <td colspan="${Math.floor(colSpanVal/2)}" style="text-align:center;font-size:12pt;">报告人：${reportUser}</td>
        <td colspan="${Math.ceil(colSpanVal/2)}" style="text-align:center;font-size:12pt;">协作人：${helper}</td>
      </tr>
      <tr><td colspan="${colSpanVal}" style="font-weight:bold;font-size:12pt;text-align:center;">本周主要工作内容</td></tr>
      <tr><td colspan="${colSpanVal}" style="padding:15px;line-height:1.8;font-size:12pt;">${mainWorkHtml}</td></tr>
      <tr>${headHtml}</tr>
      ${eventRows}
    </table>
    <p style="margin-top:20px;font-size:12pt;">甲方确认：______________</p>
    </body></html>`;

    let fileName = getFileName(reportTitle, period) + '.doc';
    let blob = new Blob([html], { type: 'application/msword' });
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);
  }

  // 挂载全局函数
  window.copyWork = copyWork;
  window.cutWork = cutWork;
  window.clearWork = clearWork;
  window.copyEvent = copyEvent;
  window.cutEvent = cutEvent;
  window.clearEvent = clearEvent;
  window.localSummary = localSummary;
  window.generateAndExport = generateAndExport;
</script>
</body>
</html>
