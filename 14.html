<script type="module">
  import * as THREE from 'three';
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05020e);
  const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.5, 14);
  camera.lookAt(0, 0, 0);

  const particleCount = 2100;
  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i*3] = (Math.random() - 0.5) * 38;
    positions[i*3+1] = (Math.random() - 0.5) * 24;
    positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({ color: 0xa855f7, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
  const particleSys = new THREE.Points(geom, particleMat);
  scene.add(particleSys);

  const geom2 = new THREE.BufferGeometry();
  const pos2 = new Float32Array(1400 * 3);
  for (let i = 0; i < 1400; i++) {
    pos2[i*3] = (Math.random() - 0.5) * 44;
    pos2[i*3+1] = (Math.random() - 0.5) * 28;
    pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
  }
  geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
  const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
  const particleSys2 = new THREE.Points(geom2, mat2);
  scene.add(particleSys2);

  const geom3 = new THREE.BufferGeometry();
  const pos3 = new Float32Array(900 * 3);
  for (let i = 0; i < 900; i++) {
    pos3[i*3] = (Math.random() - 0.5) * 48;
    pos3[i*3+1] = (Math.random() - 0.5) * 30;
    pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
  }
  geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
  const mat3 = new THREE.PointsMaterial({ color: 0xec4899, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
  const particleSys3 = new THREE.Points(geom3, mat3);
  scene.add(particleSys3);

  const ringCount = 380;
  const ringGeo = new THREE.BufferGeometry();
  const ringPositions = new Float32Array(ringCount * 3);
  for (let i = 0; i < ringCount; i++) {
    const angle = (i / ringCount) * Math.PI * 2;
    const r = 5.2;
    ringPositions[i*3] = Math.cos(angle) * r;
    ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
    ringPositions[i*3+2] = -1.8;
  }
  ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
  const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xc4b5fd, size: 0.09, blending: THREE.AdditiveBlending }));
  scene.add(ringPoints);

  scene.fog = new THREE.FogExp2(0x05020e, 0.008);
  let targetCamX = 0, targetCamY = 0;
  window.addEventListener('mousemove', (e) => {
    let mx = (e.clientX / window.innerWidth) * 2 - 1;
    let my = (e.clientY / window.innerHeight) * 2 - 1;
    targetCamX = mx * 0.9;
    targetCamY = my * 0.6;
  });
  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.007;
    particleSys.rotation.y = time * 0.06;
    particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
    particleSys2.rotation.y = time * 0.04;
    particleSys3.rotation.x = time * 0.03;
    ringPoints.rotation.z = time * 0.12;
    camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
    camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }
  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  window.addEventListener('resize', onResize);
  animate();
</script>

// ===== IndexedDB 缓存工具 =====
const DB_NAME = 'WeeklyReportCache';
const STORE_NAME = 'files';
const KEY = 'excelData';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveFileToCache(data) {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.put(data, KEY);
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  } catch (e) {
    console.warn('保存缓存失败:', e);
  }
}

async function loadFileFromCache() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const request = store.get(KEY);
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  } catch (e) {
    return null;
  }
}

// ===== 日期工具 =====
function fmt(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function excelDateToStr(serial) {
  if (typeof serial !== 'number') return serial;
  const epoch = new Date(1899, 11, 30);
  const d = new Date(epoch.getTime() + serial * 86400000);
  return fmt(d);
}

function normalizeDate(input) {
  if (!input) return '';
  if (typeof input === 'number') return excelDateToStr(input);
  if (typeof input === 'string') {
    let d = new Date(input);
    if (!isNaN(d)) return fmt(d);
    let cleaned = input.replace(/\//g, '-');
    d = new Date(cleaned);
    if (!isNaN(d)) return fmt(d);
    return input;
  }
  return String(input);
}

// ===== 解析 Excel（含日期过滤） =====
function parseExcelData(arrayBuffer, startDate, endDate) {
  try {
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '' });

    if (jsonData.length < 2) {
      showMsg('表格为空或只有表头', 'error');
      return null;
    }

    // 查找表头行（包含“问题描述”、“上报人”等关键词）
    let headerRowIndex = -1;
    let headerRow = null;
    for (let i = 0; i < Math.min(10, jsonData.length); i++) {
      const row = jsonData[i];
      if (row && row.length > 0) {
        const rowStr = row.join(' ');
        if (rowStr.includes('问题描述') || rowStr.includes('问题分析') || rowStr.includes('上报人') || rowStr.includes('处理人')) {
          headerRowIndex = i;
          headerRow = row;
          break;
        }
      }
    }
    if (headerRowIndex === -1) {
      showMsg('未找到表头行（需包含“问题描述”、“上报人”等列）', 'error');
      return null;
    }

    // 构建列索引映射
    const colMap = {};
    const keywords = [
      { key: 'problem', names: ['问题描述', '描述'] },
      { key: 'analysis', names: ['问题分析', '分析'] },
      { key: 'reporter', names: ['上报人', '提出人'] },
      { key: 'reporterDept', names: ['上报人部门', '部门'] },
      { key: 'reportTime', names: ['上报时间', '时间'] },
      { key: 'handler', names: ['处理人', '负责人'] },
      { key: 'planDeadline', names: ['计划解决时限', '计划完成时间'] },
      { key: 'actualTime', names: ['实际解决时间', '实际完成时间'] }
    ];

    headerRow.forEach((cell, idx) => {
      const cellStr = String(cell).trim();
      for (const kw of keywords) {
        if (kw.names.some(name => cellStr.includes(name))) {
          colMap[kw.key] = idx;
          break;
        }
      }
    });

    if (!colMap.problem && !colMap.analysis) {
      showMsg('未找到“问题描述”或“问题分析”列', 'error');
      return null;
    }

    // 提取数据行
    const dataRows = [];
    for (let i = headerRowIndex + 1; i < jsonData.length; i++) {
      const row = jsonData[i];
      if (!row || row.every(cell => String(cell).trim() === '')) continue;
      const problem = row[colMap.problem] || '';
      const analysis = row[colMap.analysis] || '';
      if (!problem && !analysis) continue;
      dataRows.push(row);
    }

    if (dataRows.length === 0) {
      showMsg('未找到有效数据行', 'error');
      return null;
    }

    const sysName = '教育厅基础教育大数据系统';
    const resultLines = [];

    for (const row of dataRows) {
      const problem = row[colMap.problem] || '';
      const analysis = row[colMap.analysis] || '';
      const reporter = row[colMap.reporter] || '';
      const reporterDept = row[colMap.reporterDept] || '';
      let reportTimeRaw = row[colMap.reportTime] || '';
      const handler = row[colMap.handler] || '';
      const planDeadlineRaw = row[colMap.planDeadline] || '';
      const actualTimeRaw = row[colMap.actualTime] || '';

      const reportTime = normalizeDate(reportTimeRaw);
      const planDeadline = normalizeDate(planDeadlineRaw);
      const actualTime = normalizeDate(actualTimeRaw);

      // 日期过滤
      if (startDate && endDate && reportTime) {
        const repDate = new Date(reportTime);
        const sDate = new Date(startDate);
        const eDate = new Date(endDate);
        if (repDate < sDate || repDate > eDate) continue;
      }

      const parts = [sysName, problem, analysis, reporter, reporterDept, reportTime, handler, planDeadline, actualTime];
      resultLines.push(parts.join(' '));
    }

    if (resultLines.length === 0) {
      showMsg(`在 ${startDate} 至 ${endDate} 期间无运维记录`, 'info');
      return [];
    }

    return resultLines;
  } catch (err) {
    showMsg('解析失败：' + err.message, 'error');
    console.error(err);
    return null;
  }
}

// ===== 应用数据到界面 =====
function applyParsedData(lines) {
  if (lines === null) return;
  if (lines.length === 0) {
    document.getElementById('eventList').value = '';
    document.getElementById('excelStatus').innerHTML = '⚠️ 当前日期范围内无运维记录';
    showMsg('当前日期范围内无运维记录', 'info');
    return;
  }
  document.getElementById('eventList').value = lines.join('\n');
  document.getElementById('excelStatus').innerHTML = `✅ 已加载 ${lines.length} 条记录（已按日期过滤）`;
  showMsg(`✅ 成功加载 ${lines.length} 条记录`, 'success');
}

// ===== 加载并解析文件（统一入口） =====
let lastFileData = null;

async function loadAndParseFile(arrayBuffer, fromCache = false) {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const lines = parseExcelData(arrayBuffer, startDate, endDate);
  if (lines !== null) {
    applyParsedData(lines);
    lastFileData = arrayBuffer;
    if (!fromCache && lines.length > 0) {
      await saveFileToCache(arrayBuffer);
    }
    return true;
  }
  return false;
}

// ===== 手动选择文件 =====
async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.readAsArrayBuffer(file);
  reader.onload = async function(e) {
    const data = e.target.result;
    const success = await loadAndParseFile(data);
    if (success) {
      showMsg(`✅ 已加载 ${file.name}`, 'success');
      document.getElementById('excelStatus').innerHTML = `✅ 已加载 ${file.name}（已缓存）`;
    }
  };
  reader.onerror = function() {
    showMsg('读取文件失败', 'error');
  };
}

// ===== 🆕 从腾讯文档加载（通过 Vercel 代理） =====
async function loadFromTencentDoc() {
  const apiUrl = `${VERCEL_API_BASE}/api/tencent-doc?fileId=${TENCDOC_FILE_ID}&sheetId=${TENCDOC_SHEET_ID}&range=${TENCDOC_RANGE}`;

  try {
    const response = await fetch(apiUrl);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();

    if (result.code === 0 && result.data) {
      const rows = result.data;
      if (rows.length < 2) {
        showMsg('表格数据不足（至少需要表头+1行数据）', 'error');
        return;
      }
      // 将二维数组转为 XLSX 工作簿
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
      const out = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const arrayBuffer = out.buffer;
      const success = await loadAndParseFile(arrayBuffer);
      if (success) {
        document.getElementById('excelStatus').innerHTML = '✅ 从腾讯文档加载成功（已缓存）';
        showMsg('✅ 数据已从腾讯文档加载', 'success');
      }
    } else {
      showMsg('腾讯文档返回错误：' + JSON.stringify(result), 'error');
    }
  } catch (err) {
    showMsg('请求腾讯文档失败：' + err.message, 'error');
    console.error(err);
  }
}

// ===== 页面加载自动从缓存 + 自动 fetch 默认文件 + 可选自动加载腾讯文档 =====
window.onload = async function() {
  // 初始化日期（本月1日～今日）
  const today = new Date();
  const y = today.getFullYear();
  const m = today.getMonth();
  const first = new Date(y, m, 1).toISOString().split('T')[0];
  const last = today.toISOString().split('T')[0];
  document.getElementById('startDate').value = first;
  document.getElementById('endDate').value = last;

  // 1. 先尝试从 IndexedDB 缓存加载
  const cached = await loadFileFromCache();
  if (cached) {
    const success = await loadAndParseFile(cached, true);
    if (success) {
      document.getElementById('excelStatus').innerHTML = '✅ 从缓存自动加载成功';
      return;
    }
  }

  // 2. 缓存不存在或无效，尝试 fetch 同目录下的 运维记录.xlsx
  try {
    const response = await fetch('./运维记录.xlsx');
    if (!response.ok) throw new Error('文件不存在');
    const arrayBuffer = await response.arrayBuffer();
    const success = await loadAndParseFile(arrayBuffer);
    if (success) {
      document.getElementById('excelStatus').innerHTML = '✅ 自动加载默认文件成功（已缓存）';
      return;
    }
  } catch (err) {
    console.warn('自动加载默认文件失败:', err.message);
  }

  // 3. 自动加载失败，提示手动上传
  document.getElementById('excelStatus').innerHTML = '💡 未找到默认文件，请手动选择 Excel 文件 或 点击 "☁️ 加载腾讯文档"';
  showMsg('请手动选择 Excel 文件 或 加载腾讯文档', 'info', 5000);
};

// ===== 日期变化时重新解析（如果已有文件数据） =====
document.getElementById('startDate').addEventListener('change', onDateChange);
document.getElementById('endDate').addEventListener('change', onDateChange);

async function onDateChange() {
  if (!lastFileData) {
    const cached = await loadFileFromCache();
    if (cached) {
      lastFileData = cached;
    } else {
      return;
    }
  }
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  const lines = parseExcelData(lastFileData, startDate, endDate);
  if (lines !== null) {
    applyParsedData(lines);
  }
}

// ===== 智能润色总结（与之前一致） =====
async function generateSummary() {
  const eventText = document.getElementById('eventList').value.trim();
  if (!eventText) {
    showMsg('请先粘贴或解析运维事件内容！', 'error');
    return;
  }

  const mode = document.getElementById('modeSel').value;
  const style = document.getElementById('summaryStyle').value;
  const apiKey = document.getElementById('zhipuApiKey').value.trim();

  let basePrompt = '';
  if (mode === 'multi') {
    basePrompt = '这是本周3个系统的运维工作记录，帮我写个本周主要工作内容，要条理分析，分系统写，不必过于冗余描述。';
  } else {
    basePrompt = '这是本周系统的运维工作记录，帮我写个本周主要工作内容，要条理分析，不必过于冗余描述。';
  }
  let finalPrompt = basePrompt;
  if (style === 'brief') {
    finalPrompt += ' 每条工作内容尽量简短，控制在15字以内，直接列出即可。';
  } else {
    finalPrompt += ' 请用完整句子，条理清晰。';
  }
  finalPrompt += '\n\n运维事件列表：\n' + eventText;

  if (apiKey) {
    try {
      const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'glm-4-flash',
          messages: [{ role: 'user', content: finalPrompt }],
          temperature: 0.7
        })
      });
      const data = await response.json();
      if (data.choices && data.choices.length > 0) {
        document.getElementById('mainWork').value = data.choices[0].message.content;
        showMsg('✅ 大模型润色完成', 'success');
        return;
      } else {
        throw new Error('AI 返回内容为空');
      }
    } catch (err) {
      console.error('大模型失败，回退本地', err);
      localFallbackSummary(eventText, mode, style);
      showMsg('⚠️ 大模型失败，已本地润色', 'error');
    }
  } else {
    localFallbackSummary(eventText, mode, style);
    showMsg('✅ 本地润色完成', 'success');
  }
}

function localFallbackSummary(eventText, mode, style) {
  const lines = eventText.split('\n').filter(x => x.trim());
  const events = [];
  lines.forEach(line => {
    const parts = line.split(' ');
    if (mode === 'multi') {
      let desc = parts.slice(1).join(' ');
      if (desc) events.push(desc);
    } else {
      let desc = parts[0] || '';
      if (desc) events.push(desc);
    }
  });
  const unique = [...new Set(events)];
  let summary = [];
  if (style === 'brief') {
    unique.forEach((ev, idx) => {
      let brief = ev.split(' ').slice(0, 3).join(' ');
      summary.push(`${idx+1}. ${brief}`);
    });
  } else {
    const templates = {
      '巡检': '常态化开展系统运维巡检，对应用服务、数据库、中间件等核心组件进行多轮排查，重点核查资源占用、连接稳定性及日志报错情况，未发现异常隐患。',
      '检查': '全面校验系统各业务页面与核心功能入口，检查数据展示效果、业务操作响应速度，平台整体运行基线稳定，各项功能均正常可用。',
      '漏洞': '处置系统安全漏洞风险，完成漏洞修复、基线加固，消除安全隐患。',
      '需求': '对接业务需求，完成功能适配、需求落地调试工作。',
      '默认': '完成系统日常运维工作，保障业务平稳有序开展。'
    };
    unique.forEach((ev, idx) => {
      let text = templates['默认'];
      if (ev.includes('巡检')) text = templates['巡检'];
      else if (ev.includes('检查')) text = templates['检查'];
      else if (ev.includes('漏洞')) text = templates['漏洞'];
      else if (ev.includes('需求')) text = templates['需求'];
      summary.push(`${idx+1}. ${text}`);
    });
  }
  document.getElementById('mainWork').value = summary.join('\n');
}

// ===== 生成文件名 =====
function getFileName(titleSelText, period) {
  if (titleSelText.includes('教育厅机关智能化')) return `教育厅3大系统运维周报（${period}）`;
  if (titleSelText.includes('基础教育大数据')) return `教育厅基础教育大数据系统运维周报（${period}）`;
  if (titleSelText.includes('大青山协同办公')) return `大青山管理局协同办公系统运维周报（${period}）`;
  if (titleSelText.includes('民办教育系统')) return `民办教育系统运维周报（${period}）`;
  return `运维周报（${period}）`;
}

// ===== 导出Word =====
function generateAndExport() {
  let titleRaw = document.getElementById('titleSel').value;
  let reportTitle = titleRaw === '自定义' ? document.getElementById('reportTitle').value : titleRaw;
  let mode = document.getElementById('modeSel').value;
  let start = document.getElementById('startDate').value;
  let end = document.getElementById('endDate').value;
  let period = (start && end) ? fmt(start) + '/' + fmt(end) : '';
  let reportUser = document.getElementById('reportUser').value;
  let helper = document.getElementById('helper').value;
  let mainWorkLines = document.getElementById('mainWork').value.trim().split('\n').filter(x => x.trim());
  let eventLines = document.getElementById('eventList').value.trim().split('\n').filter(x => x.trim());

  let mainWorkHtml = mainWorkLines.map((line, i) => `${i+1}. ${line}`).join('<br>');

  let eventRows = '';
  eventLines.forEach((line, idx) => {
    const parts = line.split(' ');
    if (mode === 'multi') {
      let sysName = parts[0] || '';
      let eventText = parts.slice(1).join(' ');
      let proposer = parts[2] || '';
      let handler = parts[3] || '';
      let dealTime = parts[4] || '';
      eventRows += `<tr>
        <td style="text-align:center;font-size:12pt;">${idx+1}</td>
        <td style="text-align:center;font-size:12pt;">${sysName}</td>
        <td style="text-align:center;font-size:12pt;">${eventText}</td>
        <td style="text-align:center;font-size:12pt;">${proposer}</td>
        <td style="text-align:center;font-size:12pt;">${handler}</td>
        <td style="text-align:center;font-size:12pt;">${dealTime}</td>
      </tr>`;
    } else {
      let eventText = parts.join(' ');
      let proposer = parts[2] || '';
      let handler = parts[3] || '';
      let dealTime = parts[4] || '';
      eventRows += `<tr>
        <td style="text-align:center;font-size:12pt;">${idx+1}</td>
        <td style="text-align:center;font-size:12pt;">${eventText}</td>
        <td style="text-align:center;font-size:12pt;">${proposer}</td>
        <td style="text-align:center;font-size:12pt;">${handler}</td>
        <td style="text-align:center;font-size:12pt;">${dealTime}</td>
      </tr>`;
    }
  });

  let headHtml = '';
  if (mode === 'multi') {
    headHtml = `
      <th style="font-size:12pt;text-align:center;">序号</th>
      <th style="font-size:12pt;text-align:center;">系统名称</th>
      <th style="font-size:12pt;text-align:center;">运维事件</th>
      <th style="font-size:12pt;text-align:center;">提出人</th>
      <th style="font-size:12pt;text-align:center;">处理人</th>
      <th style="font-size:12pt;text-align:center;">处理时间</th>`;
  } else {
    headHtml = `
      <th style="font-size:12pt;text-align:center;">序号</th>
      <th style="font-size:12pt;text-align:center;">运维事件</th>
      <th style="font-size:12pt;text-align:center;">提出人</th>
      <th style="font-size:12pt;text-align:center;">处理人</th>
      <th style="font-size:12pt;text-align:center;">处理时间</th>`;
  }

  let html = `<html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns:m="http://schemas.microsoft.com/office/2004/12/omml" xmlns="http://www.w3.org/TR/REC-html40">
  <head>
  <meta charset="utf-8">
  <style>
    body{font-family:宋体;} 
    table{width:100%;border-collapse:collapse;} 
    td,th{border:1px solid #000;padding:8px;font-family:宋体;} 
    .title{font-size:22pt;font-weight:bold;text-align:center;} 
    .period{font-size:14pt;font-weight:bold;text-align:center;}
  </style>
  <!--[if gte mso 9]>
  <xml>
    <w:WordDocument>
      <w:View>Print</w:View>
      <w:TrackMoves>false</w:TrackMoves>
      <w:TrackFormatting/>
    </w:WordDocument>
  </xml>
  <![endif]-->
  </head>
  <body>
  <table>
    <tr><td colspan="${mode === 'multi' ? 6 : 5}" class="title">${reportTitle}</td></tr>
    <tr><td colspan="${mode === 'multi' ? 6 : 5}" class="period">报告周期：${period}</td></tr>
    <tr>
      <td colspan="${Math.floor((mode === 'multi' ? 6 : 5)/2)}" style="text-align:center;font-size:12pt;">报告人：${reportUser}</td>
      <td colspan="${Math.ceil((mode === 'multi' ? 6 : 5)/2)}" style="text-align:center;font-size:12pt;">协作人：${helper}</td>

    <tr>${headHtml}</tr>
    ${eventRows}

  <p style="margin-top:20px;font-size:12pt;">甲方确认：______________</p>
  </body></html>`;

  let fileName = getFileName(reportTitle, period) + '.doc';
  let blob = new Blob([html], { type: 'application/msword' });
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.click();
  URL.revokeObjectURL(url);
  showMsg('📄 周报导出成功！', 'success');
