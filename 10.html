<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校填报状态查询工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#39FF14',
                        dark: '#121212',
                        'dark-card': '#1E1E1E',
                        'dark-input': '#2A2A2A',
                        'text-primary': '#FFFFFF',
                        'text-secondary': '#B0B0B0',
                    },
                    boxShadow: {
                        'neon': '0 0 10px rgba(57, 255, 20, 0.3)',
                        'neon-hover': '0 0 20px rgba(57, 255, 20, 0.5)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-2px);
                box-shadow: var(--tw-shadow-neon-hover);
            }
            .input-focus {
                transition: all 0.3s ease;
            }
            .input-focus:focus {
                border-color: #39FF14;
                box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.2);
            }
            .btn-hover {
                transition: all 0.3s ease;
            }
            .btn-hover:hover {
                transform: translateY(-2px);
                box-shadow: var(--tw-shadow-neon);
            }
        }
    </style>
    <style>
        /* 防止文本域缩放 + 性能优化 */
        #result {
            resize: none !important;
            will-change: auto;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
            font-variant-ligatures: none;
            transform: translateZ(0);
        }
    </style>
</head>
<body class="bg-dark min-h-screen font-sans text-text-primary flex justify-center items-center p-4">
    <div class="w-full max-w-3xl bg-dark-card rounded-2xl shadow-card p-8 card-hover border border-dark-input">
        <!-- 标题区域 -->
        <header class="mb-8 text-center">
            <h1 class="text-2xl md:text-3xl font-bold mb-2 text-text-primary">
                <i class="fa fa-building text-neon mr-2"></i>学校填报状态查询工具
            </h1>
            <p class="text-text-secondary text-sm">支持：表1~9 | 状态查询 / 是否填报查询 | 可切换年份</p>
        </header>

        <!-- 表单区域 -->
        <div class="space-y-6 mb-8">
            <div>
                <label class="block mb-2 text-text-secondary text-sm font-medium">请选择查询表（自动对应最新表名）</label>
                <select id="tableSelect" class="w-full bg-dark-input border border-dark-input rounded-lg p-3 text-text-primary input-focus">
                    <option value="1">表1 - tbl_equ_two_ptjslbsb</option>
                    <option value="2">表2 - tbl_equ_two_ptjsjrcs</option>
                    <option value="3">表3 - tbl_equ_two_jsjjssb</option>
                    <option value="4">表4 - tbl_equ_two_ptjssszd</option>
                    <option value="5">表5 - tbl_equ_two_library_staff</option>
                    <option value="6">表6 - tbl_equ_two_electrifyed_status</option>
                    <option value="7">表7 - tbl_equ_two_library_build</option>
                    <option value="8">表8 - tbl_equ_two_laboratory_staff</option>
                    <option value="9">表9 - tbl_equ_two_laboratory_activity</option>
                </select>
            </div>

            <div>
                <label class="block mb-2 text-text-secondary text-sm font-medium">请选择年度版本（默认2024，可直接修改）</label>
                <input type="text" id="yearVersion" value="2024" placeholder="请输入年份" class="w-full bg-dark-input border border-dark-input rounded-lg p-3 text-text-primary input-focus">
            </div>
        </div>

        <!-- 按钮组 -->
        <div class="flex gap-4 mb-8">
            <button onclick="generateStatusSql()" class="flex-1 bg-neon text-dark font-bold py-3 rounded-lg btn-hover flex items-center justify-center">
                <i class="fa fa-bar-chart mr-2"></i>生成【填表状态查询SQL】
            </button>
            <button onclick="generateIsFillSql()" class="flex-1 bg-dark-input text-neon border border-neon font-bold py-3 rounded-lg btn-hover flex items-center justify-center">
                <i class="fa fa-search mr-2"></i>生成【是否填报查询SQL】
            </button>
        </div>

        <!-- 结果区域 -->
        <div>
            <label class="block mb-2 text-text-secondary text-sm font-medium">生成的SQL语句</label>
            <textarea id="result" class="w-full h-80 bg-dark-input border border-dark-input rounded-lg p-4 text-text-primary font-mono text-sm input-focus" placeholder="生成的SQL语句将显示在这里..."></textarea>
        </div>
    </div>

<script>
// 最新正确表名映射
const tableMap = {
    1: "tbl_equ_two_ptjslbsb",
    2: "tbl_equ_two_ptjsjrcs",
    3: "tbl_equ_two_jsjjssb",
    4: "tbl_equ_two_ptjssszd",
    5: "tbl_equ_two_library_staff",
    6: "tbl_equ_two_electrifyed_status",
    7: "tbl_equ_two_library_build",
    8: "tbl_equ_two_laboratory_staff",
    9: "tbl_equ_two_laboratory_activity"
};

// 获取年份
function getYear() {
    return document.getElementById('yearVersion').value || '2024';
}

// 状态查询 SQL 模板
function getStatusSql(table) {
    const year = getYear();
    return `
-- 状态 0：待编辑
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '0';

-- 状态 1：旗县待审核
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '1';

-- 状态 2：盟市待审核
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '2';

-- 状态 3：盟市已审核
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '3';
`;
}

// 是否填报查询
function getIsFillSql(table) {
    const year = getYear();
    return `
-- 查询【未填报】学校
SELECT
    d.name AS 学校名称,
    pd.name AS 旗县,
    ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.create_by IS NULL;
`;
}

// 生成状态查询
function generateStatusSql() {
    const key = document.getElementById('tableSelect').value;
    const table = tableMap[key];
    document.getElementById('result').value = getStatusSql(table).trim();
}

// 生成是否填报
function generateIsFillSql() {
    const key = document.getElementById('tableSelect').value;
    const table = tableMap[key];
    document.getElementById('result').value = getIsFillSql(table).trim();
}
</script>
</body>
</html>
