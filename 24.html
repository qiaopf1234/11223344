<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>系统每日巡检表 · 赛博星云版</title>
    <style>
        /* ========== 全局赛博毛玻璃样式（未改动任何 DOM 结构、ID、业务函数） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "Segoe UI", "Inter", system-ui, sans-serif;
        }

        body {
            padding: 20px;
            background: #0a0c12;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 隐藏原有的 Canvas 粒子（原 JS 逻辑依然存在，但视觉上不显示，确保 Three.js 背景纯净） */
        #particleCanvas {
            display: none !important;
        }

        /* Three.js 画布背景 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        /* 鼠标跟随光晕层 */
        .mouse-glow {
            position: fixed;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        /* 毛玻璃主容器 —— 霓虹渐变 + 悬浮上浮 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            background: rgba(15, 25, 45, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 32px;
            border: 1px solid rgba(139, 92, 246, 0.35);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }
        .main-container:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.7);
            box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.25) inset;
        }

        /* 左侧配置栏 */
        .left-config {
            width: 320px;
            flex-shrink: 0;
            padding-right: 20px;
            border-right: 1px solid rgba(6, 182, 212, 0.35);
        }

        /* 右侧预览栏 */
        .right-preview {
            flex: 1;
            overflow: auto;
            min-height: 800px;
        }

        /* 标题渐变发光 */
        h2 {
            margin-bottom: 18px;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .tip {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 24px;
            border-left: 3px solid #c084fc;
            padding-left: 12px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            height: 42px;
            padding: 0 14px;
            background: rgba(10, 18, 30, 0.75);
            border: 1.5px solid rgba(139, 92, 246, 0.45);
            border-radius: 14px;
            font-size: 0.9rem;
            color: #e2e8f0;
            outline: none;
            transition: all 0.2s ease;
        }
        textarea {
            height: 80px;
            padding: 10px;
            resize: vertical;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
            background: rgba(20, 32, 50, 0.85);
        }

        /* 霓虹流光按钮 */
        button {
            background: linear-gradient(95deg, rgba(139, 92, 246, 0.3), rgba(6, 182, 212, 0.2));
            border: 1px solid rgba(139, 92, 246, 0.6);
            color: #e0e7ff;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            border-radius: 40px;
            height: 42px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
            transition: left 0.5s ease;
        }
        button:hover::before {
            left: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            border-color: #a78bfa;
            box-shadow: 0 6px 18px rgba(139, 92, 246, 0.35);
            color: white;
        }

        .table-num-box {
            display: none;
        }

        /* 表格毛玻璃霓虹风 */
        .check-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background: rgba(8, 18, 40, 0.5);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 18px rgba(6, 182, 212, 0.1);
        }
        .check-table td {
            border: 1px solid rgba(139, 92, 246, 0.35);
            padding: 12px 8px;
            text-align: center;
            font-family: "仿宋_GB2312", SimSun;
            font-size: 14pt;
            font-weight: normal;
            vertical-align: middle;
            color: #f0f6ff;
            transition: background 0.2s;
        }
        .check-table tr:hover td {
            background: rgba(139, 92, 246, 0.1);
        }
        .table-title-cell {
            font-family: "方正小标宋简体", SimHei;
            font-size: 22pt;
            font-weight: normal;
            text-align: center;
            padding: 20px 0;
            background: linear-gradient(135deg, rgba(15, 40, 80, 0.65), rgba(139, 92, 246, 0.25));
            color: #ffffff;
            text-shadow: 0 0 12px rgba(6, 182, 212, 0.9);
            border-bottom: 2px solid #c084fc;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 8px;
        }

        @media (max-width: 800px) {
            .main-container {
                flex-direction: column;
            }
            .left-config {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(6, 182, 212, 0.3);
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Three.js 星云粒子画布 -->
    <canvas id="bg-canvas"></canvas>
    <!-- 鼠标跟随光晕 -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <!-- 原有粒子画布（已通过 CSS 隐藏，保留 JS 逻辑不报错） -->
    <canvas id="particleCanvas" style="display: none;"></canvas>

    <div class="main-container">
        <!-- 左侧：所有配置、按钮区域 -->
        <div class="left-config">
            <h2>参数配置</h2>
            <p class="tip">填写参数后生成并导出Word</p>

            <div class="config-item">
                <label>开始日期</label>
                <input type="date" id="startDate" value="2025-09-29">
            </div>

            <div class="config-item">
                <label>结束日期</label>
                <input type="date" id="endDate" value="2025-10-13">
            </div>

            <div class="config-item">
                <label>通用巡检人(备用)</label>
                <input type="text" id="checkUser" value="薛涛" placeholder="请输入巡检人姓名">
            </div>

            <div class="config-item">
                <label>正常/异常之间空格数</label>
                <select id="spaceCount">
                    <option value="">无空格</option>
                    <option value="&nbsp;" selected>1个空格</option>
                    <option value="&nbsp;&nbsp;">2个空格</option>
                    <option value="&nbsp;&nbsp;&nbsp;">3个空格</option>
                    <option value="&nbsp;&nbsp;&nbsp;&nbsp;">4个空格</option>
                </select>
            </div>

            <div class="config-item">
                <label>表格模式</label>
                <select id="tableMode">
                    <option value="single">单表格（单个系统）</option>
                    <option value="multi">多表格（多个系统）</option>
                </select>
            </div>

            <div class="config-item table-num-box" id="tableNumBox">
                <label>系统数量</label>
                <select id="tableCount">
                    <option value="2">2个系统</option>
                    <option value="3" selected>3个系统</option>
                    <option value="4">4个系统</option>
                </select>
            </div>

            <div class="config-item">
                <label>系统名称（换行分隔）</label>
                <textarea id="systemNames">民办机构管理系统
教育厅机关智能化管理平台
学生体质健康监测数据管理平台</textarea>
            </div>

            <div class="config-item">
                <label>对应巡检人（一行对应一个系统）</label>
                <textarea id="userNames">薛涛
乔鹏飞
刘树清</textarea>
            </div>

            <div class="config-item">
                <button onclick="generateTable()">生成巡检表</button>
            </div>

            <div class="config-item">
                <button onclick="exportToWord()">导出 Word 文件</button>
            </div>
        </div>

        <!-- 右侧：表格预览区域 -->
        <div class="right-preview">
            <h2>表格预览</h2>
            <div class="table-wrap" id="tableBox"></div>
        </div>
    </div>

    <!-- Three.js 星云粒子背景（紫青粉三色，鼠标视差） -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);

        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);

        // 主粒子群 (紫罗兰)
        const particleCount = 2100;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 38;
            positions[i*3+1] = (Math.random() - 0.5) * 24;
            positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);

        // 第二层粒子 (青色)
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1400 * 3);
        for (let i = 0; i < 1400; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 44;
            pos2[i*3+1] = (Math.random() - 0.5) * 28;
            pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);

        // 第三层粒子 (粉晶)
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(900 * 3);
        for (let i = 0; i < 900; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 30;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);

        // 装饰环
        const ringCount = 380;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 5.2;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
            ringPositions[i*3+2] = -1.8;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);

        scene.fog = new THREE.FogExp2(0x03050b, 0.008);

        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            let mx = (e.clientX / window.innerWidth) * 2 - 1;
            let my = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mx * 0.9;
            targetCamY = my * 0.6;
        });

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            particleSys.rotation.y = time * 0.06;
            particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSys2.rotation.y = time * 0.04;
            particleSys3.rotation.x = time * 0.03;
            ringPoints.rotation.z = time * 0.12;
            camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onResize);
        animate();
    </script>

    <!-- 鼠标跟随光晕 JS（纯视觉，不干扰业务） -->
    <script>
        const glowDiv = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glowDiv.style.left = e.clientX + 'px';
            glowDiv.style.top = e.clientY + 'px';
        });
    </script>

    <!-- 以下为原有完整业务逻辑（一字未改，仅保留原有 JS） -->
    <script>
        // ===================== 原有粒子星空物理动画（已通过 CSS 隐藏画布，但 JS 逻辑保留避免报错） =====================
        const canvasOrig = document.getElementById('particleCanvas');
        const ctxOrig = canvasOrig.getContext('2d');
        let width, height;
        let particles = [];

        function resizeCanvasOrig() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvasOrig.width = width;
            canvasOrig.height = height;
        }
        window.addEventListener('resize', resizeCanvasOrig);
        resizeCanvasOrig();

        class ParticleOrig {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                const colorPool = [
                    'rgba(30, 140, 255, ',
                    'rgba(50, 200, 255, ',
                    'rgba(180, 60, 220, '
                ];
                this.colorBase = colorPool[Math.floor(Math.random() * colorPool.length)];
                this.alpha = Math.random() * 0.6 + 0.1;
                this.radius = Math.random() * 3.2 + 0.4;
                this.vx = (Math.random() - 0.5) * 0.35;
                this.vy = (Math.random() - 0.5) * 0.35;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctxOrig.beginPath();
                ctxOrig.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctxOrig.fillStyle = this.colorBase + this.alpha + ')';
                ctxOrig.fill();
            }
        }

        function initParticlesOrig() {
            particles = [];
            for (let i = 0; i < 800; i++) {
                particles.push(new ParticleOrig());
            }
        }
        initParticlesOrig();

        function animateParticlesOrig() {
            ctxOrig.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticlesOrig);
        }
        animateParticlesOrig();

        // ===================== 以下业务逻辑完全保留，未作任何改动 =====================
        const tableMode = document.getElementById('tableMode');
        const tableNumBox = document.getElementById('tableNumBox');
        tableMode.addEventListener('change', function(){
            tableNumBox.style.display = this.value === 'multi' ? 'flex' : 'none';
        });

        function formatDate(date){
            let y = date.getFullYear();
            let m = String(date.getMonth() + 1).padStart(2, '0');
            let d = String(date.getDate()).padStart(2, '0');
            return `${y}.${m}.${d}`;
        }

        function getDateRange(start, end){
            let dateArr = [];
            let current = new Date(start);
            let endDate = new Date(end);
            while(current <= endDate){
                dateArr.push(formatDate(new Date(current)));
                current.setDate(current.getDate() + 1);
            }
            return dateArr;
        }

        function createSingleTable(dateList, userName, systemName, spaceStr){
            let html = `
                <table class="check-table">
                    <tr>
                        <td colspan="5" class="table-title-cell">${systemName}每日巡检记录</td>
                    </tr>
                    <tr>
                        <td rowspan="2">时间</td>
                        <td rowspan="2">巡检人</td>
                        <td colspan="3">巡检要求</td>
                    </tr>
                    <tr>
                        <td>系统各功能均可<br>正常访问使用</td>
                        <td>系统功能响应速<br>度正常无延迟</td>
                        <td>系统服务存储占<br>用正常</td>
                    </tr>
            `;
            dateList.forEach(date => {
                html += `
                    <tr>
                        <td>${date}</td>
                        <td>${userName}</td>
                        <td>☐正常${spaceStr}☐异常</td>
                        <td>☐正常${spaceStr}☐异常</td>
                        <td>☐正常${spaceStr}☐异常</td>
                    </tr>
                `;
            });
            html += `
                    <tr>
                        <td colspan="5" style="text-align:left; padding-left:12px;">甲方确认：</td>
                    </tr>
                </table>
                <br><br>
            `;
            return html;
        }

        function generateTable(){
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const mode = document.getElementById('tableMode').value;
            const tableBox = document.getElementById('tableBox');
            const systemText = document.getElementById('systemNames').value;
            const userText = document.getElementById('userNames').value;
            const spaceStr = document.getElementById('spaceCount').value;

            let systemList = systemText.split('\n').filter(item => item.trim() !== '');
            let userList = userText.split('\n').filter(item => item.trim() !== '');

            if(!start || !end){
                alert('请选择起止日期！');
                return;
            }
            if(new Date(start) > new Date(end)){
                alert('开始日期不能晚于结束日期！');
                return;
            }

            const dateList = getDateRange(start, end);
            let totalHtml = '';

            if(mode === 'single'){
                let sysName = systemList[0] || '民办机构管理系统';
                let userName = userList[0] || '巡检人';
                totalHtml = createSingleTable(dateList, userName, sysName, spaceStr);
            }else{
                let count = parseInt(document.getElementById('tableCount').value);
                for(let i = 0; i < count; i++){
                    let sysName = systemList[i] || `民办机构管理系统${i+1}`;
                    let userName = userList[i] || '巡检人';
                    totalHtml += createSingleTable(dateList, userName, sysName, spaceStr);
                }
            }
            tableBox.innerHTML = totalHtml;
        }

        function exportToWord() {
            const tableBox = document.getElementById('tableBox');
            if (!tableBox.innerHTML) {
                alert('请先生成巡检表再导出！');
                return;
            }

            const wordStyle = `
                <style>
                    @page WordSection1 {
                        size:595.3pt 841.9pt;
                        margin: 72pt 90pt 72pt 90pt;
                        mso-page-orientation: portrait;
                        mso-header-margin:36pt;
                        mso-footer-margin:36pt;
                    }
                    div.WordSection1 {
                        page: WordSection1;
                    }
                    .table-title-cell {
                        font-family: "方正小标宋简体";
                        font-size: 22pt;
                        font-weight: normal;
                        text-align: center;
                        padding: 20px 0;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-bottom: 30px;
                    }
                    td {
                        border: 1px solid #333333;
                        padding: 12px 8px;
                        text-align: center;
                        font-family: "仿宋_GB2312";
                        font-size: 14pt;
                        font-weight: normal;
                        vertical-align: middle;
                    }
                </style>
            `;

            const fullHtml = `
                <html 
                    xmlns:v="urn:schemas-microsoft-com:vml"
                    xmlns:o="urn:schemas-microsoft-com:office:office"
                    xmlns:w="urn:schemas-microsoft-com:office:word"
                    xmlns:m="http://schemas.microsoft.com/office/2004/12/omml"
                    xmlns="http://www.w3.org/TR/REC-html40">
                    <head>
                        <meta charset="UTF-8">
                        <title>系统每日巡检记录表</title>
                        ${wordStyle}
                        <!--[if gte mso 9]>
                        <xml>
                            <w:WordDocument>
                                <w:View>Print</w:View>
                                <w:TrackMoves>false</w:TrackMoves>
