<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>文件模板下载工具 · Base64外置版</title>
    <style>
        /* ================= 所有样式与之前完全相同 ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
        }

        body {
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        :root {
            --glass-bg: rgba(15, 25, 45, 0.55);
            --glass-border: rgba(139, 92, 246, 0.35);
            --glass-border-hover: rgba(139, 92, 246, 0.65);
            --accent: #a78bfa;
            --accent-light: #c084fc;
            --btn-gradient-start: rgba(139, 92, 246, 0.3);
            --btn-gradient-end: rgba(6, 182, 212, 0.2);
            --btn-border: rgba(139, 92, 246, 0.5);
            --btn-border-hover: #a78bfa;
            --title-gradient: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
            --category-header-bg: rgba(20, 30, 50, 0.4);
            --category-header-hover: rgba(139, 92, 246, 0.2);
            --list-item-hover: rgba(139, 92, 246, 0.1);
        }

        body.theme-green {
            --glass-bg: rgba(20, 40, 35, 0.6);
            --glass-border: rgba(16, 185, 129, 0.4);
            --glass-border-hover: rgba(16, 185, 129, 0.7);
            --accent: #34d399;
            --accent-light: #6ee7b7;
            --btn-gradient-start: rgba(16, 185, 129, 0.3);
            --btn-gradient-end: rgba(5, 150, 105, 0.2);
            --btn-border: rgba(16, 185, 129, 0.5);
            --btn-border-hover: #34d399;
            --title-gradient: linear-gradient(135deg, #d1fae5, #34d399, #059669);
            --category-header-bg: rgba(20, 40, 35, 0.4);
            --category-header-hover: rgba(16, 185, 129, 0.2);
            --list-item-hover: rgba(16, 185, 129, 0.1);
        }

        body.theme-amber {
            --glass-bg: rgba(45, 35, 25, 0.6);
            --glass-border: rgba(245, 158, 11, 0.45);
            --glass-border-hover: rgba(245, 158, 11, 0.7);
            --accent: #fbbf24;
            --accent-light: #fcd34d;
            --btn-gradient-start: rgba(245, 158, 11, 0.3);
            --btn-gradient-end: rgba(217, 119, 6, 0.2);
            --btn-border: rgba(245, 158, 11, 0.5);
            --btn-border-hover: #fbbf24;
            --title-gradient: linear-gradient(135deg, #fef3c7, #f59e0b, #d97706);
            --category-header-bg: rgba(45, 35, 25, 0.4);
            --category-header-hover: rgba(245, 158, 11, 0.2);
            --list-item-hover: rgba(245, 158, 11, 0.1);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020308);
            pointer-events: none;
        }

        .mouse-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        .glass-container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 1400px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s, border-color 0.3s;
            padding: 2rem;
        }
        .glass-container:hover {
            transform: translateY(-3px);
            border-color: var(--glass-border-hover);
            box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.25) inset;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .title-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logo-glow {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--btn-gradient-start), var(--btn-gradient-end));
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--btn-border);
        }
        .logo-glow svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--title-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .desc {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .toolbar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .search-box {
            background: rgba(10, 18, 30, 0.7);
            border: 1.5px solid var(--glass-border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-box svg {
            width: 16px;
            height: 16px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 2;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: #e2e8f0;
            font-size: 0.9rem;
            min-width: 180px;
        }
        .search-box input::placeholder {
            color: #5c6f87;
        }
        .sort-btn {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--btn-border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: #e0e7ff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sort-btn:hover {
            border-color: var(--btn-border-hover);
            background: var(--category-header-hover);
        }
        .sort-btn svg {
            width: 14px;
            height: 14px;
            fill: var(--accent);
        }
        .theme-toggle {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid var(--btn-border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            color: #e0e7ff;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .theme-toggle:hover {
            border-color: var(--btn-border-hover);
            background: var(--category-header-hover);
        }
        .theme-toggle svg {
            width: 14px;
            height: 14px;
            fill: var(--accent);
        }

        .two-columns {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .templates-area {
            flex: 3;
            min-width: 280px;
        }
        .history-area {
            flex: 1.2;
            min-width: 240px;
        }

        .category-section {
            margin-bottom: 1rem;
        }
        .category-header {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-light);
            padding: 0.6rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            background: var(--category-header-bg);
            border-radius: 1rem;
            transition: all 0.2s;
            user-select: none;
        }
        .category-header:hover {
            background: var(--category-header-hover);
        }
        .category-header .cat-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
        }
        .toggle-icon {
            margin-left: auto;
            transition: transform 0.2s;
            font-size: 0.8rem;
            color: var(--accent);
        }
        .category-header.open .toggle-icon {
            transform: rotate(90deg);
        }
        .compact-list {
            display: none;
            background: rgba(20, 30, 50, 0.3);
            border-radius: 1rem;
            margin-top: 0.3rem;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }
        .compact-list.open {
            display: block;
        }
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
            transition: all 0.2s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item:hover {
            background: var(--list-item-hover);
        }
        .item-name {
            color: #e2e8f0;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
        }
        .item-stats {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #94a3b8;
            font-size: 0.8rem;
        }
        .download-count {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .download-btn-small {
            background: linear-gradient(95deg, var(--btn-gradient-start), var(--btn-gradient-end));
            border: 1px solid var(--btn-border);
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #e0e7ff;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .download-btn-small:hover {
            background: var(--btn-gradient-start);
            border-color: var(--btn-border-hover);
            transform: translateY(-1px);
        }
        .download-btn-small svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .history-card {
            background: rgba(20, 30, 50, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
        }
        .history-title {
            font-weight: 600;
            color: var(--accent-light);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .history-title svg {
            width: 18px;
            height: 18px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
        }
        .history-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-name {
            color: #cbd5e6;
            cursor: pointer;
        }
        .history-name:hover {
            color: var(--accent);
        }
        .history-time {
            font-size: 0.65rem;
            color: #6b7280;
        }
        .clear-history {
            margin-top: 0.8rem;
            font-size: 0.7rem;
            text-align: right;
            cursor: pointer;
            color: #f87171;
        }
        .stats-bar {
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            padding: 0.6rem 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .stats-bar span {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .stats-bar svg {
            width: 14px;
            height: 14px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
        }
        .no-results {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
        }

        @media (max-width: 900px) {
            .two-columns {
                flex-direction: column;
            }
            .glass-container {
                padding: 1.2rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .list-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .item-stats {
                align-self: flex-end;
            }
        }
    </style>
</head>

    <!-- Three.js 粒子背景脚本（保持不变） -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"

    <script type="module">
        import * as THREE from 'three';
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);
        
        const particleCount = 2100;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 38;
            positions[i*3+1] = (Math.random() - 0.5) * 24;
            positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);
        
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1400 * 3);
        for (let i = 0; i < 1400; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 44;
            pos2[i*3+1] = (Math.random() - 0.5) * 28;
            pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);
        
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(900 * 3);
        for (let i = 0; i < 900; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 30;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);
        
        const ringCount = 380;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 5.2;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
            ringPositions[i*3+2] = -1.8;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        scene.fog = new THREE.FogExp2(0x03050b, 0.008);
        
        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            let mx = (e.clientX / window.innerWidth) * 2 - 1;
            let my = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mx * 0.9;
            targetCamY = my * 0.6;
        });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            particleSys.rotation.y = time * 0.06;
            particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSys2.rotation.y = time * 0.04;
            particleSys3.rotation.x = time * 0.03;
            ringPoints.rotation.z = time * 0.12;
            camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onResize);
        animate();
    </script>

            { category: "word", name: "设备维修申请单.docx", file: "设备维修申请单.docx", base64TxtUrl: REPO_RAW_BASE + "templates/word/设备维修申请单.docx.txt" },
            { category: "word", name: "请假审批表.docx", file: "请假审批表.docx", base64TxtUrl: REPO_RAW_BASE + "templates/word/请假审批表.docx.txt" },
            { category: "word", name: "会议纪要模板.docx", file: "会议纪要模板.docx", base64TxtUrl: REPO_RAW_BASE + "templates/word/会议纪要模板.docx.txt" },
            { category: "word", name: "工作总结报告.docx", file: "工作总结报告.docx", base64TxtUrl: REPO_RAW_BASE + "templates/word/工作总结报告.docx.txt" },
            { category: "word", name: "项目立项申请书.docx", file: "项目立项申请书.docx", base64TxtUrl: REPO_RAW_BASE + "templates/word/项目立项申请书.docx.txt" },
            { category: "word", name: "预算申报表.docx", file: "预算申报表.docx", base64TxtUrl: REPO_RAW_BASE + "templates/word/预算申报表.docx.txt" },
            // Excel 模板
            { category: "excel", name: "高初中插入模板.xlsx", file: "高初中插入模板.xlsx", base64TxtUrl: REPO_RAW_BASE + "templates/excel/高初中插入模板.xlsx.txt" },
            { category: "excel", name: "需修正毕业年级学生数据汇总表.xlsx", file: "需修正毕业年级学生数据汇总表.xlsx", base64TxtUrl: REPO_RAW_BASE + "templates/excel/需修正毕业年级学生数据汇总表.xlsx.txt" },
            { category: "excel", name: "行政区划、组织机构新增、修改报备单.xlsx", file: "行政区划、组织机构新增、修改报备单.xlsx", base64TxtUrl: REPO_RAW_BASE + "templates/excel/行政区划、组织机构新增、修改报备单.xlsx.txt" },
            { category: "excel", name: "成绩统计分析表.xlsx", file: "成绩统计分析表.xlsx", base64TxtUrl: REPO_RAW_BASE + "templates/excel/成绩统计分析表.xlsx.txt" },
            { category: "excel", name: "固定资产盘点表.xlsx", file: "固定资产盘点表.xlsx", base64TxtUrl: REPO_RAW_BASE + "templates/excel/固定资产盘点表.xlsx.txt" },
            { category: "excel", name: "考勤统计表.xlsx", file: "考勤统计表.xlsx", base64TxtUrl: REPO_RAW_BASE + "templates/excel/考勤统计表.xlsx.txt" },
            // PC 软件
            { category: "pc", name: "电脑工具.exe", file: "电脑工具.exe", base64TxtUrl: REPO_RAW_BASE + "templates/pc/电脑工具.exe.txt" },
            { category: "pc", name: "系统优化助手.exe", file: "系统优化助手.exe", base64TxtUrl: REPO_RAW_BASE + "templates/pc/系统优化助手.exe.txt" },
            { category: "pc", name: "数据恢复工具.exe", file: "数据恢复工具.exe", base64TxtUrl: REPO_RAW_BASE + "templates/pc/数据恢复工具.exe.txt" },
            { category: "pc", name: "网络调试助手.exe", file: "网络调试助手.exe", base64TxtUrl: REPO_RAW_BASE + "templates/pc/网络调试助手.exe.txt" },
            // 手机软件
            { category: "mobile", name: "大青山OA.apk", file: "大青山OA.apk", base64TxtUrl: REPO_RAW_BASE + "templates/mobile/大青山OA.txt" },
            { category: "mobile", name: "办公助手.apk", file: "办公助手.apk", base64TxtUrl: REPO_RAW_BASE + "templates/mobile/办公助手.apk.txt" },
            { category: "mobile", name: "学习通.apk", file: "学习通.apk", base64TxtUrl: REPO_RAW_BASE + "templates/mobile/学习通.apk.txt" },
            { category: "mobile", name: "企业微信.apk", file: "企业微信.apk", base64TxtUrl: REPO_RAW_BASE + "templates/mobile/企业微信.apk.txt" }
        ];

        // ========== 下载统计 & 最近记录 (localStorage) ==========
        let downloadStats = JSON.parse(localStorage.getItem("template_download_stats")) || {};
        function initStats() {
            templatesData.forEach(t => {
                if (downloadStats[t.name] === undefined) downloadStats[t.name] = 0;
            });
            localStorage.setItem("template_download_stats", JSON.stringify(downloadStats));
        }
        initStats();

        let recentDownloads = JSON.parse(localStorage.getItem("recent_downloads")) || [];
        function addRecentRecord(templateName) {
            recentDownloads = recentDownloads.filter(n => n !== templateName);
            recentDownloads.unshift(templateName);
            if (recentDownloads.length > 10) recentDownloads.pop();
            localStorage.setItem("recent_downloads", JSON.stringify(recentDownloads));
            renderHistory();
        }
        function clearHistory() {
            recentDownloads = [];
            localStorage.setItem("recent_downloads", JSON.stringify(recentDownloads));
            renderHistory();
            showToast("历史记录已清空");
        }

        // ========== 核心下载函数：从 .txt 文件获取 base64 字符串，解码后下载 ==========
        async function downloadTemplate(template) {
            try {
                // 1. 获取 base64 文本文件内容
                const response = await fetch(template.base64TxtUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const base64Text = await response.text();
                const trimmedBase64 = base64Text.trim();
                if (!trimmedBase64) throw new Error("Base64 内容为空");

                // 2. 将 base64 解码为二进制
                const binaryString = atob(trimmedBase64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                // 3. 创建 Blob 并触发下载
                const blob = new Blob([bytes], { type: "application/octet-stream" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = template.file;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

                // 4. 更新统计数据
                downloadStats[template.name] = (downloadStats[template.name] || 0) + 1;
                localStorage.setItem("template_download_stats", JSON.stringify(downloadStats));
                addRecentRecord(template.name);

                showToast(`✅ 下载成功：${template.file}`);
                renderTemplates(currentSort, currentSearch);
                renderStats();
            } catch (err) {
                console.error(err);
                showToast(`下载失败：${template.name}，请检查 base64 文件是否存在或格式正确`, true);
            }
        }

        let currentSort = "hot";
        let currentSearch = "";

        // ========== 辅助函数：分类图标 SVG ==========
        function getCategorySvg(cat) {
            switch(cat) {
                case 'word':
                    return `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M4 4h16v16H4z"/><path d="M8 8h8v8H8z"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>`;
                case 'excel':
                    return `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><rect x="4" y="4" width="16" height="16"/><line x1="8" y1="8" x2="16" y2="16"/><line x1="16" y1="8" x2="8" y2="16"/></svg>`;
                case 'pc':
                    return `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><rect x="4" y="4" width="16" height="12"/><path d="M8 20h8"/><path d="M12 16v4"/><path d="M20 12h-4"/></svg>`;
                case 'mobile':
                    return `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><rect x="7" y="2" width="10" height="20"/><line x1="11" y1="18" x2="13" y2="18"/></svg>`;
                default:
                    return `<svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><rect x="4" y="4" width="16" height="16"/><path d="M9 8h6"/><path d="M9 12h6"/><path d="M9 16h4"/></svg>`;
            }
        }

        // ========== 渲染模板列表（带折叠/展开） ==========
        function renderTemplates(sortBy, searchText) {
            let filtered = templatesData.filter(t => t.name.toLowerCase().includes(searchText.toLowerCase()));
            if (sortBy === "hot") {
                filtered.sort((a, b) => (downloadStats[b.name] || 0) - (downloadStats[a.name] || 0));
            } else {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            const grouped = { word: [], excel: [], pc: [], mobile: [] };
            filtered.forEach(t => { if (grouped[t.category]) grouped[t.category].push(t); });
            
            const categoryNames = {
                word: { title: "Word 模板" },
                excel: { title: "Excel 模板" },
                pc: { title: "电脑软件" },
                mobile: { title: "手机软件" }
            };
            
            let html = "";
            for (let [cat, items] of Object.entries(grouped)) {
                if (items.length === 0) continue;
                const catId = `cat-${cat}`;
                html += `<div class="category-section" data-category="${cat}">
                    <div class="category-header" data-cat-toggle="${catId}">
                        <span class="cat-icon">${getCategorySvg(cat)}</span>
                        <span>${categoryNames[cat].title}</span>
                        <span class="toggle-icon">▶</span>
                    </div>
                    <div class="compact-list" id="${catId}">
                `;
                items.forEach(item => {
                    const count = downloadStats[item.name] || 0;
                    html += `
                        <div class="list-item" data-name="${escapeHtml(item.name)}" data-file="${escapeHtml(item.file)}" data-url="${escapeHtml(item.base64TxtUrl)}" data-cat="${item.category}">
                            <span class="item-name">${escapeHtml(item.name)}</span>
                            <div class="item-stats">
                                <span class="download-count">
                                    <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none"><path d="M12 3v12m0 0l-3-3m3 3l3-3M5 21h14"/></svg>
                                    ${count}
                                </span>
                                <button class="download-btn-small">
                                    <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none"><path d="M4 17v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3M12 3v12m0 0l-3-3m3 3l3-3"/></svg>
                                    下载
                                </button>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            if (filtered.length === 0) html = `<div class="no-results">没有找到相关模板</div>`;
            document.getElementById("templatesContainer").innerHTML = html;
            
            // 折叠/展开事件
            document.querySelectorAll(".category-header").forEach(header => {
                const targetId = header.getAttribute("data-cat-toggle");
                const list = document.getElementById(targetId);
                header.classList.remove("open");
                if (list) list.classList.remove("open");
                header.addEventListener("click", (e) => {
                    e.stopPropagation();
                    header.classList.toggle("open");
                    if (list) list.classList.toggle("open");
                });
            });
            
            // 下载按钮事件
            document.querySelectorAll(".list-item").forEach(item => {
                const btn = item.querySelector(".download-btn-small");
                const name = item.getAttribute("data-name");
                const file = item.getAttribute("data-file");
                const url = item.getAttribute("data-url");
                const cat = item.getAttribute("data-cat");
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    downloadTemplate({ name, file, base64TxtUrl: url, category: cat });
                });
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 最近下载记录渲染
        function renderHistory() {
            const historyList = document.getElementById("historyList");
            if (!recentDownloads.length) {
                historyList.innerHTML = '<li style="color:#6b7280; text-align:center;">暂无记录</li>';
                return;
            }
            let html = "";
            recentDownloads.forEach(name => {
                const template = templatesData.find(t => t.name === name);
                if (!template) return;
                html += `<li class="history-item"><span class="history-name">${escapeHtml(name)}</span><span class="history-time">最近</span></li>`;
            });
            historyList.innerHTML = html;
            document.querySelectorAll(".history-name").forEach((el, idx) => {
                el.addEventListener("click", () => {
                    const name = recentDownloads[idx];
                    const template = templatesData.find(t => t.name === name);
                    if (template) downloadTemplate(template);
                });
            });
        }

        // 统计栏渲染
        function renderStats() {
            const total = templatesData.length;
            const ready = templatesData.filter(t => t.base64TxtUrl && t.base64TxtUrl.length > 0).length;
            const totalDownloads = Object.values(downloadStats).reduce((a,b) => a + b, 0);
            document.getElementById("statsBar").innerHTML = `
                <span><svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg> ${total}</span>
                <span><svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> ${ready}</span>
                <span><svg viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> ${totalDownloads}</span>
            `;
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement("div");
            toast.innerText = msg;
            toast.style.position = "fixed";
            toast.style.bottom = "20px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.backgroundColor = isError ? "#dc2626" : "#1e293b";
            toast.style.color = "#fff";
            toast.style.padding = "8px 20px";
            toast.style.borderRadius = "40px";
            toast.style.border = isError ? "1px solid #ef4444" : "1px solid var(--accent)";
            toast.style.backdropFilter = "blur(8px)";
            toast.style.zIndex = "9999";
            toast.style.fontSize = "0.85rem";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // 排序切换
        let sortHot = true;
        document.getElementById("sortBtn").addEventListener("click", () => {
            sortHot = !sortHot;
            currentSort = sortHot ? "hot" : "name";
            document.getElementById("sortLabel").innerText = sortHot ? "热度优先" : "名称排序";
            renderTemplates(currentSort, currentSearch);
        });

        // 搜索
        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("input", (e) => {
            currentSearch = e.target.value;
            renderTemplates(currentSort, currentSearch);
        });

        // 清除历史
        document.getElementById("clearHistoryBtn").addEventListener("click", clearHistory);

        // 主题切换
        let currentTheme = 0;
        const themeClasses = ['', 'theme-green', 'theme-amber'];
        document.getElementById("themeToggleBtn").addEventListener("click", () => {
            currentTheme = (currentTheme + 1) % themeClasses.length;
            document.body.classList.remove('theme-green', 'theme-amber');
            if (currentTheme !== 0) {
                document.body.classList.add(themeClasses[currentTheme]);
            }
            const themeNames = ['星云紫', '森系绿', '琥珀暖'];
            showToast(`主题已切换：${themeNames[currentTheme]}`);
        });

        // 初始化渲染
        renderTemplates("hot", "");
        renderHistory();
        renderStats();
    </script>
</body>
