    <style type="text/tailwindcss">
        @layer utilities {
            .glass {

        .sql-content-collapsed {
            overflow: hidden;

            content: '';
            position: absolute;
            bottom: 0;

            padding: 12px 20px;
            border-radius: 8px;

            z-index: 9999;
            animation: fadeIn 0.3s, fadeOut 0.3s 1.5s;

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

            cursor: row-resize;

            background: rgba(0,212,255,0.2);

</head>

<script>
// ===== Supabase配置（已填你的项目信息）=====
const SUPA_URL = "https://idmfuazwpzlkooohbxil.supabase.co";
const SUPA_KEY = "sb_publishable_1MNTRsfYYf86DQ-hhppn9g_9-37yos7";
// 生成唯一设备ID，同浏览器永久不变
const DEVICE_ID = localStorage.getItem("dev_id") || (()=>{
    let uid = Date.now() + "_" + Math.random().toString(32).slice(2);
    localStorage.setItem("dev_id", uid);
    return uid;
})();
let autoTimer = null; //自动备份计时器

// 粒子背景
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
    constructor(){this.reset()}
    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.radius = Math.random()*3+1;
        this.speedX = (Math.random()-0.5)*0.5;
        this.speedY = (Math.random()-0.5)*0.5;
        this.opacity = Math.random()*0.5+0.2;
    }
    update(){
        this.x += this.speedX;
        this.y += this.speedY;
        if(this.x<0||this.x>canvas.width||this.y<0||this.y>canvas.height) this.reset();
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle = document.documentElement.classList.contains('dark')
            ? `rgba(0,212,255,${this.opacity*0.6})`
            : `rgba(0,212,255,${this.opacity})`;
        ctx.fill();
    }
}
for(let i=0;i<80;i++) particles.push(new Particle());
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{p.update();p.draw()});
    requestAnimationFrame(animate);
}
animate();

// 全局数据
let data = JSON.parse(localStorage.getItem('sqlTool')) || {
    categories: ['用户数据','订单数据','商品数据'],
    sqlList: [],
    currentCate: '用户数据',
    config: {
        collapseHeight: 120,
        sortBy: "time",
        sortOrder: "desc",
        darkMode: false
    }
};

// ========== 主题 ==========
function initTheme(){
    if(data.config.darkMode){
        document.documentElement.classList.add('dark');
        document.getElementById('themeIcon').className = 'fa fa-sun-o mr-1';
    }
}
function toggleTheme(){
    data.config.darkMode = !data.config.darkMode;
    document.documentElement.classList.toggle('dark');
    document.getElementById('themeIcon').className = data.config.darkMode ? 'fa fa-sun-o mr-1' : 'fa fa-moon-o mr-1';
    saveData();
}

// ========== 编辑框拖拽调整高度 ==========
let isResizing = false;
const sqlArea = document.getElementById('sqlContent');
document.querySelectorAll('.resize-handle').forEach(handle=>{
    handle.onmousedown = ()=>isResizing = true;
});
window.onmouseup = ()=>isResizing = false;
window.onmousemove = (e)=>{
    if(!isResizing) return;
    let h = parseInt(sqlArea.style.height || "160px");
    sqlArea.style.height = Math.max(80, h + e.movementY) + "px";
};

// ========== 折叠高度设置 ==========
function setCollapseHeight(){
    let h = prompt("设置SQL默认折叠高度(px)", data.config.collapseHeight);
    if(h && !isNaN(h)){
        data.config.collapseHeight = parseInt(h);
        saveData();
        renderAll();
    }
}

// ========== 排序 ==========
function toggleSort(){
    const sortList = ['time','name'];
    let idx = sortList.indexOf(data.config.sortBy);
    idx = (idx + 1) % sortList.length;
    data.config.sortBy = sortList[idx];
    data.config.sortOrder = data.config.sortOrder === 'desc' ? 'asc' : 'desc';
    saveData();
    renderAll();
    showToast(`已按${sortList[idx]==='time'?'时间':'名称'}${data.config.sortOrder==='desc'?'倒序':'正序'}`);
}

// ========== SQL语法高亮 ==========
function highlightSql(sql){
    let ret = sql;
    const keywords = /\b(SELECT|FROM|WHERE|AND|OR|JOIN|LEFT|INNER|RIGHT|GROUP|ORDER|BY|LIMIT|INSERT|UPDATE|DELETE|CREATE|TABLE|ALTER|DROP|UNION|ALL|DISTINCT|AS|ON|IN|LIKE|BETWEEN|IS|NULL|NOT|CASE|WHEN|THEN|ELSE|END)\b/gi;
    const funcs = /\b(COUNT|SUM|AVG|MAX|MIN|IFNULL|COALESCE|CONCAT|SUBSTRING|REPLACE|UPPER|LOWER|DATE|NOW|CURDATE)\b/gi;
    const strs = /'[^']*'|"[^"]*"/g;
    const comments = /--.*$/gm;
    ret = ret.replace(comments, m=>`<span class="sql-comment">${m}</span>`);
    ret = ret.replace(strs, m=>`<span class="sql-string">${m}</span>`);
    ret = ret.replace(funcs, m=>`<span class="sql-function">${m}</span>`);
    ret = ret.replace(keywords, m=>`<span class="sql-keyword">${m}</span>`);
    return ret;
}

// ========== 悬浮提示 ==========
function showToast(msg){
    const div = document.createElement('div');
    div.className = 'toast bg-primary/90';
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 1800);
}

// ========== 分类管理 ==========
function renderCate(){
    const list = document.getElementById('cateList');
    list.innerHTML = "";
    data.categories.forEach(cate=>{
        const li = document.createElement('li');
        li.className = `p-3 rounded-lg cursor-pointer transition-all ${cate === data.currentCate ? 'bg-primary/20 border-l-4 border-primary font-medium' : 'bg-white/30 dark:bg-gray-700/30 hover:bg-white/50'}`;
        li.innerHTML = `
            <div class="flex justify-between items-center">
                <span>${cate}</span>
                <div class="flex gap-2">
                    <button onclick="renameCategory('${cate}')" class="text-yellow-500 text-xs"><i class="fa fa-pencil"></i></button>
                    <button onclick="delCategory('${cate}')" class="text-red-400 text-xs"><i class="fa fa-trash"></i></button>
                </div>
            </div>
        `;
        li.onclick = e=>{
            if(e.target.tagName === 'BUTTON') return;
            data.currentCate = cate;
            saveData();
            renderAll();
        };
        list.appendChild(li);
    });
}
function addCategory(){
    const name = document.getElementById('cateName').value.trim();
    if(!name) return alert("请输入分类名称");
    if(data.categories.includes(name)) return alert("分类已存在");
    data.categories.push(name);
    document.getElementById('cateName').value = "";
    saveData();
    renderAll();
}
function delCategory(cate){
    if(!confirm("确定删除该分类及所有关联SQL？")) return;
    data.categories = data.categories.filter(c=>c!==cate);
    data.sqlList = data.sqlList.filter(s=>s.cate!==cate);
    if(data.currentCate === cate) data.currentCate = data.categories[0] || "";
    saveData();
    renderAll();
}
function renameCategory(oldName){
    let newName = prompt("请输入新分类名称", oldName);
    if(!newName) return;
    if(newName !== oldName && data.categories.includes(newName)) return alert("分类名称已存在");
    data.categories = data.categories.map(c=>c===oldName?newName:c);
    data.sqlList.forEach(s=>{if(s.cate === oldName) s.cate = newName;});
    if(data.currentCate === oldName) data.currentCate = newName;
    saveData();
    renderAll();
    showToast("分类重命名成功");
}

// ========== SQL管理 ==========
function saveSql(){
    const title = document.getElementById('sqlTitle').value.trim();
    const content = document.getElementById('sqlContent').value.trim();
    if(!title || !content) return alert("请填写名称和SQL内容");
    let editDom = document.getElementById('editId');
    if(editDom){
        let id = editDom.value;
        let idx = data.sqlList.findIndex(item=>item.id == id);
        data.sqlList[idx] = {id:id, title, content, cate:data.currentCate, time:Date.now()};
        editDom.remove();
    }else{
        data.sqlList.push({
            id: Date.now(),
            title,
            content,
            cate: data.currentCate,
            time: Date.now()
        });
    }
    document.getElementById('sqlTitle').value = "";
    document.getElementById('sqlContent').value = "";
    saveData();
    renderAll();
    showToast("SQL保存成功");
}
function renderSql(){
    const list = document.getElementById('sqlList');
    let items = data.sqlList.filter(item=>item.cate === data.currentCate);
    // 排序
    if(data.config.sortBy === 'name'){
        items.sort((a,b)=>{
            return data.config.sortOrder === 'asc' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title);
        });
    }else{
        items.sort((a,b)=>{
            return data.config.sortOrder === 'asc' ? a.time - b.time : b.time - a.time;
        });
    }
    if(items.length === 0){
        list.innerHTML = '<div class="text-center py-10 text-gray-500">暂无保存的SQL</div>';
        return;
    }
    list.innerHTML = "";
    const collapseH = data.config.collapseHeight + "px";
    items.forEach(item=>{
        const div = document.createElement('div');
        div.className = 'bg-white/40 dark:bg-gray-800/40 rounded-xl p-4 border border-white/50';
        div.innerHTML = `
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-2">
                    <i class="fa fa-file-text-o text-primary"></i>
                    <span class="font-medium">${item.title}</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="copySql(${item.id})" class="bg-primary/20 text-primary px-3 py-1 rounded text-sm">
                        <i class="fa fa-copy"></i> 复制
                    </button>
                    <button onclick="editSql(${item.id})" class="bg-green-100 dark:bg-green-900/30 text-green-600 px-3 py-1 rounded text-sm">
                        <i class="fa fa-pencil"></i> 编辑
                    </button>
                    <button onclick="delSql(${item.id})" class="bg-red-100 text-red-600 px-3 py-1 rounded text-sm">
                        <i class="fa fa-trash"></i> 删除
                    </button>
                </div>
            </div>
            <div id="sql-${item.id}" class="sql-content-collapsed bg-gray-100 dark:bg-gray-800/60 p-3 rounded-lg font-mono text-sm whitespace-pre-wrap" style="max-height:${collapseH}">
                ${highlightSql(item.content)}
            </div>
            <div class="text-center mt-2">
                <button onclick="toggleSql(${item.id})" class="text-primary text-sm">
                    <i class="fa fa-chevron-down"></i> 展开
                </button>
            </div>
        `;
        list.appendChild(div);
    });
}
function toggleSql(id){
    const el = document.getElementById(`sql-${id}`);
    const btn = el.nextElementSibling.querySelector('button');
    if(el.classList.contains('sql-content-collapsed')){
        el.classList.remove('sql-content-collapsed');
        btn.innerHTML = '<i class="fa fa-chevron-up"></i> 收起';
    }else{
        el.classList.add('sql-content-collapsed');
        btn.innerHTML = '<i class="fa fa-chevron-down"></i> 展开';
    }
}
function copySql(id){
    let sql = data.sqlList.find(item=>item.id == id).content;
    navigator.clipboard.writeText(sql).then(()=>showToast("复制成功"));
}
function editSql(id){
    let item = data.sqlList.find(item=>item.id == id);
    document.getElementById('sqlTitle').value = item.title;
    document.getElementById('sqlContent').value = item.content;
    let input = document.createElement('input');
    input.type = 'hidden';
    input.id = 'editId';
    input.value = id;
    document.querySelector('.md\\:col-span-3').appendChild(input);
}
function delSql(id){
    if(!confirm("确定删除这条SQL？")) return;
    data.sqlList = data.sqlList.filter(item=>item.id != id);
    saveData();
    renderAll();
}

// ========== 修复后的XLSX导出导入（移除卡死循环） ==========
function exportSqlXlsx(){
    try {
        showToast("正在生成XLSX文件...");
        // 表头
        const header = ["分类名称","SQL唯一ID","SQL备注标题","SQL完整语句","创建时间戳"];
        const sheetRows = [header];

        data.sqlList.forEach(sqlItem => {
            const cateName = data.categories.find(c => c === sqlItem.cate) || "未分类";
            sheetRows.push([
                cateName,
                sqlItem.id,
                sqlItem.title,
                sqlItem.content,
                sqlItem.time
            ]);
        });

        // 创建工作簿&工作表
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(sheetRows);

        // 列宽配置，SQL列加宽
        ws['!cols'] = [
            {wch:16}, // A分类
            {wch:14}, // B ID
            {wch:30}, // C标题
            {wch:120}, // D SQL超长列
            {wch:16}  // E时间
        ];

        // 仅设置D列（SQL列）自动换行，不再全局循环所有单元格
        const wrapStyle = {
            alignment: {
                wrapText: true,
                vertical: "top"
            }
        };
        const range = XLSX.utils.decode_range(ws['!ref']);
        for(let r = range.s.r; r <= range.e.r; r++){
            const cellKey = XLSX.utils.encode_cell({r, c: 3}); // D列索引3
            if(ws[cellKey]) ws[cellKey].s = wrapStyle;
        }

        XLSX.utils.book_append_sheet(wb, ws, "SQL数据");
        // 清理文件名特殊字符
        const dateStr = new Date().toLocaleDateString().replace(/[\/:]/g,"-");
        XLSX.writeFile(wb, `SQL语句完整备份_${dateStr}.xlsx`);
        showToast("XLSX导出完成，超长SQL完整保存在单元格");
    } catch(err){
        console.error("导出失败",err);
        alert("导出出错："+err.message);
    }
}

// 打开文件选择框
function triggerXlsxImport(){
    document.getElementById("xlsxImportFile").click();
}

// 读取XLSX导入逻辑
document.getElementById("xlsxImportFile").onchange = async function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        try{
            const buffer = e.target.result;
            const wb = XLSX.read(buffer, {type:"array"});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(ws, {header:1});

            if(jsonData.length <= 1){
                alert("XLSX文件无有效数据");
                return;
            }

            const newCateSet = new Set();
            const newSqlList = [];

            // 跳过表头第0行
            for(let i = 1; i < jsonData.length; i++){
                const row = jsonData[i];
                if(!row || row.length <5) continue;
                const [cateName, sqlId, sqlTitle, sqlContent, sqlTime] = row;
                newCateSet.add(cateName);
                newSqlList.push({
                    id: sqlId,
                    cate: cateName,
                    title: sqlTitle,
                    content: sqlContent,
                    time: sqlTime
                });
            }

            // 合并分类
            const mergeCategories = [...new Set([...data.categories, ...newCateSet])];
            if(confirm("导入将合并分类，同ID SQL覆盖，确认导入？")){
                const idMap = new Map();
                newSqlList.forEach(item => idMap.set(String(item.id), item));
                // 保留本地独有的SQL
                const remainSql = data.sqlList.filter(old => !idMap.has(String(old.id)));
                const finalSql = [...remainSql, ...newSqlList];

                data.categories = mergeCategories;
                data.sqlList = finalSql;
                saveData();
                location.reload();
                alert("XLSX导入成功，页面刷新加载数据");
            }
        }catch(err){
            console.error("导入异常",err);
            alert("导入文件解析失败："+err.message);
        }
    };
    reader.readAsArrayBuffer(file);
};

// ========== 本地保存 + 3秒自动云端备份 ==========
function saveData(){
    localStorage.setItem('sqlTool', JSON.stringify(data));
    autoSaveCloud();
}

// 自动备份（修改数据3秒延迟上传Supabase）
function autoSaveCloud(){
    clearTimeout(autoTimer);
    autoTimer = setTimeout(async()=>{
        const sql = localStorage.getItem("sqlTool");
        if(!sql) return;
        try{
            await fetch(`${SUPA_URL}/rest/v1/sqlbackup`,{
                method:"POST",
                headers:{
                    "apikey":SUPA_KEY,
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    device_id:DEVICE_ID,
                    backup_time:new Date().toLocaleString(),
                    sql_data:sql
                })
            });
            console.log("✅自动云端备份成功");
        }catch(e){
            console.log("❌自动备份异常",e)
        }
    },3000);
}

// 手动一键云端备份
async function backupToCloud(){
    const sql = localStorage.getItem("sqlTool");
    if(!sql) return alert("暂无SQL数据可备份");
    try{
        await fetch(`${SUPA_URL}/rest/v1/sqlbackup`,{
            method:"POST", 
            headers:{
                "apikey":SUPA_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                device_id:DEVICE_ID,
                backup_time:new Date().toLocaleString(),
                sql_data:sql
            })
        });
        showToast("✅ 云端备份成功！去Supabase后台查看数据表");
    }catch(e){
        alert("❌ 备份失败："+e.message);
    }
}

// 云端恢复（拉取当前设备最新一条备份覆盖本地）
async function restoreFromCloud(){
    if(!confirm("恢复将覆盖本地全部现有数据，确定吗？")) return;
    try{
        const res = await fetch(`${SUPA_URL}/rest/v1/sqlbackup?device_id=eq.${DEVICE_ID}&order=backup_time.desc&limit=1`,{
            headers:{"apikey":SUPA_KEY}
        });
        const arr = await res.json();
        if(!arr || arr.length===0) return alert("暂无云端备份记录");
        localStorage.setItem("sqlTool",arr[0].sql_data);
        location.reload();
        alert("✅ 云端数据恢复成功！页面已刷新");
    }catch(e){
        alert("❌ 恢复失败："+e.message);
    }
}

function renderAll(){
    renderCate();
    renderSql();
}

// 初始化
initTheme();
renderAll();
</script>
