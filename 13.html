<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量生成更新SQL｜商务专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei UI", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        :root {
            --primary: #2A3B54;
            --primary-light: #3D506E;
            --primary-dark: #1E2B3F;
            --accent: #4A6A9E;
            --success: #3D6B4E;
            --success-light: #4A7D5E;
            --neutral-50: #F8F9FB;
            --neutral-100: #F1F3F7;
            --neutral-200: #E2E6EF;
            --neutral-300: #D0D5E0;
            --neutral-600: #6B7280;
            --neutral-800: #374151;
            --neutral-900: #111827;
            --radius: 16px;
            --radius-lg: 20px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
            --transition: all 0.32s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #F7F8FA 0%, #EAEFF5 100%);
            padding: 60px 20px;
            color: var(--neutral-800);
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .main-title {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 48px;
            letter-spacing: 1px;
            position: relative;
        }

        .main-title::after {
            content: '';
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        .card {
            background: #FFFFFF;
            border-radius: var(--radius-lg);
            padding: 40px 44px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .card-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-dark);
            letter-spacing: 0.5px;
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .tip {
            font-size: 15px;
            color: var(--neutral-600);
            margin: 14px 0;
            line-height: 1.7;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--neutral-100);
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 10px;
            margin-right: 10px;
            border: 1px solid var(--neutral-200);
        }

        .form-group {
            margin: 24px 0;
        }

        .form-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--neutral-800);
            margin-bottom: 10px;
            display: block;
        }

        .select-control {
            width: 100%;
            max-width: 380px;
            padding: 14px 18px;
            font-size: 15px;
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius);
            background: var(--neutral-50);
            outline: none;
            transition: var(--transition);
            color: var(--neutral-800);
        }

        .select-control:focus {
            border-color: var(--accent);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(74, 106, 158, 0.12);
        }

        textarea {
            width: 100%;
            height: 260px;
            padding: 20px;
            font-size: 15px;
            border: 1px solid var(--neutral-200);
            border-radius: var(--radius);
            background: var(--neutral-50);
            resize: vertical;
            outline: none;
            transition: var(--transition);
            color: var(--neutral-900);
            line-height: 1.6;
        }

        textarea:focus {
            border-color: var(--accent);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(74, 106, 158, 0.12);
        }

        .btn-group {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        button {
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #FFFFFF;
            fieldSelectbox-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), var(--success-light));
            color: #FFFFFF;
            box-shadow: var(--shadow-sm);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, var(--success-light), #548A66);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        button:disabled {
            background: var(--neutral-200) !important;
            color: var(--neutral-300) !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .sql-output {
            background: #1A2238;
            color: #E5E7EB;
            padding: 28px;
            border-radius: var(--radius);
            font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
            white-space: pre-wrap;
            max-height: 500px;
            overflow: auto;
            margin-top: 20px;
            line-height: 1.7;
            font-size: 14px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .copy-tip {
            color: var(--success);
            font-size: 15px;
            font-weight: 500;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--neutral-100);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neutral-300);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neutral-600);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">SQL 批量更新生成工具</h1>

        <div class="card">
            <div class="card-header">
                <div class="card-icon">📝</div>
                <h2>数据配置与录入</h2>
            </div>

            <p class="tip">
                <span class="badge">Excel 快捷粘贴</span>
                直接复制 Excel 两列数据粘贴即可，自动兼容空格、制表符、逗号分隔格式
            </p>

            <div class="form-group">
                <label class="form-label">选择使用版本</label>
                <select class="select-control" id="versionSelect">
                    <option value="A">A版本 - certificate_meta_message</option>
                    <option value="B">B版本 - kdsj_zxxs_by</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">选择需要更新的字段</label>
                <select class="select-control" id="fieldSelect">
                    <option value="bj">班级名称</option>
                    <option value="mz">民族</option>
                    <option value="xm">姓名</option>
                    <option value="xxmc">学校名称</option>
                    <option value="csrq">出生日期</option>
                    <option value="rxny">入学年月</option>
                    <option value="byny">毕业年月</option>
                    <option value="sfzjh">修改身份证号</option>
                </select>
            </div>

            <p class="tip" id="tipText">格式：身份证 + 内容（空格/制表符/逗号都支持）</p>
            <textarea id="dataInput" placeholder="请在此粘贴 Excel 两列数据，一行一条记录..."></textarea>

            <div class="btn-group">
                <button class="btn-primary" onclick="generateSql()">🔄 一键生成 SQL</button>
                <button class="btn-success" onclick="copySql()" id="copyBtn" disabled>📋 一键复制结果</button>
            </div>
            <div class="copy-tip" id="copyTip">✅ 复制成功，可直接在数据库执行</div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-icon">📤</div>
                <h2>SQL 生成结果</h2>
            </div>
            <div id="sqlResult" class="sql-output">等待生成数据...</div>
        </div>
    </div>

<script>
document.getElementById('fieldSelect').addEventListener('change', updateTip);
document.getElementById('versionSelect').addEventListener('change', updateTip);
document.getElementById('versionSelect').addEventListener('change', updateFieldOptions);

// 页面加载时初始化字段选项
window.onload = function() {
    updateFieldOptions();
    updateTip();
};

// 根据版本动态显示/隐藏户口所在地、性别选项
function updateFieldOptions() {
    const version = document.getElementById('versionSelect').value;
    const fieldSelect = document.getElementById('fieldSelect');
    
    // 清空动态添加的选项
    document.querySelectorAll('#fieldSelect option.dynamic').forEach(opt => opt.remove());
    
    // B版本添加 户口所在地、性别
    if (version === 'B') {
        const option1 = document.createElement('option');
        option1.value = 'xb';
        option1.textContent = '性别';
        option1.className = 'dynamic';
        fieldSelect.appendChild(option1);

        const option2 = document.createElement('option');
        option2.value = 'hkszd';
        option2.textContent = '户口所在地';
        option2.className = 'dynamic';
        fieldSelect.appendChild(option2);
    }
}

function updateTip() {
    const val = document.getElementById('fieldSelect').value;
    const tipText = document.getElementById('tipText');
    
    if (val === 'sfzjh') {
        tipText.innerText = '格式：旧身份证号 + 新身份证号（直接粘贴两列即可）';
    } else if (val === 'xxmc') {
        tipText.innerText = '学校格式：旧学校名 | 新学校名（直接粘贴两列即可）';
    } else {
        tipText.innerText = '格式：身份证 + 内容（空格/制表符/逗号都支持）';
    }
}

function generateSql() {
    const input = document.getElementById('dataInput').value.trim();
    const resultEl = document.getElementById('sqlResult');
    const copyBtn = document.getElementById('copyBtn');
    const version = document.getElementById('versionSelect').value;
    const currField = document.getElementById('fieldSelect').value;

    if (!input) {
        resultEl.innerText = '❌ 请先粘贴 Excel 数据';
        copyBtn.disabled = true;
        return;
    }

    const config = version === 'A' 
        ? { table: 'certificate_meta_message', idField: 'sfzh' }
        : { table: 'kdsj_zxxs_by', idField: 'sfzjh' };

    const lines = input.split('\n').filter(line => line.trim() !== '');
    let sql = '';

    lines.forEach(line => {
        const trimLine = line.trim();
        if (!trimLine) return;

        const parts = trimLine.split(/[\s,]+/).filter(p => p);
        if (parts.length < 2) return;

        const key = parts[0].trim().replace(/'/g, "''");
        const val = parts.slice(1).join(' ').trim().replace(/'/g, "''");

        // 字段映射：B版本班级是 bjmc
        let realField = currField;
        if (version === 'B' && realField === 'bj') {
            realField = 'bjmc';
        }

        if (currField === 'xxmc') {
            sql += `UPDATE ${config.table} SET xxmc = '${val}' WHERE xxmc = '${key}';\n`;
        } else if (currField === 'sfzjh') {
            sql += `UPDATE ${config.table} SET ${config.idField} = '${val}' WHERE ${config.idField} = '${key}';\n`;
        } else {
            sql += `UPDATE ${config.table} SET ${realField} = '${val}' WHERE ${config.idField} = '${key}';\n`;
        }
    });

    resultEl.innerText = sql || '⚠️ 未识别到有效数据，请检查格式';
    copyBtn.disabled = !sql;
}

function copySql() {
    const sqlText = document.getElementById('sqlResult').innerText;
    const copyTip = document.getElementById('copyTip');

    navigator.clipboard.writeText(sqlText).then(() => {
        copyTip.style.display = 'flex';
        setTimeout(() => copyTip.style.display = 'none', 2500);
    }).catch(() => {
        alert('复制失败，请手动选中复制');
    });
}
</script>
</body>
</html>
