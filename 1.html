<body class="bg-bg-main min-h-screen font-sans text-text-primary">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 标题区域 -->
        <header class="mb-8 text-center animate-fade-in">
            <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold text-text-primary mb-2 text-shadow-lg">
                <i class="fa fa-database text-primary mr-3"></i>SQL语句生成工具箱
            </h1>
            <p class="text-text-secondary text-lg max-w-2xl mx-auto">
                支持批量生成SQL插入/更新语句，通过Excel模板快速处理数据
            </p>

            <!-- 功能切换标签 -->
            <div class="flex justify-center mt-6 border-b border-primary/30 max-w-3xl mx-auto">
                <button id="insertTab" class="tab-active px-6 py-3 text-lg focus:outline-none transition-all">
                    中职插入语句
                </button>
                <button id="updateTab" class="px-6 py-3 text-lg text-text-secondary focus:outline-none transition-all hover:text-text-primary">
                    中职更新语句
                </button>
                <button id="middleInsertTab" class="px-6 py-3 text-lg text-text-secondary focus:outline-none transition-all hover:text-text-primary">
                    高/初中插入语句
                </button>
                <button id="middleUpdateTab" class="px-6 py-3 text-lg text-text-secondary focus:outline-none transition-all hover:text-text-primary">
                    高/初中更新语句
                </button>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧控制面板 -->
            <div class="lg:col-span-1 space-y-6 animate-slide-up" style="animation-delay: 0.1s">
                <!-- 控制面板卡片 -->
                <div class="bg-bg-card rounded-xl shadow-card p-6 card-3d border border-primary/20">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-text-primary">
                        <i class="fa fa-sliders text-primary mr-2"></i>控制面板
                    </h2>
                    
                    <!-- 文件操作按钮 -->
                    <div class="space-y-4">
                        <button id="downloadTemplate" class="w-full bg-gradient-to-r from-primary to-accent text-white font-medium py-3 px-4 rounded-lg shadow-soft flex items-center justify-center button-press gradient-border">
                            <i class="fa fa-download mr-2"></i> 下载Excel模板
                        </button>
                        
                        <div class="relative">
                            <label for="excelFile" class="w-full bg-gradient-to-r from-secondary to-emerald-400 text-white font-medium py-3 px-4 rounded-lg shadow-soft flex items-center justify-center cursor-pointer button-press gradient-border">
                                <i class="fa fa-upload mr-2"></i> 导入Excel文件
                                <input type="file" id="excelFile" accept=".xlsx" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                            </label>
                        </div>
                        
                        <button id="generateSQL" class="w-full bg-gradient-to-r from-accent to-purple-400 text-white font-medium py-3 px-4 rounded-lg shadow-soft flex items-center justify-center button-press gradient-border">
                            <i class="fa fa-code mr-2"></i> 生成SQL语句
                        </button>
                        
                        <!-- 一键复制SQL -->
                        <button id="copySQL" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg shadow-soft flex items-center justify-center button-press">
                            <i class="fa fa-copy mr-2"></i> 一键复制SQL
                        </button>

                        <!-- 合并：一键清空所有 -->
                        <button id="clearAll" class="w-full bg-red-500 hover:bg-red-600 text-white font-medium py-3 px-4 rounded-lg shadow-soft flex items-center justify-center button-press">
                            <i class="fa fa-trash mr-2"></i> 清空所有数据&结果
                        </button>
                        
                        <button id="saveSQL" class="w-full bg-gray-700 hover:bg-gray-800 text-white font-medium py-3 px-4 rounded-lg shadow-soft flex items-center justify-center button-press">
                            <i class="fa fa-save mr-2"></i> 保存SQL语句
                        </button>
                    </div>
                </div>
                
                <!-- 状态面板 -->
                <div class="bg-bg-card rounded-xl shadow-card p-6 card-3d border border-primary/20">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-text-primary">
                        <i class="fa fa-info-circle text-primary mr-2"></i>当前状态
                    </h2>
                    <div id="status" class="bg-bg-main rounded-lg p-4 min-h-[100px] border border-primary/20">
                        <p class="text-text-secondary">请下载模板并填写数据</p>
                    </div>
                </div>
            </div>
            
            <!-- 右侧结果显示区域 -->

                    <h2 class="text-xl font-bold mb-4 flex items-center text-text-primary">
                        <i class="fa fa-code text-primary mr-2"></i>生成的SQL语句
                    </h2>
                    
                    <!-- SQL结果文本区域 -->
                    <div class="flex-grow mb-4">
                        <div class="relative h-full">
                            <textarea id="sqlResult" class="w-full h-full p-4 bg-bg-main rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/30 input-focus resize-none font-mono text-sm text-text-primary" placeholder="生成的SQL语句将显示在这里..."></textarea>
                            <div class="absolute bottom-3 right-3 text-xs text-text-secondary">
                                <span id="lineCount">0</span> 行
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- 数据预览区域 -->
        <div class="mt-8 bg-bg-card rounded-xl shadow-card p-6 card-3d animate-slide-up border border-primary/20" style="animation-delay: 0.3s">
            <h2 class="text-xl font-bold mb-4 flex items-center text-text-primary">
                <i class="fa fa-table text-primary mr-2"></i>数据预览
                <span id="dataCount" class="ml-2 text-sm font-normal text-text-secondary">0 条记录</span>
            </h2>
            <div id="dataPreview" class="overflow-x-auto max-h-[300px] scrollbar-thin">
                <table class="min-w-full divide-y divide-primary/20">
                    <thead class="sticky top-0 z-10 bg-bg-main">
                        <tr id="previewHeader">
                            <!-- 表头将通过JS动态生成 -->
                        </tr>
                    </thead>
                    <tbody id="previewBody" class="bg-bg-card divide-y divide-primary/20">
                        <!-- 数据行将通过JS动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer class="mt-12 text-center text-text-secondary text-sm animate-fade-in" style="animation-delay: 0.4s">
            <p>SQL语句生成工具箱 &copy; 2025 | 设计与开发</p>
        </footer>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed bottom-6 right-6 px-6 py-4 rounded-lg shadow-toast transform translate-y-20 opacity-0 transition-all duration-300 flex items-center z-50 font-medium text-white toast-content">
        <i id="toastIcon" class="fa fa-check-circle mr-3 text-xl"></i>
        <span id="toastMessage"></span>
    </div>

    <!-- 加载中模态框 -->
    <div id="loadingModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">

            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mb-4"></div>
            <p id="loadingMessage" class="text-text-primary font-medium">处理中...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        // 全局变量
        let excelData = null;
        let sqlResult = '';
        let currentMode = 'insert';
        let currentTableType = 'zzxs';
        
        function getModeText() {
            const modeMap = {
                'insert': '中职插入',
                'update': '中职更新',
                'middleInsert': '高/初中插入',
                'middleUpdate': '高/初中更新'
            };
            return modeMap[currentMode] || '未知模式';
        }
        
        // DOM元素
        const insertTab = document.getElementById('insertTab');
        const updateTab = document.getElementById('updateTab');
        const downloadTemplateBtn = document.getElementById('downloadTemplate');
        const excelFileInput = document.getElementById('excelFile');
        const generateSQLBtn = document.getElementById('generateSQL');
        const saveSQLBtn = document.getElementById('saveSQL');
        const statusEl = document.getElementById('status');
        const sqlResultEl = document.getElementById('sqlResult');
        const lineCountEl = document.getElementById('lineCount');
        const dataPreviewHeader = document.getElementById('previewHeader');
        const dataPreviewBody = document.getElementById('previewBody');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const toastIcon = document.getElementById('toastIcon');
        const loadingModal = document.getElementById('loadingModal');
        const loadingMessage = document.getElementById('loadingMessage');
        const dataCountEl = document.getElementById('dataCount');
        const middleInsertTab = document.getElementById('middleInsertTab');
        const middleUpdateTab = document.getElementById('middleUpdateTab');
        
        // 新增按钮
        const copySQLBtn = document.getElementById('copySQL');
        const clearAllBtn = document.getElementById('clearAll');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('请下载模板并填写数据');
            updateLineCount();
            
            insertTab.addEventListener('click', () => switchMode('insert'));
            updateTab.addEventListener('click', () => switchMode('update'));
            
            downloadTemplateBtn.addEventListener('click', downloadTemplate);
            excelFileInput.addEventListener('change', handleFileUpload);
            generateSQLBtn.addEventListener('click', generateSQL);
            saveSQLBtn.addEventListener('click', saveSQL);
            middleInsertTab.addEventListener('click', () => switchMode('middleInsert'));
            middleUpdateTab.addEventListener('click', () => switchMode('middleUpdate'));

            // 绑定新增按钮事件
            copySQLBtn.addEventListener('click', copySQLToClipboard);
            clearAllBtn.addEventListener('click', clearAllDataAndResult);
            
            sqlResultEl.addEventListener('input', adjustTextareaHeight);
            document.body.appendChild(toast);
        });
        
        // 切换模式
        function switchMode(mode) {
            [insertTab, updateTab, middleInsertTab, middleUpdateTab].forEach(tab => {
                tab.classList.remove('tab-active');
                tab.classList.add('text-text-secondary');
            });

            currentMode = mode;
            let modeText = '';
            let tableType = '';
    
            switch(mode) {
                case 'insert':
                    insertTab.classList.add('tab-active');
                    insertTab.classList.remove('text-text-secondary');
                    modeText = '中职插入';
                    tableType = 'zzxs';
                    break;
                case 'update':
                    updateTab.classList.add('tab-active');
                    updateTab.classList.remove('text-text-secondary');
                    modeText = '中职更新';
                    tableType = 'zzxs';
                    break;
                case 'middleInsert':
                    middleInsertTab.classList.add('tab-active');
                    middleInsertTab.classList.remove('text-text-secondary');
                    modeText = '高/初中插入';
                    tableType = 'zxxs';
                    break;
                case 'middleUpdate':
                    middleUpdateTab.classList.add('tab-active');
                    middleUpdateTab.classList.remove('text-text-secondary');
                    modeText = '高/初中更新';
                    tableType = 'zxxs';
                    break;
            }

            currentTableType = tableType;
            resetToolState();
            updateStatus(`已切换至【${modeText}】模式，请下载对应模板`);
            showToast(`已切换至【${modeText}】模式`);
        }
        
        // 重置工具状态
        function resetToolState() {
            excelData = null;
            sqlResult = '';
            sqlResultEl.value = '';
            dataPreviewHeader.innerHTML = '';
            dataPreviewBody.innerHTML = '';
            dataCountEl.textContent = '0 条记录';
            updateLineCount();
            excelFileInput.value = '';
        }

        // ==============================================
        // 合并：一键清空所有（数据 + SQL + 预览）
        // ==============================================
        function clearAllDataAndResult() {
            excelData = null;
            sqlResult = '';
            excelFileInput.value = '';
            sqlResultEl.value = '';
            dataPreviewHeader.innerHTML = '';
            dataPreviewBody.innerHTML = '';
            dataCountEl.textContent = '0 条记录';
            updateLineCount();
            updateStatus('已清空所有数据与SQL结果，可重新上传Excel');
            showToast('✅ 已一键清空所有内容');
        }

        // ==============================================
        // 一键复制SQL到剪贴板
        // ==============================================
        function copySQLToClipboard() {
            if (!sqlResultEl.value.trim()) {
                showToast('暂无SQL可复制', false);
                return;
            }
            navigator.clipboard.writeText(sqlResultEl.value).then(() => {
                showToast('✅ SQL已复制到剪贴板');
            }).catch(err => {
                showToast('复制失败', false);
            });
        }
        
        // 更新状态
        function updateStatus(message) {
            statusEl.innerHTML = `<p class="text-text-secondary">${message}</p>`;
        }
        
        function showToast(message, isSuccess = true) {
            document.body.appendChild(toast);
            toastMessage.textContent = message;
            if (isSuccess) {
                toastIcon.className = 'fa fa-check-circle mr-3 text-xl';
                toast.classList.remove('toast-error');
                toast.classList.add('toast-success');
            } else {
                toastIcon.className = 'fa fa-exclamation-circle mr-3 text-xl';
                toast.classList.remove('toast-success');
                toast.classList.add('toast-error');
            }
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-1');
            clearTimeout(toast.timeoutId);
            toast.timeoutId = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-1');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
        
        function showLoading(message = '处理中...') {
            loadingMessage.textContent = message;
            loadingModal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }
        
        function hideLoading() {
            loadingModal.classList.add('hidden');
            document.body.classList.remove('modal-open');
        }
        
        function updateLineCount() {
            const lines = sqlResultEl.value.split('\n').length;
            lineCountEl.textContent = lines;
        }
        
        function adjustTextareaHeight() {
            const maxHeight = 600;
            const currentHeight = this.scrollHeight;
            if (currentHeight > maxHeight) {
                this.style.height = `${maxHeight}px`;
            } else {
                this.style.height = `${currentHeight}px`;
            }
        }

            setTimeout(() => {
                try {

                            fileName = "中职插入模板.xlsx";
                        } else {
                            templateData = [{'xm':'张三','xb':'女','csrq':'20090912','zymc':'绘画','zybm':'750107','xz':'三年制','xxmc':'通辽经济技术开发区欧亚应用科技中等职业学校','xzxm':'NULL','zsh':'1505202501386551','xxszsmc':'通辽市','xxszsdm':'150500000000','rxny':'202209','byny':'202507','xxbsm':'3615000343','bjmc':'2022级秋季一班','sfzjh':'152322200609121829','original_sfzjh':'152322200609121829'}];
                            fileName = "中职更新模板.xlsx";
                        }
                    } else if (currentMode === 'middleInsert' || currentMode === 'middleUpdate') {
                        if (currentMode === 'middleInsert') {
                            templateData = [{'学生姓名':'张三','性别码':'1','性别':'男','身份证件号':'150826200608155411','民族码':'1','民族':'汉族','出生日期':'20060815','户口所在地码':'NULL','户口所在地':'内蒙古自治区巴彦淖尔市乌拉特前旗','入学年月':'202209','毕业年月':'202506','学校名称':'巴彦淖尔市衡越实验中学','班级名称':'高中2022级9班','制证日期':'NULL','毕业证书号':'NULL','学段状态码':'3','预留字段2':'NULL','预留字段3':'NULL','预留字段4':'NULL','预留字段5':'NULL','hash_code':'NULL'}];
                            fileName = "高初中插入模板.xlsx";
                        } else {
                            templateData = [{'xm':'张三','xbm':'01','xb':'男','sfzjh':'123456789012345678','mzm':'01','mz':'汉','csrq':'20010315','hkszdm':'710000000000','hkszd':'台湾省','rxny':'201209','byny':'202406','xxmc':'呼和浩特第二中学','bjmc':'高中2021级','ylzd1':'3','original_sfzjh':'123456789012345678'}];
                            fileName = "高初中更新模板.xlsx";
                        }
                    }
                    const ws = XLSX.utils.json_to_sheet(templateData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                    XLSX.writeFile(wb, fileName);
                    updateStatus(`模板已下载，请填写数据后导入`);
                    showToast(`🎉 ${getModeText()}模板下载成功！请按示例填写数据`);
                } catch (error) {
                    updateStatus('模板下载失败');
                    showToast('模板下载失败，请重试', false);
                    console.error('下载模板出错:', error);
                }
                hideLoading();
            }, 800);
        }
        
        // 处理文件上传
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            showLoading('正在解析文件...');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    excelData = XLSX.utils.sheet_to_json(worksheet);
                    
                    if (excelData.length === 0) {
                        throw new Error('Excel文件中没有数据');
                    }
                    
                    updateStatus(`已导入 ${excelData.length} 条数据`);
                    dataCountEl.textContent = `${excelData.length} 条记录`;
                    showToast(`🎉 成功导入 ${excelData.length} 条数据！可以生成SQL了`);
                    previewData(excelData);
                } catch (error) {
                    updateStatus('文件解析失败');
                    showToast('文件解析失败，请检查文件格式', false);
                    console.error('解析Excel出错:', error);
                }
                hideLoading();
            };
            reader.readAsArrayBuffer(file);
        }
        
        // 预览数据
        function previewData(data) {
            if (!data || data.length === 0) {
                dataPreviewHeader.innerHTML = '<th colspan="100%" class="text-center py-4 text-text-secondary">无数据</th>';
                dataPreviewBody.innerHTML = '';
                return;
            }
            const headers = Object.keys(data[0]);
            let headerHtml = '';
            headers.forEach(header => {
                headerHtml += `<th scope="col" class="px-6 py-3 text-left text-xs font-medium text-text-secondary uppercase tracking-wider">${header}</th>`;
            });
            dataPreviewHeader.innerHTML = headerHtml;
            let bodyHtml = '';
            data.forEach((row, index) => {
                let rowHtml = `<tr class="${index % 2 === 0 ? 'bg-bg-card' : 'bg-bg-main'}">`;
                headers.forEach(header => {
                    rowHtml += `<td class="px-6 py-4 whitespace-nowrap text-sm text-text-secondary">${row[header] || '-'}</td>`;
                });
                rowHtml += '</tr>';
                bodyHtml += rowHtml;
            });
            dataPreviewBody.innerHTML = bodyHtml;
        }
        
        // 生成SQL
        function generateSQL() {
            if (!excelData || excelData.length === 0) {
                showToast('请先导入Excel文件', false);
                return;
            }
    
            showLoading(`正在生成${getModeText()}SQL语句...`);
    
            setTimeout(() => {
                try {
                    let sql = '';
                    let tableName = currentTableType === 'zzxs' ? "kdsj_zzxs_zhizheng" : "kdsj_zxxs_by";
                    let generatedCount = 0;
                    let skippedCount = 0;
            
                    if (currentMode === 'insert' || currentMode === 'middleInsert') {
                        excelData.forEach((row, index) => {
                            const isEmptyRow = Object.values(row).every(value => 
                                value === undefined || value === null || (typeof value === 'string' && value.trim() === '')
                            );
                            if (isEmptyRow) { skippedCount++; return; }
                    
                            const requiredFields = currentTableType === 'zzxs' 
                                ? ['姓名', '身份证件号', '证书号'] 
                                : ['学生姓名', '身份证件号', '入学年月', '学校名称'];
                    
                            const hasRequiredFields = requiredFields.some(field => 
                                row[field] !== undefined && row[field] !== null && 
                                (typeof row[field] !== 'string' || row[field].trim() !== '')
                            );
                            if (!hasRequiredFields) { skippedCount++; return; }
                    
                            if (currentTableType === 'zzxs') {
                                sql += `INSERT INTO \`${tableName}\` VALUES (`;
                                sql += `'${escapeSqlValue(row.姓名 || '')}', `;
                                sql += `'${escapeSqlValue(row.性别 || '')}', `;
                                sql += `'${escapeSqlValue(row.出生日期 || '')}', `;
                                sql += `'${escapeSqlValue(row.专业名称 || '')}', `;
                                sql += `'${escapeSqlValue(row.专业代码 || '')}', `;
                                sql += `'${escapeSqlValue(row.学制 || '')}', `;
                                sql += `'${escapeSqlValue(row.学校名称 || '')}', `;
                                sql += `${isNullOrEmpty(row.校长姓名) ? 'NULL' : `'${escapeSqlValue(row.校长姓名 || '')}'`}, `;
                                sql += `'${escapeSqlValue(row.证书号 || '')}', `;
                                sql += `'${escapeSqlValue(row.学校所在盟市 || '')}', `;
                                sql += `'${escapeSqlValue(row.学校所在盟市代码 || '')}', `;
                                sql += `'${escapeSqlValue(row.入学年月 || '')}', `;
                                sql += `'${escapeSqlValue(row.毕业年月 || '')}', `;
                                sql += `'${escapeSqlValue(row.学校标识码 || '')}', `;
                                sql += `'${escapeSqlValue(row.班级名称 || '')}', `;
                                sql += `${isNullOrEmpty(row.hash_cedo) ? 'NULL' : `'${escapeSqlValue(row.hash_cedo || '')}'`}, `;
                                sql += `${isNullOrEmpty(row.身份证件号) ? 'NULL' : `'${escapeSqlValue(row.身份证件号 || '')}'`}`;
                                sql += `);\n`;
                            } else {
                                sql += `INSERT INTO \`${tableName}\` VALUES (`;
                                sql += `'${escapeSqlValue(row.学生姓名 || '')}', `;
                                sql += `'${escapeSqlValue(row.性别码 || '')}', `;
                                sql += `'${escapeSqlValue(row.性别 || '')}', `;
                                sql += `'${escapeSqlValue(row.身份证件号 || '')}', `;
                                sql += `'${escapeSqlValue(row.民族码 || '')}', `;
                                sql += `'${escapeSqlValue(row.民族 || '')}', `;
                                sql += `'${escapeSqlValue(row.出生日期 || '')}', `;
                                sql += `${isNullOrEmpty(row.户口所在地码) ? 'NULL' : `'${escapeSqlValue(row.户口所在地码)}'`}, `;
                                sql += `'${escapeSqlValue(row.户口所在地 || '')}', `;
                                sql += `'${escapeSqlValue(row.入学年月 || '')}', `;
                                sql += `'${escapeSqlValue(row.毕业年月 || '')}', `;
                                sql += `'${escapeSqlValue(row.学校名称 || '')}', `;
                                sql += `'${escapeSqlValue(row.班级名称 || '')}', `;
                                sql += `${isNullOrEmpty(row.制证日期) ? 'NULL' : `'${escapeSqlValue(row.制证日期)}'`}, `;
                                sql += `${isNullOrEmpty(row.毕业证书号) ? 'NULL' : `'${escapeSqlValue(row.毕业证书号)}'`}, `;
                                sql += `'${escapeSqlValue(row.学段状态码 || '')}', `;
                                sql += `${isNullOrEmpty(row.预留字段2) ? 'NULL' : `'${escapeSqlValue(row.预留字段2)}'`}, `;
                                sql += `${isNullOrEmpty(row.预留字段3) ? 'NULL' : `'${escapeSqlValue(row.预留字段3)}'`}, `;
                                sql += `${isNullOrEmpty(row.预留字段4) ? 'NULL' : `'${escapeSqlValue(row.预留字段4)}'`}, `;
                                sql += `${isNullOrEmpty(row.预留字段5) ? 'NULL' : `'${escapeSqlValue(row.预留字段5)}'`}, `;
                                sql += `${isNullOrEmpty(row.hash_code) ? 'NULL' : `'${escapeSqlValue(row.hash_code)}'`}`;
                                sql += `);\n`;
                            }
                            generatedCount++;
                        });
                    } else {
                        excelData.forEach((row, index) => {
                            const isEmptyRow = Object.values(row).every(value => 
                                value === undefined || value === null || (typeof value === 'string' && value.trim() === '')
                            );
                            if (isEmptyRow) { skippedCount++; return; }
                    
                            const requiredFields = ['sfzjh', 'original_sfzjh'];
                            const hasRequiredFields = requiredFields.some(field => 
                                row[field] !== undefined && row[field] !== null && 
                                (typeof row[field] !== 'string' || row[field].trim() !== '')
                            );
                            if (!hasRequiredFields) { skippedCount++; return; }
                    
                            if (currentTableType === 'zzxs') {
                                const setClauses = [];
                                const columns = ['xm', 'xb', 'csrq', 'zymc', 'zybm', 'xz', 'xxmc', 'xzxm', 'zsh', 'xxszsmc', 'xxszsdm', 'rxny', 'byny', 'xxbsm', 'bjmc', 'sfzjh'];
                                columns.forEach(col => {
                                    if (row[col] !== undefined && row[col] !== null) {
                                        let value = row[col];
                                        if (isNullOrEmpty(value)) { setClauses.push(`${col}=NULL`); return; }
                                        value = escapeSqlValue(value.toString().trim());
                                        setClauses.push(`${col}='${value}'`);
                                    }
                                });
                                const whereClause = `sfzjh='${escapeSqlValue(row.original_sfzjh || row.sfzjh)}'`;
                                if (setClauses.length > 0) {
                                    sql += `UPDATE ${tableName} SET ${setClauses.join(', ')} WHERE ${whereClause};\n`;
                                    generatedCount++;
                                } else { skippedCount++; }
                            } else {
                                const setClauses = [];
                                const columns = ['xm', 'xbm', 'xb', 'sfzjh', 'mzm', 'mz', 'csrq', 'hkszdm', 'hkszd', 'rxny', 'byny', 'xxmc', 'bjmc', 'ylzd1'];
                                columns.forEach(col => {
                                    if (row[col] !== undefined && row[col] !== null) {
                                        let value = row[col];
                                        if (isNullOrEmpty(value)) { setClauses.push(`${col}=NULL`); return; }
                                        value = escapeSqlValue(value.toString().trim());
                                        setClauses.push(`${col}='${value}'`);
                                    }
                                });
                                const whereClause = `sfzjh='${escapeSqlValue(row.original_sfzjh || row.sfzjh)}'`;
                                if (setClauses.length > 0) {
                                    sql += `UPDATE ${tableName} SET ${setClauses.join(', ')} WHERE ${whereClause};\n`;
                                    generatedCount++;
                                } else { skippedCount++; }
                            }
                        });
                    }
            
                    sqlResult = sql;
                    sqlResultEl.style.transition = 'height 0.2s ease-out';
                    sqlResultEl.value = '';
                    setTimeout(() => {
                        sqlResultEl.value = sqlResult;
                        adjustTextareaHeight.call(sqlResultEl);
                        updateLineCount();
                        sqlResultEl.style.transition = 'none';
                    }, 50);
            
                    const total = excelData.length;
                    if (generatedCount > 0) {
                        updateStatus(`已生成 ${generatedCount} 条SQL语句，跳过 ${skippedCount} 条记录`);
                        showToast(`🎉 成功生成 ${generatedCount} 条SQL语句！`);
                    } else {
                        updateStatus('未能生成SQL语句，请检查数据格式');
                        showToast('未能生成SQL语句，请检查数据格式', false);
                    }
                } catch (error) {
                    updateStatus('SQL生成失败');
                    showToast('SQL生成失败，请重试', false);
                    console.error('生成SQL出错:', error);
                }
                hideLoading();
            }, 1000);
        }
        
        // 保存SQL
        function saveSQL() {
            if (!sqlResult || sqlResult.trim() === '') {
                showToast('没有可保存的SQL语句', false);
                return;
            }
            
            try {
                const blob = new Blob([sqlResult], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${getModeText()}SQL_${new Date().toISOString().slice(0, 10)}.sql`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('SQL文件已保存');
            } catch (error) {
                showToast('保存失败，请重试', false);
                console.error('保存SQL出错:', error);
            }
        }
        
        // 辅助函数
        function escapeSqlValue(value) {
            if (value === undefined || value === null) return '';
            if (typeof value === 'string') {
                return value.replace(/'/g, "''").replace(/\\/g, "\\\\");
            }
            return value.toString();
        }
        
        function isNullOrEmpty(value) {
            return value === undefined || value === null || value === '' || value === 'NULL';
        }
    </script>
