<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内置工具箱</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{width:100vw;height:100vh;display:flex;overflow:hidden;background:#0f172a;}
        /* 左侧侧边栏 */
        .left-menu{width:220px;background:#1e293b;padding:20px 0;overflow-y:auto;}
        .menu-title{color:#7dd3fc;text-align:center;font-size:20px;margin-bottom:30px;letter-spacing:2px;}
        .menu-item{
            padding:12px 25px;
            color:#e2e8f0;
            cursor:pointer;
            margin:5px 10px;
            border-radius:6px;
            transition:0.2s;
        }
        .menu-item:hover,.menu-item.active{
            background:#334155;
            color:#38bdf8;
        }
        /* 右侧内容区 内嵌页面 */
        .main-box{flex:1;height:100%;}
        #iframeBox{
            width:100%;
            height:100%;
            border:none;
        }
    </style>
</head>
<body>
    <!-- 左侧菜单 -->
    <div class="left-menu">
        <h3 class="menu-title">工具列表</h3>
        <!-- 修改data-href为你的工具文件名 -->
        <div class="menu-item active" data-href="1.html">证照数据・学生信息批量录入工具</div>
        <div class="menu-item" data-href="l3.html">证照数据・学生信息批量更新工具</div>
        <div class="menu-item" data-href="10.html">装备填报・状态查询工具（V1）</div>
        <div class="menu-item" data-href="11.html">装备填报・状态查询工具（V2）</div>
        <div class="menu-item" data-href="12.html">装备填报・状态批量更新工具</div>
		<div class="menu-item" data-href="14.html">运维辅助・周报一键生成工具</div>
		<div class="menu-item" data-href="15.html">账号管理・批量账号生成工具</div>
    </div>

    <!-- 右侧内嵌加载区域 -->
    <div class="main-box">
        <iframe id="iframeBox" src="sql.html"></iframe>
    </div>

<script>
    // 菜单切换 原地加载不跳转
    const items = document.querySelectorAll('.menu-item');
    const iframe = document.getElementById('iframeBox');
    items.forEach(item=>{
        item.addEventListener('click',function(){
            // 切换选中样式
            items.forEach(i=>i.classList.remove('active'));
            this.classList.add('active');
            // 内嵌加载对应页面
            let url = this.getAttribute('data-href');
            iframe.src = url;
        })
    })
</script>
</body>
</html>
