<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>学校填报状态查询工具 · 赛博毛玻璃版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0c12;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* ---------- Three.js 画布背景 (动态粒子) ---------- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020308);
        }

        /* 鼠标跟随光晕 */
        .mouse-glow {
            position: fixed;
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 5;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        /* 主容器 — 毛玻璃卡片 */
        .glass-container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 950px;
            background: rgba(18, 25, 45, 0.5);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(139, 92, 246, 0.35);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 2rem 2rem 2.2rem;
        }

        .glass-container:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.7);
            box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.3) inset;
        }

        /* 标题区 */
        .title-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 1px dashed rgba(139, 92, 246, 0.5);
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        /* 表单组件 — 毛玻璃风格 */
        .field-group {
            margin-bottom: 1.8rem;
        }

        .field-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #06b6d4;
            margin-bottom: 0.6rem;
        }

        select, input, textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(12, 20, 35, 0.7);
            border: 1.5px solid rgba(139, 92, 246, 0.4);
            border-radius: 1.2rem;
            font-size: 0.9rem;
            color: #e2e8f0;
            transition: all 0.25s ease;
            outline: none;
            backdrop-filter: blur(4px);
        }

        select option {
            background: #0f172a;
            color: #e2e8f0;
        }

        select:focus, input:focus, textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
            background: rgba(20, 30, 55, 0.8);
        }

        textarea {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 260px;
        }

        /* 按钮组 — 流光霓虹 */
        .btn-group {
            display: flex;
            gap: 1.2rem;
            margin: 2rem 0 1.8rem;
            flex-wrap: wrap;
        }

        .cyber-btn {
            flex: 1;
            position: relative;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 0.85rem 0;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #e0e7ff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            letter-spacing: 1px;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.5), transparent);
            transition: left 0.5s ease;
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        .cyber-btn:hover {
            transform: translateY(-3px);
            border-color: #a78bfa;
            box-shadow: 0 6px 18px rgba(139, 92, 246, 0.35);
            color: white;
        }

        .btn-accent {
            background: linear-gradient(95deg, rgba(139, 92, 246, 0.25), rgba(236, 72, 153, 0.2));
            border-color: rgba(244, 114, 182, 0.7);
        }

        /* SQL 输出区域 */
        .sql-area {
            margin-top: 0.5rem;
        }

        .sql-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            color: #cbd5e6;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .sql-label i {
            font-style: normal;
            font-size: 1.1rem;
        }

        /* 滚动条美颜 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 6px;
        }

        /* 提示小字 */
        .tip-text {
            font-size: 0.7rem;
            color: #7e8ba0;
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tip-text span {
            background: rgba(139, 92, 246, 0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .glass-container {
                padding: 1.5rem;
            }
            .btn-group {
                flex-direction: column;
                gap: 0.8rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js 粒子画布 -->
    <canvas id="bg-canvas"></canvas>
    <!-- 鼠标光晕层 -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="glass-container">
        <div class="title-section">
            <h1>🏫 学校填报状态查询工具</h1>
            <div class="sub">⚡ 毛玻璃 · 动态粒子 · 精准 SQL 生成</div>
        </div>

        <!-- 表选择 -->
        <div class="field-group">
            <label class="field-label">📁 查询数据表</label>
            <select id="tableSelect">
                <option value="1">表1 - tbl_equ_two_ptjslbsb</option>
                <option value="2">表2 - tbl_equ_two_ptjsjrcs</option>
                <option value="3">表3 - tbl_equ_two_jsjjssb</option>
                <option value="4">表4 - tbl_equ_two_ptjssszd</option>
                <option value="5">表5 - tbl_equ_two_library_staff</option>
                <option value="6">表6 - tbl_equ_two_electrifyed_status</option>
                <option value="7">表7 - tbl_equ_two_library_build</option>
                <option value="8">表8 - tbl_equ_two_laboratory_staff</option>
                <option value="9">表9 - tbl_equ_two_laboratory_activity</option>
            </select>
        </div>

        <!-- 年度版本 -->
        <div class="field-group">
            <label class="field-label">📅 业务年度</label>
            <input type="text" id="yearVersion" value="2024" placeholder="例如 2025">
            <div class="tip-text"><span>💡 可修改</span> 动态筛选 version 字段</div>
        </div>

        <!-- 双按钮 -->
        <div class="btn-group">
            <button class="cyber-btn" id="btnStatus">📊 生成【填表状态查询SQL】</button>
            <button class="cyber-btn btn-accent" id="btnIsFill">🔍 生成【是否填报查询SQL】</button>
        </div>

        <!-- SQL 输出 -->
        <div class="sql-area">
            <div class="sql-label"><i>📜</i> SQL 结果输出</div>
            <textarea id="result" placeholder="生成的 SQL 语句将显示在这里..." readonly></textarea>
        </div>
    </div>

    <!-- Three.js 核心库 & 粒子动画 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);
        
        // --- 主粒子群 (紫晶色调) ---
        const particleCount = 2000;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 36;
            positions[i*3+1] = (Math.random() - 0.5) * 22;
            positions[i*3+2] = (Math.random() - 0.5) * 28 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x8b5cf6,
            size: 0.08,
            transparent: true,
            opacity: 0.65,
            blending: THREE.AdditiveBlending
        });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);
        
        // 第二层 青/粉 星云粒子
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1300 * 3);
        for (let i = 0; i < 1300; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 42;
            pos2[i*3+1] = (Math.random() - 0.5) * 26;
            pos2[i*3+2] = (Math.random() - 0.5) * 32 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({
            color: 0x06b6d4,
            size: 0.07,
            transparent: true,
            opacity: 0.55,
            blending: THREE.AdditiveBlending
        });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);
        
        // 第三层 暖色点缀
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(800 * 3);
        for (let i = 0; i < 800; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 28;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({
            color: 0xf472b6,
            size: 0.09,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);
        
        // 环形漂浮装饰
        const ringCount = 400;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 4.6;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.5;
            ringPositions[i*3+2] = -2.0;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.07, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        // 轻微雾效
        scene.fog = new THREE.FogExp2(0x03050b, 0.008);
        
        // 鼠标视差变量 (相机跟随)
        let mouseX = 0, mouseY = 0;
        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mouseX * 1.0;
            targetCamY = mouseY * 0.6;
        });
        
        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // 粒子缓慢自转
            particleSys.rotation.y = time * 0.08;
            particleSys.rotation.x = Math.sin(time * 0.2) * 0.1;
            particleSys2.rotation.y = time * 0.05;
            particleSys2.rotation.z = time * 0.03;
            particleSys3.rotation.x = time * 0.04;
            ringPoints.rotation.z = time * 0.15;
            
            // 相机视差平滑过渡
            camera.position.x += (targetCamX * 0.6 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onWindowResize);
        animate();
    </script>

    <!-- 鼠标光晕跟随逻辑 -->
    <script>
        const glowDiv = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glowDiv.style.left = e.clientX + 'px';
            glowDiv.style.top = e.clientY + 'px';
        });
    </script>

    <!-- 原有SQL逻辑 (完整保留，仅优化变量绑定) -->
    <script>
        // 表映射 (和原代码一致)
        const tableMap = {
            1: "tbl_equ_two_ptjslbsb",
            2: "tbl_equ_two_ptjsjrcs",
            3: "tbl_equ_two_jsjjssb",
            4: "tbl_equ_two_ptjssszd",
            5: "tbl_equ_two_library_staff",
            6: "tbl_equ_two_electrifyed_status",
            7: "tbl_equ_two_library_build",
            8: "tbl_equ_two_laboratory_staff",
            9: "tbl_equ_two_laboratory_activity"
        };

        function getYear() {
            return document.getElementById('yearVersion').value.trim() || '2024';
        }

        // 填表状态查询SQL（原模板完美保留）
        function getStatusSql(table) {
            const year = getYear();
            return `
-- 状态 0：待编辑
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '0';

-- 状态 1：旗县待审核
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '1';

-- 状态 2：盟市待审核
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '2';

-- 状态 3：盟市已审核
SELECT e.state, r.name, d.name AS 学校, pd.name AS 旗县, ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.state = '3';
`;
        }

        // 是否填报查询SQL
        function getIsFillSql(table) {
            const year = getYear();
            return `
-- 查询【未填报】学校
SELECT
    d.name AS 学校名称,
    pd.name AS 旗县,
    ppd.name AS 盟市
FROM sys_dept d
JOIN sys_user u ON u.dept_id = d.id
JOIN sys_user_role ur ON ur.user_id = u.id
JOIN sys_role r ON r.id = ur.role_id AND r.code = 'xue_xiao'
JOIN sys_dept pd ON pd.id = d.parent_id
JOIN sys_dept ppd ON ppd.id = pd.parent_id
LEFT JOIN ${table} e ON e.create_by = u.id AND e.version = '${year}'
WHERE e.create_by IS NULL;
`;
        }

        // 生成状态查询
        function generateStatusSql() {
            const key = document.getElementById('tableSelect').value;
            const table = tableMap[key];
            document.getElementById('result').value = getStatusSql(table).trim();
        }

        // 生成是否填报
        function generateIsFillSql() {
            const key = document.getElementById('tableSelect').value;
            const table = tableMap[key];
            document.getElementById('result').value = getIsFillSql(table).trim();
        }

        // 绑定按钮事件
        document.getElementById('btnStatus').addEventListener('click', generateStatusSql);
        document.getElementById('btnIsFill').addEventListener('click', generateIsFillSql);
        
        // 可选: 页面加载时默认展示状态查询示例
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('result').value = '生成的SQL 语句将显示在这里......';
        });
    </script>
</body>
</html>
