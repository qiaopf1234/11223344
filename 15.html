<script>
// 粒子动画
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let particles = [];
const particleColors = [
    'rgba(0,153,255,',
    'rgba(255,153,68,',
    'rgba(153,119,221,'
];

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.radius = Math.random() * 2.6 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.45;
        this.speedY = (Math.random() - 0.5) * 0.45;
        this.opacity = Math.random() * 0.38 + 0.08;
        this.color = particleColors[Math.floor(Math.random() * particleColors.length)];
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `${this.color}${this.opacity})`;
        ctx.fill();
    }
}
function initParticles(count = 80) {
    particles = [];
    for (let i = 0; i < count; i++) particles.push(new Particle());
}
initParticles();
function animateParticles() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// ===================== 业务全局变量 =====================
let resultData = [];
const KEY = "global_serial_no";
let orgMapping = [];
let schoolList = [];
let excelLoadSuccess = false;
let schoolExcelSuccess = false;
let matchDebounceTimer = null;

// 内置完整角色列表
const roleList = [
    "超级管理员", "特级管理员", "二级管理员", "重置密码", "教育厅制证二级管理员", "教育厅管理员", "校服系统管理员",
    "教育装备自治区管理人员", "盟市管理员", "普通角色", "测试角色", "基教处证照设置人员", "u-key登录",
    "购买校服举报", "违规招生举报", "违规征订教材", "我和我的老师", "老师，我想对您说", "我心中的好老师",
    "教育世家", "随手拍", "师德师风", "举报反馈", "校园餐", "校外培训", "校园餐投诉举报", "教师减负",
    "补课举报", "报平安人员", "报平安发布统计", "调查问卷", "教师资格证审批", "教师资格证申请", "竞赛单位", "教育局竞赛单位填报审核人员",
    "职业技术学校批量编辑", "批量编辑", "义务教育和高中教育学校证照制作负责人", "个人签名负责人", "学校盖章负责人",
    "手动导入学号并制高中毕业证", "职业技术学校证照制作负责人", "教育局数据审核人员", "基教处数据审核", "教育局盖章人员",
    "教育局证照签发确定人员", "校服管理", "报告学校角色", "报告旗县角色", "报告盟市角色", "学校校服上报", "教育局校服备案"
];

// 更新组织机构文件加载状态显示
function updateOrgFileStatus(text, colorClass, icon) {
    const statusDom = document.getElementById("orgFileStatus");
    statusDom.className = `fluid-frosted rounded-fluid-sm py-2 px-4 inline-block text-sm ${colorClass}`;
    statusDom.innerHTML = `<i class="fa ${icon} mr-1"></i>${text}`;
}

// 加载 school_list.xlsx 标准单位库（用于简写模糊匹配）
async function loadSchoolList() {
    try {
        const res = await fetch("./school_list.xlsx");
        if (!res.ok) throw new Error("文件不存在");
        const buf = await res.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array" });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        const names = new Set();
        json.forEach(row => {
            row.forEach(cell => {
                if (cell && String(cell).trim()) names.add(String(cell).trim());
            })
        })
        schoolList = Array.from(names);
        schoolExcelSuccess = true;
        return true;
    } catch (e) {
        schoolExcelSuccess = false;
        schoolList = [];
        return false;
    }
}

// 读取Excel组织机构映射文件
async function loadOrgMapping() {
    updateOrgFileStatus("正在并行加载 org-map.xlsx、school_list.xlsx ...", "text-warnYellow", "fa-spinner fa-spin");
    const [orgRes, schoolOk] = await Promise.all([
        (async ()=>{
            try {
                const res = await fetch("./org-map.xlsx");
                if (!res.ok) throw new Error("文件不存在或路径错误");
                const arrayBuffer = await res.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: "array" });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                if (jsonData.length === 0 || !jsonData[0].hasOwnProperty("parent_name") || !jsonData[0].hasOwnProperty("org_name")) {
                    throw new Error("表头缺少parent_name/org_name");
                }
                orgMapping = jsonData.map(item => ({
                    belongOrg: String(item["org_name"]).trim(),
                    superOrg: String(item["parent_name"]).trim()
                })).filter(item => item.belongOrg && item.superOrg);
                excelLoadSuccess = true;
                return true;
            } catch (e) {
                excelLoadSuccess = false;
                orgMapping = [];
                return e.message;
            }
        })(),
        loadSchoolList()
    ]);

    let tipText = "";
    if (typeof orgRes === "string") {
        tipText += `org-map.xlsx 失败:${orgRes}; `;
    } else {
        tipText += `org-map加载成功(${orgMapping.length}条上下级); `;
    }
    if (schoolOk) {
        tipText += `school_list加载成功(${schoolList.length}个标准单位)`;
        updateOrgFileStatus(tipText, "text-successGreen", "fa-check-circle");
    } else {
        tipText += `school_list.xlsx加载失败，简写模糊匹配功能失效`;
        updateOrgFileStatus(tipText, "text-dangerRed", "fa-times-circle");
    }
}

// ========== 优化后的双向模糊匹配（解决教育局简写匹配差）==========
function fuzzySearchSchool(keyword) {
    if (!schoolExcelSuccess || schoolList.length === 0) return null;
    const kw = keyword.trim().replace(/\s/g, "");
    if (!kw) return null;

    // 教育关键词权重，优先匹配带关键字的单位
    const weightKeys = ["教育局", "教体局", "中学", "小学", "幼儿园", "职校", "一中", "二中", "三中", "旗", "区", "市"];

    let matchPool = [];
    schoolList.forEach(fullName => {
        const cleanName = fullName.replace(/\s/g, "");
        // 双向包含匹配：简写包含全称片段 / 全称包含简写
        if (cleanName.includes(kw) || kw.includes(cleanName)) {
            // 计算匹配权重
            let weight = 0;
            weight += cleanName === kw ? 100 : 0; // 完全匹配最高
            weight += cleanName.startsWith(kw) ? 20 : 0; // 开头匹配加分
            weight += kw.startsWith(cleanName) ? 15 : 0;
            weightKeys.forEach(wk => {
                if (cleanName.includes(wk)) weight += 8;
                if (kw.includes(wk)) weight += 12;
            })
            // 名称长度差值越小越优
            const lenDiff = Math.abs(cleanName.length - kw.length);
            weight -= lenDiff;
            matchPool.push({ name: fullName, weight });
        }
    });

    if (matchPool.length === 0) return null;
    // 权重从高到低排序，取第一条最优匹配
    matchPool.sort((a, b) => b.weight - a.weight);
    return matchPool[0].name;
}

// 匹配上下级
function getSuperByBelong(rawName) {
    const rawTrim = rawName.trim();
    const rawClean = rawTrim.replace(/\s/g, "");
    // 1. 精准全等匹配
    const exactMatch = orgMapping.find(o => o.belongOrg.trim().replace(/\s/g, "") === rawClean);
    if (exactMatch) {
        return { super: exactMatch.superOrg, standardName: rawTrim, fuzzy: false };
    }

    // 2. 简写模糊检索标准全称
    const standardName = fuzzySearchSchool(rawTrim);
    if (!standardName) {
        return { super: null, standardName: rawTrim, fuzzy: false, noMatch: true };
    }

    // 3. 标准全称去空格后匹配上级
    const cleanStd = standardName.replace(/\s/g, "");
    const stdMatch = orgMapping.find(o => o.belongOrg.trim().replace(/\s/g, "") === cleanStd);
    if (stdMatch) {
        return { super: stdMatch.superOrg, standardName: standardName, fuzzy: true };
    }

    return { super: null, standardName: standardName, fuzzy: true, noMatch: true };
}

// 解析单行机构文本，拆分 上级、机构、单行角色
function parseUnitLine(lineText) {
    const raw = lineText.trim();
    let customRole = "";
    let mainPart = raw;
    // 先拆分角色分隔符 ||
    if (raw.includes("||")) {
        const splitArr = raw.split("||").map(i=>i.trim());
        mainPart = splitArr[0];
        customRole = splitArr[1] || "";
    }
    // 再拆分上级|机构
    let superOrg = "";
    let unitName = mainPart;
    if (mainPart.includes("|")) {
        const splitArr = mainPart.split("|").map(i=>i.trim());
        superOrg = splitArr[0];
        unitName = splitArr[1];
    }
    return { superOrg, unitName, customRole };
}

// 实时解析所属机构预览
function realTimeMatchPreview() {
    clearTimeout(matchDebounceTimer);
    matchDebounceTimer = setTimeout(() => {
        const unitRawList = document.getElementById("unitList").value.split("\n").map(i => i.trim()).filter(Boolean);
        const defaultSuper = document.getElementById("superOrg").value.trim();
        const defaultRole = document.getElementById("roleSel").value;
        const boxDom = document.getElementById("realTimeMatchBox");
        if (unitRawList.length === 0) {
            boxDom.innerHTML = "<span class='text-fluidTextMuted'>输入所属机构后实时展示匹配结果，简写自动识别标准全称，支持每行自定义角色</span>";
            return;
        }
        let html = "";
        let missingCount = 0;
        unitRawList.forEach((rawLine, idx) => {
            const parseRes = parseUnitLine(rawLine);
            const { superOrg: fixSuper, unitName, customRole } = parseRes;
            let displaySuper, standardName, isFuzzy = false;

            if (fixSuper) {
                displaySuper = fixSuper;
                standardName = unitName;
                html += `<div class="mb-1"><span class="text-fluidBlue">${idx+1}.强制指定上级</span>：输入${rawLine} → 所属${standardName} → 上级${displaySuper}`;
            } else {
                const matchRes = getSuperByBelong(unitName);
                standardName = matchRes.standardName;
                isFuzzy = matchRes.fuzzy;
                if (matchRes.super) {
                    displaySuper = matchRes.super;
                    if(isFuzzy){
                        html += `<div class="mb-1"><span class="text-matchCyan">${idx+1}.简写模糊匹配成功</span>：输入「${unitName}」转标准全称「${standardName}」→ ${displaySuper}`;
                    }else{
                        html += `<div class="mb-1"><span class="text-successGreen">${idx+1}.精准匹配成功</span>：${standardName} → ${displaySuper}`;
                    }
                } else {
                    displaySuper = defaultSuper || "无兜底上级";
                    missingCount++;
                    if(matchRes.noMatch){
                        html += `<div class="mb-1"><span class="text-dangerRed">${idx+1}.完全未匹配</span>：输入「${unitName}」检索不到标准单位，使用兜底${displaySuper}`;
                    }else{
                        html += `<div class="mb-1"><span class="text-dangerRed">${idx+1}.全称存在但无上级</span>：标准名「${standardName}」无对应上级，使用兜底${displaySuper}`;
                    }
                }
            }
            // 展示单行自定义角色
            if(customRole){
                html += ` <span class="text-lineRolePurple">[本行独立角色：${customRole}]</span>`;
            }else{
                html += ` <span class="text-fluidTextMuted">[使用全局角色：${defaultRole}]</span>`;
            }
            html += "</div>";
        });
        if(missingCount > 0){
            html = `<div class="text-dangerRed mb-2">共${missingCount}条单位无法自动匹配上下级，将使用兜底上级</div>` + html;
        }
        boxDom.innerHTML = html;
    }, 300);
}

// 初始化角色下拉
function initRoleSelect() {
    const sel = document.getElementById("roleSel");
    sel.innerHTML = "";
    roleList.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r;
        opt.textContent = r;
        sel.appendChild(opt);
    });
    sel.value = "";
    sel.onchange = realTimeMatchPreview;
}

// 流水号
function getStart(count) {
    let cur = parseInt(localStorage.getItem(KEY) || "1");
    localStorage.setItem(KEY, cur + count);
    return cur;
}
function resetSerial() {
    if (confirm("确定重置流水号？下次生成从00001开始！")) {
        localStorage.setItem(KEY, "1");
        alert("流水号重置完成");
    }
}

// 历史下拉缓存
function loadSel(key) {
    const list = JSON.parse(localStorage.getItem(key + "_list") || "[]");
    const sel = document.getElementById(key + "Sel");
    sel.innerHTML = "";
    list.forEach(v => {
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        sel.appendChild(o);
    });
    sel.onchange = () => document.getElementById(key).value = sel.value;
}
function add(key) {
    const val = document.getElementById(key).value.trim();
    if (!val) return alert("请输入内容");
    let list = JSON.parse(localStorage.getItem(key + "_list") || "[]");
    if (!list.includes(val)) list.push(val);
    localStorage.setItem(key + "_list", JSON.stringify(list));
    loadSel(key);
}

// 生成账号主逻辑
function generate() {
    const prefix = document.getElementById("prefix").value || "xfgl_";
    const typeCode = document.getElementById("typeCode").value || "";
    const suffixTemplate = document.getElementById("suffix").value || "";
    const countPerUnit = Number(document.getElementById("countPerUnit").value) || 1;
    const defaultSuper = document.getElementById("superOrg").value.trim();
    const globalRole = document.getElementById("roleSel").value;

    const unitRawList = document.getElementById("unitList").value.split("\n").map(i => i.trim()).filter(Boolean);
    const phoneList = document.getElementById("phoneList").value.split("\n").map(i => i.trim()).filter(Boolean);
    if (unitRawList.length === 0) return alert("请填写所属机构列表");

    let missingOrgList = [];
    let html = "";
    resultData = [];
    const total = unitRawList.length * countPerUnit;
    const startNo = getStart(total);
    let rowIndex = 1;

    unitRawList.forEach((rawLine, idx) => {
        // 解析单行参数
        const parseRes = parseUnitLine(rawLine);
        const { superOrg: fixSuper, unitName, customRole } = parseRes;
        let superOrg, standardName;
        // 确定该行最终角色
        const lineRole = customRole || globalRole;

        if (fixSuper) {
            superOrg = fixSuper;
            standardName = unitName;
        } else {
            const matchRes = getSuperByBelong(unitName);
            standardName = matchRes.standardName;
            if (matchRes.super) {
                superOrg = matchRes.super;
            } else {
                missingOrgList.push(`输入:${rawLine} 标准全称:${standardName}`);
                superOrg = defaultSuper;
            }
        }
        const phone = phoneList[idx] || "";
        for (let n = 1; n <= countPerUnit; n++) {
            const globalSerial = startNo + idx * countPerUnit + (n - 1);
            const serial5 = String(globalSerial).padStart(5, "0");
            const suffix = suffixTemplate.replace(/N/g, n);
            const account = prefix + typeCode + serial5 + suffix;
            resultData.push({
                index: rowIndex,
                superOrg: superOrg,
                belongOrg: standardName,
                role: lineRole,
                loginAccount: account,
                userName: account,
                phone: phone
            });
            // 自定义角色加紫色标记区分
            const roleHtml = customRole ? `<span class="text-lineRolePurple">${lineRole}</span>` : lineRole;
            html += `<tr class="fluid-table-row">
                <td class="py-3 px-4">${rowIndex}</td>
                <td class="py-3 px-4">${superOrg || "无上级"}</td>
                <td class="py-3 px-4">${standardName}</td>
                <td class="py-3 px-4">${roleHtml}</td>
                <td class="py-3 px-4 font-mono bg-gradient-to-r from-fluidBlue to-fluidOrange bg-clip-text text-transparent">${account}</td>
                <td class="py-3 px-4">${phone}</td>
            </tr>`;
            rowIndex++;
        }
    });

    if (missingOrgList.length > 0) {
        alert(`以下${missingOrgList.length}条单位无法自动匹配到上级机构：\n${missingOrgList.join("\n")}\n处理方案：1.补充org-map.xlsx上下级；2.使用「上级|标准全称」强制指定；3.完善school_list.xlsx单位名称`);
    }
    document.getElementById("tbody").innerHTML = html;
    alert(`✅ 生成完成\n起始流水号：${startNo}\n总条数：${total}\n无法自动匹配上下级单位：${missingOrgList.length}个`);
}

// 导出XLSX
function exportXLSX() {
    if (!resultData.length) return alert("请先生成账号");
    const headers = ["上级机构名称", "所属机构标准全称", "角色", "登陆账号", "用户名称", "手机号"];
    const data = [headers];
    resultData.forEach(item => {
        data.push([
            item.superOrg || "",
            item.belongOrg || "",
            item.role || "",
            item.loginAccount || "",
            item.userName || "",
            item.phone || ""
        ]);
    });
    const ws = XLSX.utils.aoa_to_sheet(data);
    const colWidths = [];
    for (let col = 0; col < headers.length; col++) {
        let maxLen = 0;
        for (let row = 0; row < data.length; row++) {
            const cellVal = String(data[row][col] || "");
            const len = cellVal.split("").reduce((acc, char) => {
                return acc + (char.charCodeAt(0) > 255 ? 2 : 1);
            }, 0);
            if (len > maxLen) maxLen = len;
        }
        colWidths.push({ wch: Math.min(Math.max(maxLen * 1.2, 8), 50) });
    }
    ws['!cols'] = colWidths;
    const rowHeights = [];
    for (let row = 0; row < data.length; row++) {
        rowHeights.push({ hpx: row === 0 ? 24 : 20 });
    }
    ws['!rows'] = rowHeights;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "账号数据");
    XLSX.writeFile(wb, "账号导入模板.xlsx");
}

function clearAll() {
    document.getElementById("unitList").value = "";
    document.getElementById("phoneList").value = "";
    document.getElementById("tbody").innerHTML = "";
    document.getElementById("realTimeMatchBox").innerHTML = "<span class='text-fluidTextMuted'>输入所属机构后实时展示匹配结果，简写自动识别标准全称，支持每行自定义角色</span>";
    resultData = [];
}

    document.getElementById("superOrg").addEventListener("input", realTimeMatchPreview);
};
