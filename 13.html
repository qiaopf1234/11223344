<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博紫蓝 · 重工控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Roboto Mono", monospace;
        }

        :root {
            --bg-main: #1e1f35;
            --bg-panel: #2b2d42;
            --primary: #7b68ee;
            --secondary: #00d4ff;
            --accent: #ff6ec7;
            --text: #e0e0ff;
            --text-light: #a0a0cc;
            --border: rgba(123, 104, 238, 0.3);
            --glow: 0 0 15px rgba(123,104,238,0.25);
            --radius: 6px;
            --transition: all 0.25s ease;
        }

        body {
            background: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* === 🌃 赛博动态背景 === */
        .cyber-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -3;
            background: linear-gradient(135deg, #121428 0%, #1e1f35 50%, #121428 100%);
        }

        .neon-rail {
            position: fixed;
            width: 40%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--secondary), var(--accent), transparent);
            filter: blur(2px);
            opacity: 0.6;
            z-index: -2;
        }
        .rail-left {
            top: 40%;
            left: -30%;
            animation: railMoveLeft 8s linear infinite;
        }
        .rail-right {
            top: 60%;
            right: -30%;
            animation: railMoveRight 10s linear infinite;
        }
        @keyframes railMoveLeft {
            0% { transform: translateX(0) scaleX(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateX(200%) scaleX(2); opacity: 0; }
        }
        @keyframes railMoveRight {
            0% { transform: translateX(0) scaleX(0.5); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateX(-200%) scaleX(2); opacity: 0; }
        }

        .particle-rain {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
        }
        .rain-drop {
            position: absolute;
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, transparent, var(--primary), transparent);
            opacity: 0.4;
            animation: rainFall linear infinite;
        }
        @keyframes rainFall {
            0% { transform: translateY(-100px); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .grid-ground {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 40%;
            background-image: 
                linear-gradient(rgba(123,104,238,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(123,104,238,0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom center;
            opacity: 0.3;
            z-index: -2;
        }

        .scan-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 90%, rgba(0,212,255,0.05) 100%);
            background-size: 100% 8px;
            animation: scan 6s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .mouse-light {
            position: fixed;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(123,104,238,0.08) 0%, transparent 65%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: transform 0.08s ease;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* 标题 */
        .main-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(123,104,238,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 50px;
            position: relative;
        }
        .main-title::after {
            content: '';
            width: 90px; height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            position: absolute;
            bottom: -12px; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(123,104,238,0.3);
        }

        /* 面板 */
        .cyber-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 40px;
            margin-bottom: 30px;
            box-shadow: var(--glow);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        .cyber-panel::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        .cyber-panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 22px rgba(123,104,238,0.25);
            border-color: rgba(123,104,238,0.5);
        }

        /* HUD 标签 */
        .hud-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(123,104,238,0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            margin-right: 8px;
            letter-spacing: 0.5px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
        }
        .panel-header h2 {
            font-size: 20px;
            color: var(--secondary);
            text-shadow: 0 0 8px rgba(0,212,255,0.35);
            letter-spacing: 1px;
        }
        .panel-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(123,104,238,0.4);
        }

        .tip {
            font-size: 14px;
            color: var(--text-light);
            margin: 14px 0;
            line-height: 1.6;
        }

        /* 表单控件 */
        .form-group { margin: 26px 0; }
        .form-label {
            font-size: 14px;
            color: var(--secondary);
            margin-bottom: 10px;
            display: block;
            letter-spacing: 0.5px;
        }

        .cyber-select {
            width: 100%; max-width: 380px;
            padding: 12px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text);
            outline: none;
            font-size: 14px;
            border-radius: var(--radius);
            transition: var(--transition);
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237b68ee' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }
        .cyber-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(123,104,238,0.15);
        }

        .cyber-textarea {
            width: 100%; height: 260px;
            padding: 18px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            border-radius: var(--radius);
            resize: vertical;
            outline: none;
            transition: var(--transition);
        }
        .cyber-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(123,104,238,0.15);
        }
        .cyber-textarea::placeholder { color: rgba(224,224,255,0.3); }

        /* 🔥 霓虹流光按钮 */
        .btn-group {
            display: flex; gap: 18px; flex-wrap: wrap;
            margin-top: 26px;
        }
        .cyber-btn {
            position: relative;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: var(--radius);
            transition: all 0.4s ease;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .cyber-btn::after {
            content: attr(data-text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            background-color: var(--bg-main);
            color: var(--primary);
            border-radius: var(--radius);
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .cyber-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #7b68ee, #00d4ff);
            border-radius: var(--radius);
            z-index: -1;
            filter: blur(0);
            transition: filter 0.4s ease;
        }
        .cyber-btn:hover::before {
            filter: blur(1.2em);
        }
        .cyber-btn:active::before {
            filter: blur(0.2em);
        }
        .cyber-btn:hover::after {
            background-color: transparent;
            color: #fff;
        }
        .cyber-btn.btn-purple::before {
            background: linear-gradient(90deg, #ff6ec7, #7b68ee);
        }
        .cyber-btn.btn-purple::after {
            color: var(--accent);
        }
        .cyber-btn.btn-purple:hover::after {
            color: #fff;
        }
        .cyber-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 结果终端 */
        .sql-console {
            background: var(--bg-main);
            color: var(--secondary);
            padding: 24px;
            border-radius: var(--radius);
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 500px;
            overflow: auto;
            margin-top: 20px;
            line-height: 1.7;
            font-size: 13px;
            border: 1px solid var(--border);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .copy-tip {
            color: var(--secondary);
            font-size: 14px;
            font-weight: 500;
            margin-top: 14px;
            display: none;
            align-items: center;
            gap: 6px;
            text-shadow: 0 0 6px rgba(0,212,255,0.35);
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0px); }
        }

        .particle {
            position: fixed;
            width: 2px; height: 2px;
            background: var(--secondary);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        /* ====================================== */
        /* ✅ 3D 霓虹旋转立方体加载组件（完整样式） */
        /* ====================================== */
        .scene {
            --cube-size: 120px;
            --inner-multiplier: 0.5;
            --color-inner: hsla(170, 100%, 60%, 0.85);
            --color-outer: hsla(260, 70%, 60%, 0.2);
            --blur: 2px;
            --angle: -10deg;
            --duration: 7s;

            position: fixed;
            left: 30px;
            bottom: 30px;
            width: var(--cube-size);
            height: var(--cube-size);
            perspective: 750px;
            z-index: 999;
            transform: scale(0.8);
        }

        .cube-outer,
        .cube-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .cube-inner {
            --inner-scale: clamp(0.1, var(--inner-multiplier), 0.6);
            scale: var(--inner-scale);
            top: calc((1 - var(--inner-scale)) * var(--cube-size) / 2);
        }

        .face {
            user-select: none;
            display: grid;
            place-items: center;
            position: absolute;
            width: var(--cube-size);
            height: var(--cube-size);
            box-shadow:
                inset 0 0 2px 0 #fff5,
                inset 0 0 12px -8px #fff1,
                inset 0 0 32px -10px #fff1,
                inset 0 0 64px -8px #fff1,
                inset 0 0 32px 16px #00000015;
            overflow: clip;
            font:
                500 1em "Inter",
                sans-serif;
            letter-spacing: -0.01em;
            color: #ffffff;
            text-shadow:
                0 3px 4px #0008,
                0 -6px 6px #0005;
            animation: blur var(--duration, 10s) linear infinite reverse;
        }

        .face.face-front {
            transform: rotateY(0deg) translateZ(calc(var(--cube-size) / 2));
            animation-delay: 0s;
        }
        .face.face-right {
            transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2));
            animation-delay: calc(var(--duration, 10s) * -0.75);
        }
        .face.face-back {
            transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2));
            animation-delay: calc(var(--duration, 10s) * -0.5);
        }
        .face.face-left {
            transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2));
            animation-delay: calc(var(--duration, 10s) * -0.25);
        }
        .face.face-top {
            transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2));
            animation: none;
        }
        .face.face-bottom {
            transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2));
            filter: blur(20px);
            animation: none;
        }

        .cube-inner .face {
            animation: none;
            box-shadow:
                inset 0 0 1px 0px #000e,
                inset 0 0 12px -2px #0005,
                inset 0 0 32px 0px #0001,
                inset 0 0 64px 8px #0001;
        }

        @keyframes blur {
            0%,9% { filter: blur(0px); }
            10%,64% { filter: blur(10px); }
            65%,100% { filter: blur(0px); }
        }

        .bg-color-in {
            background: var(--color-inner);
        }

        .bg-color-out {
            background-color: var(--color-outer);
            background: linear-gradient(to bottom, #fff5, #0000),
                radial-gradient(
                    circle at 50% -50%,
                    var(--color-inner) -20%,
                    #fff0 30%,
                    var(--color-outer)
                );
        }

        .cube-outer,.cube-inner {
            transform: rotateX(-20deg) rotateY(45deg);
        }

        .cube-inner {
            position: absolute;
            transform-origin: center;
            scale: clamp(0.1, var(--inner-multiplier), 0.6);
            animation: rotate var(--duration, 10s) linear infinite;
        }

        .cube-outer {
            animation: rotate var(--duration, 10s) linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotateX(clamp(-40deg, var(--angle), 40deg)) rotateY(45deg); }
            to { transform: rotateX(clamp(-40deg, var(--angle), 40deg)) rotateY(405deg); }
        }

        .blur {
            filter: blur(clamp(1px, var(--blur, 7px), 20px));
        }

        .cube-shadow {
            inset: 25%;
            transform-style: preserve-3d;
            position: absolute;
            background-color: #00000015;
            filter: blur(5px);
            animation: rotate-shadow var(--duration, 10s) linear infinite;
            z-index: 1;
            mix-blend-mode: multiply;
        }

        .cube-shadow:nth-child(2) {
            inset: 0%;
            transform-style: preserve-3d;
            position: absolute;
            background-color: #00000015;
            filter: blur(5px);
            animation: rotate-shadow var(--duration, 10s) linear infinite reverse;
            z-index: 0;
        }

        @keyframes rotate-shadow {
            from {
                transform: rotateX(calc(-100deg + clamp(-40deg, var(--angle), 40deg))) rotateZ(45deg) translateZ(calc(var(--cube-size) / 1.5));
            }
            to {
                transform: rotateX(calc(-100deg + clamp(-40deg, var(--angle), 40deg))) rotateZ(405deg) translateZ(calc(var(--cube-size) / 1.5));
            }
        }

        .scene .shadow {
            position: absolute;
            top: 45%;
            left: 35%;
            width: 50%;
            aspect-ratio: 1 / 1.5;
            background-color: #999;
            border-radius: 50%;
            transform: rotate(45deg);
            filter: blur(24px);
            mix-blend-mode: color-burn;
        }

        .scene .light {
            position: absolute;
            background-color: #555b;
            filter: blur(30px);
            mix-blend-mode: color-dodge;
            inset: 22%;
        }

        .scene::before {
            content: "";
            position: absolute;
            inset: -100%;
            top: 50%;
            background-color: #0002;
            filter: blur(70px);
        }
    </style>
</head>
<body>
    <!-- 赛博动态背景 -->
    <div class="cyber-bg"></div>
    <div class="grid-ground"></div>
    <div class="neon-rail rail-left"></div>
    <div class="neon-rail rail-right"></div>
    <div class="particle-rain" id="rainContainer"></div>

    <!-- ✅ 3D 旋转立方体组件（固定左下角） -->
    <div class="scene">
        <div class="cube-shadow">
            <div class="face face-bottom"></div>
        </div>
        <div class="cube-shadow">
            <div class="face face-bottom"></div>
        </div>
        <div class="blur">
            <div class="cube-inner">
                <div class="face face-front bg-color-in"></div>
                <div class="face face-back bg-color-in"></div>
                <div class="face face-right bg-color-in"></div>
                <div class="face face-left bg-color-in"></div>
                <div class="face face-top bg-color-in"></div>
                <div class="face face-bottom bg-color-in"></div>
            </div>
        </div>
        <div class="cube-outer">
            <div class="face face-front bg-color-out">Processing</div>
            <div class="face face-back bg-color-out">Please wait</div>
            <div class="face face-right bg-color-out">...</div>
            <div class="face face-left bg-color-out">...</div>
            <div class="face face-top bg-color-out"></div>
            <div class="face face-bottom bg-color-out"></div>
        </div>
        <div class="light"></div>
        <div class="shadow"></div>
    </div>

    <div class="mouse-light" id="mouseLight"></div>
    <div class="scan-line"></div>

    <div class="container">
        <h1 class="main-title">SQL 重工控制台</h1>

        <div class="cyber-panel">
            <div class="panel-header">
                <div class="panel-icon">📝</div>
                <h2>数据配置与录入</h2>
            </div>

            <p class="tip">
                <span class="hud-badge">EXCEL 快捷粘贴</span>
               自动兼容空格、制表符、逗号分隔格式
            </p>

            <div class="form-group">
                <label class="form-label">选择使用版本</label>
                <select class="cyber-select" id="versionSelect">
                    <option value="A">待分配学生表</option>
                    <option value="B">义务教育和高中表</option>
                    <option value="C">中职表</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">选择需要更新的字段</label>
                <select class="cyber-select" id="fieldSelect">
                    <option value="bj">班级名称</option>
                    <option value="mz">民族</option>
                    <option value="xm">姓名</option>
                    <option value="xxmc">学校名称</option>
                    <option value="csrq">出生日期</option>
                    <option value="rxny">入学年月</option>
                    <option value="byny">毕业年月</option>
                    <option value="sfzjh">修改身份证号</option>
                    <option value="zsxsxxmc">证书上显示的学校名称</option>
                    <option value="byzsh">毕业证书号</option>
                </select>
            </div>

            <p class="tip" id="tipText">格式：身份证 + 内容</p>
            <textarea id="dataInput" class="cyber-textarea" placeholder="粘贴 Excel 两列数据..."></textarea>

            <div class="btn-group">
                <button class="cyber-btn" data-text="🔄 生成 SQL" onclick="generateSql()"></button>
                <button class="cyber-btn btn-purple" data-text="📋 复制结果" onclick="copySql()" id="copyBtn" disabled></button>
            </div>
            <div class="copy-tip" id="copyTip">✅ 复制成功</div>
        </div>

        <div class="cyber-panel">
            <div class="panel-header">
                <div class="panel-icon">📤</div>
                <h2>SQL 生成结果</h2>
            </div>
            <div id="sqlResult" class="sql-console">等待生成数据...</div>
        </div>
    </div>

<script>
// 鼠标光影追随
const light = document.getElementById('mouseLight');
document.addEventListener('mousemove', e => {
    light.style.left = e.clientX + 'px';
    light.style.top = e.clientY + 'px';
});

// 生成粒子雨
function createRainDrops() {
    const container = document.getElementById('rainContainer');
    for (let i = 0; i < 60; i++) {
        const drop = document.createElement('div');
        drop.className = 'rain-drop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDuration = (Math.random() * 3 + 3) + 's';
        drop.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(drop);
    }
}

// 初始化静态粒子
function createParticles() {
    for(let i=0; i<40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.opacity = Math.random() * 0.4 + 0.2;
        document.body.appendChild(p);
    }
}

// 版本切换字段
document.getElementById('versionSelect').addEventListener('change', updateFieldOptions);
document.getElementById('fieldSelect').addEventListener('change', updateTip);

window.onload = function() {
    updateFieldOptions();
    updateTip();
    createParticles();
    createRainDrops();
};

function updateFieldOptions() {
    const v = document.getElementById('versionSelect').value;
    const sel = document.getElementById('fieldSelect');

    document.querySelectorAll('#fieldSelect option.dynamic').forEach(o => o.remove());
    document.querySelectorAll('#fieldSelect option').forEach(opt => {
        if(opt.value === 'zsxsxxmc') opt.style.display = (v === 'C') ? 'none' : 'block';
    });

    if (v === 'B') {
        const o1 = document.createElement('option');
        o1.value = 'xb'; o1.textContent = '性别'; o1.className = 'dynamic';
        sel.appendChild(o1);
        const o2 = document.createElement('option');
        o2.value = 'hkszd'; o2.textContent = '户口所在地'; o1.className = 'dynamic';
        sel.appendChild(o2);
    }

    if (v === 'C') {
        const list = [
            {v:'xb', l:'性别'},
            {v:'zymc', l:'专业名称'},
            {v:'xz', l:'学制'}
        ];
        list.forEach(item => {
            const o = document.createElement('option');
            o.value = item.v; o.textContent = item.l; o.className = 'dynamic';
            sel.appendChild(o);
        });
    }
}

function updateTip() {
    const val = document.getElementById('fieldSelect').value;
    const tip = document.getElementById('tipText');
    if (val === 'sfzjh') tip.innerText = '格式：旧身份证号 + 新身份证号';
    else if (val === 'xxmc') tip.innerText = '格式：旧学校名 | 新学校名';
    else tip.innerText = '格式：身份证 + 内容';
}

function generateSql() {
    const input = document.getElementById('dataInput').value.trim();
    const res = document.getElementById('sqlResult');
    const copyBtn = document.getElementById('copyBtn');
    const v = document.getElementById('versionSelect').value;
    const f = document.getElementById('fieldSelect').value;

    if (!input) { res.innerText = '❌ 请先粘贴数据'; copyBtn.disabled = true; return; }

    let table, idField;
    if (v === 'A') { table = 'certificate_meta_message'; idField = 'sfzh'; }
    else if (v === 'B') { table = 'kdsj_zxxs_by'; idField = 'sfzjh'; }
    else { table = 'kdsj_zzxs_zhizheng'; idField = 'sfzjh'; }

    const lines = input.split('\n').filter(l => l.trim());
    let sql = '';

    lines.forEach(line => {
        const parts = line.trim().split(/[\s,]+/).filter(p => p);
        if (parts.length < 2) return;
        const key = parts[0].replace(/'/g, "''");
        const val = parts.slice(1).join(' ').replace(/'/g, "''");

        let field = f;
        if (v === 'B' && field === 'bj') field = 'bjmc';

        let sqlValue;
        if (field === 'byzsh' && val.toLowerCase() === 'null') {
            sqlValue = 'NULL';
        } else {
            sqlValue = `'${val}'`;
        }

        if (field === 'xxmc') {
            sql += `UPDATE ${table} SET xxmc = '${val}' WHERE xxmc = '${key}';\n`;
        } else if (field === 'sfzjh') {
            sql += `UPDATE ${table} SET ${idField} = '${val}' WHERE ${idField} = '${key}';\n`;
        } else {
            sql += `UPDATE ${table} SET ${field} = ${sqlValue} WHERE ${idField} = '${key}';\n`;
        }
    });

    res.innerText = sql || '⚠️ 未识别到有效数据';
    copyBtn.disabled = !sql;
}

function copySql() {
    const txt = document.getElementById('sqlResult').innerText;
    navigator.clipboard.writeText(txt).then(() => {
        const tip = document.getElementById('copyTip');
        tip.style.display = 'flex';
        setTimeout(() => tip.style.display = 'none', 2500);
    });
}
</script>
