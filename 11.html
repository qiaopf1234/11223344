<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>教育装备 · 学校填报状态查询 | 赛博毛玻璃版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
        }

        body {
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Three.js 粒子画布背景 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #020308);
            pointer-events: none;
        }

        /* 鼠标跟随光晕 */
        .mouse-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        /* 毛玻璃主容器 */
        .glass-container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 900px;
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(139, 92, 246, 0.35);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.1) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 2rem 2rem 2.2rem;
        }
        .glass-container:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.7);
            box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.25) inset;
        }

        /* 标题区域 */
        .title-section {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 1px dashed rgba(139, 92, 246, 0.5);
            display: inline-block;
            padding-bottom: 0.4rem;
        }

        /* 毛玻璃卡片内项 */
        .glass-card-item {
            margin-bottom: 1.5rem;
            background: rgba(20, 30, 50, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            border: 1px solid rgba(139, 92, 246, 0.25);
            padding: 1rem 1.2rem;
            transition: all 0.25s ease;
        }
        .glass-card-item:hover {
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(25, 38, 60, 0.55);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.08);
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #a78bfa;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* 表单控件 */
        .glass-input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(10, 18, 30, 0.7);
            border: 1.5px solid rgba(139, 92, 246, 0.35);
            border-radius: 1rem;
            font-size: 0.9rem;
            color: #e2e8f0;
            transition: all 0.25s ease;
            outline: none;
        }
        .glass-input:focus, textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
            background: rgba(20, 32, 50, 0.8);
        }
        textarea {
            font-family: 'Fira Code', monospace;
            resize: vertical;
            line-height: 1.5;
        }
        ::placeholder {
            color: #5c6f87;
        }

        /* 霓虹流光按钮组 */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .neon-btn {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #e0e7ff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }
        .neon-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
            transition: left 0.5s ease;
        }
        .neon-btn:hover::before {
            left: 100%;
        }
        .neon-btn:hover {
            transform: translateY(-2px);
            border-color: #a78bfa;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
            color: white;
        }
        .btn-primary {
            background: linear-gradient(95deg, rgba(139, 92, 246, 0.3), rgba(6, 182, 212, 0.2));
            border-color: #a78bfa;
        }
        .btn-success {
            background: linear-gradient(95deg, rgba(34, 197, 94, 0.3), rgba(16, 185, 129, 0.2));
            border-color: #10b981;
        }
        .btn-copy {
            background: linear-gradient(95deg, rgba(6, 182, 212, 0.3), rgba(139, 92, 246, 0.2));
            border-color: #06b6d4;
        }

        /* SQL 结果区域 */
        .result-area {
            margin-top: 0.5rem;
        }
        .tip {
            font-size: 0.7rem;
            color: #7e8ba0;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tip span {
            background: rgba(139, 92, 246, 0.2);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 6px;
        }

        /* 响应式 */
        @media (max-width: 650px) {
            body {
                padding: 1rem;
            }
            .glass-container {
                padding: 1.2rem;
            }
            .btn-group {
                flex-direction: column;
            }
            .neon-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Three.js 粒子画布背景 -->
    <canvas id="bg-canvas"></canvas>
    <!-- 鼠标光晕层 -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="glass-container">
        <div class="title-section">
            <h1>🏫 教育装备 · 学校填报状态查询</h1>
            <div class="sub">毛玻璃 · 星云粒子 · 纯查询不修改数据</div>
        </div>

        <!-- 年度版本 -->
        <div class="glass-card-item">
            <label>📅 年度版本（可修改）</label>
            <input type="text" id="year" class="glass-input" value="2026" placeholder="请输入年份">
        </div>

        <!-- 单学校 -->
        <div class="glass-card-item">
            <label>🏫 单学校名称</label>
            <input type="text" id="singleSchool" class="glass-input" placeholder="">
            <div class="tip"><span>💡 提示</span> 生成单学校查询SQL</div>
        </div>

        <!-- 多学校 -->
        <div class="glass-card-item">
            <label>🏫🏫 多学校名称（一行一个）</label>
            <textarea id="multiSchool" rows="4" class="glass-input" placeholder=""></textarea>
            <div class="tip"><span>📌 提示</span> 生成多学校查询SQL（IN 条件）</div>
        </div>

        <!-- 按钮组 -->
        <div class="btn-group">
            <button class="neon-btn btn-primary" onclick="genSingleQuery()">🏫 生成【单学校查询】</button>
            <button class="neon-btn btn-success" onclick="genMultiQuery()">🏫🏫 生成【多学校查询】</button>
            <button class="neon-btn btn-copy" onclick="copyResult()">📋 一键复制</button>
        </div>

        <!-- SQL 结果 -->
        <div class="glass-card-item result-area">
            <label>📄 查询SQL结果（只读，安全）</label>
            <textarea id="result" rows="12" class="glass-input" readonly placeholder="生成的SQL语句将显示在这里..."></textarea>
        </div>
    </div>

    <!-- Three.js 粒子背景脚本 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);

        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);

        // 主粒子群 (紫罗兰)
        const particleCount = 2100;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 38;
            positions[i*3+1] = (Math.random() - 0.5) * 24;
            positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);

        // 第二层粒子 (青色)
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1400 * 3);
        for (let i = 0; i < 1400; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 44;
            pos2[i*3+1] = (Math.random() - 0.5) * 28;
            pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);

        // 第三层粒子 (粉晶)
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(900 * 3);
        for (let i = 0; i < 900; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 30;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);

        // 装饰环
        const ringCount = 380;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 5.2;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
            ringPositions[i*3+2] = -1.8;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);

        scene.fog = new THREE.FogExp2(0x03050b, 0.008);

        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            let mx = (e.clientX / window.innerWidth) * 2 - 1;
            let my = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mx * 0.9;
            targetCamY = my * 0.6;
        });

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            particleSys.rotation.y = time * 0.06;
            particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSys2.rotation.y = time * 0.04;
            particleSys3.rotation.x = time * 0.03;
            ringPoints.rotation.z = time * 0.12;
            camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onResize);
        animate();
    </script>

    <!-- 鼠标光晕跟随 + 核心业务逻辑（完全保留原功能） -->
    <script>
        // 鼠标光晕
        const glow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // ========== 原有业务逻辑（保留所有表定义和生成逻辑） ==========
        const tables = [
            "tbl_equ_two_ptjslbsb",
            "tbl_equ_two_ptjsjrcs",
            "tbl_equ_two_jsjjssb",
            "tbl_equ_two_ptjssszd",
            "tbl_equ_two_library_staff",
            "tbl_equ_two_electrifyed_status",
            "tbl_equ_two_library_build",
            "tbl_equ_two_laboratory_staff",
            "tbl_equ_two_laboratory_activity"
        ];

        function getYear() {
            return document.getElementById('year').value.trim() || '2026';
        }

        // 单学校查询
        function genSingleQuery() {
            const school = document.getElementById('singleSchool').value.trim();
            if (!school) {
                alert('请输入学校名称！');
                return;
            }
            const year = getYear();
            const escSchool = school.replace(/'/g, "''");
            let sql = '';
            tables.forEach((t, i) => {
                sql += `-- 表${i+1} 查询 ${school} 填报状态\n`;
                sql += `SELECT e.state, d.name AS 学校名称\n`;
                sql += `FROM ${t} e\n`;
                sql += `JOIN sys_user u ON u.id = e.create_by\n`;
                sql += `JOIN sys_dept d ON u.dept_id = d.id\n`;
                sql += `WHERE d.name = '${escSchool}' AND e.version = '${year}';\n\n`;
            });
            document.getElementById('result').value = sql.trim();
        }

        // 多学校查询
        function genMultiQuery() {
            const text = document.getElementById('multiSchool').value.trim();
            if (!text) {
                alert('请输入学校名称！');
                return;
            }
            const schools = text.split('\n').map(s => s.trim()).filter(s => s);
            const year = getYear();
            const inStr = schools.map(s => `'${s.replace(/'/g, "''")}'`).join(',');
            let sql = '';
            tables.forEach((t, i) => {
                sql += `-- 表${i+1} 批量查询学校状态\n`;
                sql += `SELECT e.state, d.name AS 学校名称\n`;
                sql += `FROM ${t} e\n`;
                sql += `JOIN sys_user u ON u.id = e.create_by\n`;
                sql += `JOIN sys_dept d ON u.dept_id = d.id\n`;
                sql += `WHERE d.name IN (${inStr}) AND e.version = '${year}';\n\n`;
            });
            document.getElementById('result').value = sql.trim();
        }

        // 一键复制
        function copyResult() {
            const resultArea = document.getElementById('result');
            if (!resultArea.value.trim()) {
                alert('无内容可复制');
                return;
            }
            resultArea.select();
            navigator.clipboard.writeText(resultArea.value).then(() => {
                alert('✅ 复制成功');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        // 挂载全局函数
        window.genSingleQuery = genSingleQuery;
        window.genMultiQuery = genMultiQuery;
        window.copyResult = copyResult;

        // 可选：页面加载时置空结果
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('result').value = '';
        });
    </script>
</body>
</html>
