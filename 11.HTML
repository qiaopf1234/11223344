<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育装备 - 学校填报状态查询工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#39FF14',
                        dark: '#121212',
                        'dark-card': '#1E1E1E',
                        'dark-input': '#2A2A2A',
                        'text-primary': '#FFFFFF',
                        'text-secondary': '#B0B0B0',
                    },
                    boxShadow: {
                        'neon': '0 0 10px rgba(57, 255, 20, 0.3)',
                        'neon-hover': '0 0 20px rgba(57, 255, 20, 0.5)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-2px);
                box-shadow: var(--tw-shadow-neon-hover);
            }
            .input-focus {
                transition: all 0.3s ease;
            }
            .input-focus:focus {
                border-color: #39FF14;
                box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.2);
            }
            .btn-hover {
                transition: all 0.3s ease;
            }
            .btn-hover:hover {
                transform: translateY(-2px);
                box-shadow: var(--tw-shadow-neon);
            }
        }
    </style>
    <style>
        /* 文本域渲染优化 */
        #result, #multiSchool {
            resize: none !important;
            will-change: auto;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
            font-variant-ligatures: none;
            transform: translateZ(0);
        }
    </style>
</head>
<body class="bg-dark min-h-screen font-sans text-text-primary flex justify-center items-center p-4">
    <div class="w-full max-w-3xl bg-dark-card rounded-2xl shadow-card p-8 card-hover border border-dark-input">
        <!-- 标题区域 -->
        <header class="mb-8 text-center">
            <h1 class="text-2xl md:text-3xl font-bold mb-2 text-text-primary">
                <i class="fa fa-building text-neon mr-2"></i>教育装备 - 学校填报状态查询工具
            </h1>
            <p class="text-text-secondary text-sm">功能：查询学校各表填报状态（纯查询，不修改任何数据）</p>
        </header>

        <!-- 表单区域 -->
        <div class="space-y-6 mb-8">
            <div>
                <label class="block mb-2 text-text-secondary text-sm font-medium">📅 年度版本（可直接修改）</label>
                <input type="text" id="year" value="2026" placeholder="请输入年份" class="w-full bg-dark-input border border-dark-input rounded-lg p-3 text-text-primary input-focus">
            </div>

            <div>
                <label class="block mb-2 text-text-secondary text-sm font-medium">🏫 单学校名称</label>
                <input type="text" id="singleSchool" placeholder="请输入学校全称，例如：准格尔旗大路第一小学" class="w-full bg-dark-input border border-dark-input rounded-lg p-3 text-text-primary input-focus">
                <p class="text-text-secondary text-xs mt-1">生成单学校查询SQL</p>
            </div>

            <div>
                <label class="block mb-2 text-text-secondary text-sm font-medium">🏫🏫 多学校名称（一行一个）</label>
                <textarea id="multiSchool" placeholder="请输入多个学校名称，一行一个" class="w-full h-32 bg-dark-input border border-dark-input rounded-lg p-3 text-text-primary input-focus"></textarea>
                <p class="text-text-secondary text-xs mt-1">生成多学校查询SQL</p>
            </div>
        </div>

        <!-- 按钮组 -->
        <div class="flex gap-4 mb-8">
            <button onclick="genSingleQuery()" class="flex-1 bg-yellow-500 text-black font-bold py-3 rounded-lg btn-hover flex items-center justify-center">
                <i class="fa fa-building mr-2"></i>生成【单学校查询】
            </button>
            <button onclick="genMultiQuery()" class="flex-1 bg-primary text-white font-bold py-3 rounded-lg btn-hover flex items-center justify-center">
                <i class="fa fa-building-o mr-2"></i>生成【多学校查询】
            </button>
            <button onclick="copyResult()" class="flex-1 bg-neon text-dark font-bold py-3 rounded-lg btn-hover flex items-center justify-center">
                <i class="fa fa-copy mr-2"></i>一键复制
            </button>
        </div>

        <!-- 结果区域 -->
        <div>
            <label class="block mb-2 text-text-secondary text-sm font-medium">📄 查询SQL结果（只读，安全）</label>
            <textarea id="result" class="w-full h-80 bg-dark-input border border-dark-input rounded-lg p-4 text-text-primary font-mono text-sm input-focus" placeholder="生成的SQL语句将显示在这里..."></textarea>
        </div>
    </div>

<script>
// 9张表名（你提供的正确顺序）
const tables = [
    "tbl_equ_two_ptjslbsb",
    "tbl_equ_two_ptjsjrcs",
    "tbl_equ_two_jsjjssb",
    "tbl_equ_two_ptjssszd",
    "tbl_equ_two_library_staff",
    "tbl_equ_two_electrifyed_status",
    "tbl_equ_two_library_build",
    "tbl_equ_two_laboratory_staff",
    "tbl_equ_two_laboratory_activity"
];

function getYear() {
    return document.getElementById('year').value || '2026';
}

// 单学校查询 SQL
function genSingleQuery() {
    const school = document.getElementById('singleSchool').value.trim();
    if (!school) { alert('请输入学校名称！'); return; }
    const year = getYear();
    const escSchool = school.replace(/'/g, "''");
    let sql = '';

    tables.forEach((t, i) => {
        sql += `-- 表${i+1} 查询 ${school} 填报状态
SELECT e.state, d.name AS 学校名称
FROM ${t} e
JOIN sys_user u ON u.id = e.create_by
JOIN sys_dept d ON u.dept_id = d.id
WHERE d.name = '${escSchool}' AND e.version = '${year}';

`;
    });

    document.getElementById('result').value = sql.trim();
}

// 多学校查询 SQL
function genMultiQuery() {
    const text = document.getElementById('multiSchool').value.trim();
    if (!text) { alert('请输入学校名称！'); return; }
    const schools = text.split('\n').map(s=>s.trim()).filter(s=>s);
    const year = getYear();
    const inStr = schools.map(s => `'${s.replace(/'/g, "''")}'`).join(',');
    let sql = '';

    tables.forEach((t, i) => {
        sql += `-- 表${i+1} 批量查询学校状态
SELECT e.state, d.name AS 学校名称
FROM ${t} e
JOIN sys_user u ON u.id = e.create_by
JOIN sys_dept d ON u.dept_id = d.id
WHERE d.name IN (${inStr}) AND e.version = '${year}';

`;
    });

    document.getElementById('result').value = sql.trim();
}

// 复制
function copyResult() {
    const res = document.getElementById('result');
    if (!res.value) { alert('无内容'); return; }
    res.select();
    document.execCommand('copy');
    alert('复制成功！');
}
</script>
</body>
</html>
