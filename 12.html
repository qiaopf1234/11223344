<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>教育装备 SQL 生成工具 · 赛博毛玻璃版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Inter", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        }

        /* 基础布局 */
        body {
            background-color: #0a0c12;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Canvas 3D 背景层 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* 鼠标跟随光晕 */
        .mouse-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, rgba(6, 182, 212, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 999;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        /* 主容器 - 毛玻璃悬浮效果 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 40px auto;
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.2);
            padding: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s;
            border: 1px solid rgba(139, 92, 246, 0.35);
        }

        .container:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.7);
            box-shadow: 0 28px 44px -12px rgba(139, 92, 246, 0.25), 0 0 0 1px rgba(139, 92, 246, 0.25) inset;
        }

        /* 标题渐变 */
        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0f3ff, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        /* 状态行 (年度+原状态+目标状态) */
        .inline-row {
            display: flex;
            gap: 20px;
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 1.5rem;
            margin-bottom: 24px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            backdrop-filter: blur(4px);
        }

        .form-item {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e6;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(10, 18, 30, 0.8);
            border: 1.5px solid rgba(139, 92, 246, 0.4);
            border-radius: 1rem;
            color: #e2e8f0;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
            background: rgba(20, 32, 50, 0.9);
        }

        textarea {
            font-family: 'Fira Code', 'Courier New', monospace;
            line-height: 1.5;
            resize: vertical;
        }

        /* 霓虹流光按钮组 */
        .btn {
            position: relative;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 10px 24px;
            border-radius: 40px;
            color: #e0e7ff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            margin-right: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: #a78bfa;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(95deg, rgba(245, 158, 11, 0.25), rgba(217, 119, 6, 0.2));
            border-color: #f59e0b;
        }

        .btn-warning:hover {
            border-color: #fbbf24;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3);
        }

        /* Tab 切换样式 */
        .tab-group {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(15, 23, 42, 0.5);
            padding: 6px;
            border-radius: 60px;
            width: fit-content;
            backdrop-filter: blur(4px);
        }

        .tab {
            padding: 10px 28px;
            border-radius: 40px;
            background: transparent;
            border: none;
            color: #cbd5e1;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            background: linear-gradient(95deg, #8b5cf6, #06b6d4);
            color: white;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .tip {
            color: #94a3b8;
            font-size: 13px;
            margin: 12px 0 16px 0;
            padding-left: 8px;
            border-left: 2px solid #a78bfa;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 6px;
        }

        /* 响应式适配 */
        @media (max-width: 780px) {
            .container {
                margin: 20px;
                padding: 20px;
            }
            .inline-row {
                flex-direction: column;
                gap: 12px;
            }
            .btn {
                padding: 8px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- 3D Canvas 背景层 -->
    <canvas id="bg-canvas"></canvas>
    <!-- 鼠标光晕层 -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <div class="container">
        <h1 class="title">✨ 教育装备 SQL 生成工具 · 赛博粒子版</h1>

        <!-- 配置行 -->
        <div class="inline-row">
            <div class="form-item">
                <label>📅 业务年度</label>
                <input type="text" id="yearVal" value="2026">
            </div>
            <div class="form-item">
                <label>🔽 原状态</label>
                <select id="oldState">
                    <option value="0">0 - 待编辑</option>
                    <option value="1">1 - 旗县待审核</option>
                    <option value="2">2 - 盟市待审核</option>
                    <option value="3" selected>3 - 盟市已审核</option>
                </select>
            </div>
            <div class="form-item">
                <label>🔼 目标状态</label>
                <select id="newState">
                    <option value="0" selected>0 - 待编辑</option>
                    <option value="1">1 - 旗县待审核</option>
                    <option value="2">2 - 盟市待审核</option>
                    <option value="3">3 - 盟市已审核</option>
                </select>
            </div>
        </div>

        <!-- Tab 切换 -->
        <div class="tab-group">
            <button class="tab active" data-tab="single">🏫 单学校 SQL</button>
            <button class="tab" data-tab="multi">🏢 多学校 SQL</button>
        </div>

        <!-- 单学校模块 -->
        <div id="single" class="tab-content active">
            <div class="form-group" style="margin-bottom: 20px;">
                <label>学校名称</label>
                <input type="text" id="singleSchool" placeholder="">
            </div>
            <div>
                <button class="btn btn-warning" onclick="generateSingleSql()">⚡ 生成 SQL</button>
                <button class="btn" onclick="copySingleSql()">📋 复制 SQL</button>
                <button class="btn" onclick="clearSingleSql()">🗑️ 清空</button>
            </div>
            <div style="margin-top: 20px;">
                <label>📄 SQL 结果</label>
                <textarea id="singleResult" rows="12" placeholder="生成的SQL语句将显示在这里..."></textarea>
            </div>
        </div>

        <!-- 多学校模块 -->
        <div id="multi" class="tab-content">
            <div class="form-group" style="margin-bottom: 20px;">
                <label>学校列表 (一行一个)</label>
                <textarea id="multiSchool" rows="6" placeholder=""></textarea>
            </div>
            <div>
                <button class="btn btn-warning" onclick="generateMultiSql()">⚡ 生成 SQL</button>
                <button class="btn" onclick="copyMultiSql()">📋 复制 SQL</button>
                <button class="btn" onclick="clearMultiSql()">🗑️ 清空</button>
            </div>
            <div style="margin-top: 20px;">
                <label>📄 SQL 结果</label>
                <textarea id="multiResult" rows="12" placeholder="生成的SQL语句将显示在这里..."></textarea>
            </div>
        </div>
        <div class="tip">
            💡 提示：业务表共 9 张（tbl_equ_two_*），自动批量生成 UPDATE 语句，支持年度/原状态/新状态灵活切换。
        </div>
    </div>

    <!-- Three.js 增强粒子背景（双层星云 + 动态环） -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);
        
        // ---- 主粒子群 (紫罗兰) 2100颗 ----
        const particleCount = 2100;
        const geom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 38;
            positions[i*3+1] = (Math.random() - 0.5) * 24;
            positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
        }
        geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const particleSys = new THREE.Points(geom, particleMat);
        scene.add(particleSys);
        
        // ---- 第二层粒子 (青色) 1400颗 ----
        const geom2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(1400 * 3);
        for (let i = 0; i < 1400; i++) {
            pos2[i*3] = (Math.random() - 0.5) * 44;
            pos2[i*3+1] = (Math.random() - 0.5) * 28;
            pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
        }
        geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
        const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
        const particleSys2 = new THREE.Points(geom2, mat2);
        scene.add(particleSys2);
        
        // ---- 第三层粒子 (粉晶) 900颗 ----
        const geom3 = new THREE.BufferGeometry();
        const pos3 = new Float32Array(900 * 3);
        for (let i = 0; i < 900; i++) {
            pos3[i*3] = (Math.random() - 0.5) * 48;
            pos3[i*3+1] = (Math.random() - 0.5) * 30;
            pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
        }
        geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
        const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const particleSys3 = new THREE.Points(geom3, mat3);
        scene.add(particleSys3);
        
        // ---- 动态环装饰 ----
        const ringCount = 380;
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringCount * 3);
        for (let i = 0; i < ringCount; i++) {
            const angle = (i / ringCount) * Math.PI * 2;
            const r = 5.2;
            ringPositions[i*3] = Math.cos(angle) * r;
            ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
            ringPositions[i*3+2] = -1.8;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
        scene.add(ringPoints);
        
        scene.fog = new THREE.FogExp2(0x03050b, 0.008);
        
        // ---- 鼠标视差 (相机轻微跟随) ----
        let targetCamX = 0, targetCamY = 0;
        window.addEventListener('mousemove', (e) => {
            let mx = (e.clientX / window.innerWidth) * 2 - 1;
            let my = (e.clientY / window.innerHeight) * 2 - 1;
            targetCamX = mx * 0.9;
            targetCamY = my * 0.6;
        });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            
            particleSys.rotation.y = time * 0.06;
            particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
            particleSys2.rotation.y = time * 0.04;
            particleSys3.rotation.x = time * 0.03;
            ringPoints.rotation.z = time * 0.12;
            
            camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
            camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        window.addEventListener('resize', onResize);
        animate();
    </script>

    <!-- 鼠标光晕跟随 & 核心业务逻辑（完整保留） -->
    <script>
        // 鼠标光晕
        const glow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // ========== 原有业务逻辑（完全保留）==========
        const TABLES = [
            "tbl_equ_two_ptjslbsb",
            "tbl_equ_two_ptjsjrcs",
            "tbl_equ_two_jsjjssb",
            "tbl_equ_two_ptjssszd",
            "tbl_equ_two_library_staff",
            "tbl_equ_two_electrifyed_status",
            "tbl_equ_two_library_build",
            "tbl_equ_two_laboratory_staff",
            "tbl_equ_two_laboratory_activity"
        ];

        // 标签页切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        function getBaseParam() {
            let year = document.getElementById('yearVal').value.trim();
            let oldS = document.getElementById('oldState').value;
            let newS = document.getElementById('newState').value;
            if (!year) { alert("请填写业务年度"); return null; }
            return { year, oldS, newS };
        }

        window.generateSingleSql = function() {
            let p = getBaseParam();
            if (!p) return;
            let school = document.getElementById('singleSchool').value.trim();
            if (!school) { alert("请输入学校名称"); return; }
            school = school.replace(/'/g, "''");
            let sql = "";
            TABLES.forEach((table, idx) => {
                sql += `-- 表${idx+1}\n`;
                sql += `UPDATE ${table} e\n`;
                sql += `JOIN sys_user u ON u.id = e.create_by\n`;
                sql += `JOIN sys_dept d ON u.dept_id = d.id\n`;
                sql += `SET e.state = ${p.newS}\n`;
                sql += `WHERE d.name = '${school}' AND e.state = ${p.oldS} AND e.version = '${p.year}';\n\n`;
            });
            document.getElementById('singleResult').value = sql;
        };

        window.generateMultiSql = function() {
            let p = getBaseParam();
            if (!p) return;
            let content = document.getElementById('multiSchool').value.trim();
            if (!content) { alert("请输入学校名称列表"); return; }
            let schools = content.split(/\n/).map(s => s.trim()).filter(s => s);
            let schoolStr = schools.map(s => `'${s.replace(/'/g, "''")}'`).join(", ");
            let sql = "";
            TABLES.forEach((table, idx) => {
                sql += `-- 表${idx+1}\n`;
                sql += `UPDATE ${table} e\n`;
                sql += `JOIN sys_user u ON u.id = e.create_by\n`;
                sql += `JOIN sys_dept d ON u.dept_id = d.id\n`;
                sql += `SET e.state = ${p.newS}\n`;
                sql += `WHERE d.name IN (${schoolStr}) AND e.state = ${p.oldS} AND e.version = '${p.year}';\n\n`;
            });
            document.getElementById('multiResult').value = sql;
        };

        window.copySingleSql = () => {
            let area = document.getElementById('singleResult');
            area.select();
            navigator.clipboard.writeText(area.value).then(() => alert("✅ 已复制到剪贴板")).catch(() => alert("复制失败"));
        };
        window.copyMultiSql = () => {
            let area = document.getElementById('multiResult');
            area.select();
            navigator.clipboard.writeText(area.value).then(() => alert("✅ 已复制到剪贴板")).catch(() => alert("复制失败"));
        };
        window.clearSingleSql = () => {
            document.getElementById('singleSchool').value = "";
            document.getElementById('singleResult').value = "";
        };
        window.clearMultiSql = () => {
            document.getElementById('multiSchool').value = "";
            document.getElementById('multiResult').value = "";
        };
        
        // 可选：页面加载时不自动生成SQL，保留空白提示
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('singleResult').value = "";
            document.getElementById('multiResult').value = "";
        });
    </script>
</body>
</html>
