<style>
/* ========== 全局重置与基础 ========== */
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
}
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;

  overflow-x: hidden;

<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: false });
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03050b);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.5, 14);
camera.lookAt(0, 0, 0);

// 主粒子群 (紫罗兰)
const particleCount = 2100;
const geom = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 38;
  positions[i*3+1] = (Math.random() - 0.5) * 24;
  positions[i*3+2] = (Math.random() - 0.5) * 30 - 8;
}
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x8b5cf6, size: 0.09, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
const particleSys = new THREE.Points(geom, particleMat);
scene.add(particleSys);

// 第二层粒子 (青色)
const geom2 = new THREE.BufferGeometry();
const pos2 = new Float32Array(1400 * 3);
for (let i = 0; i < 1400; i++) {
  pos2[i*3] = (Math.random() - 0.5) * 44;
  pos2[i*3+1] = (Math.random() - 0.5) * 28;
  pos2[i*3+2] = (Math.random() - 0.5) * 34 - 10;
}
geom2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
const mat2 = new THREE.PointsMaterial({ color: 0x06b6d4, size: 0.08, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending });
const particleSys2 = new THREE.Points(geom2, mat2);
scene.add(particleSys2);

// 第三层粒子 (粉晶)
const geom3 = new THREE.BufferGeometry();
const pos3 = new Float32Array(900 * 3);
for (let i = 0; i < 900; i++) {
  pos3[i*3] = (Math.random() - 0.5) * 48;
  pos3[i*3+1] = (Math.random() - 0.5) * 30;
  pos3[i*3+2] = (Math.random() - 0.5) * 38 - 12;
}
geom3.setAttribute('position', new THREE.BufferAttribute(pos3, 3));
const mat3 = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
const particleSys3 = new THREE.Points(geom3, mat3);
scene.add(particleSys3);

// 装饰环
const ringCount = 380;
const ringGeo = new THREE.BufferGeometry();
const ringPositions = new Float32Array(ringCount * 3);
for (let i = 0; i < ringCount; i++) {
  const angle = (i / ringCount) * Math.PI * 2;
  const r = 5.2;
  ringPositions[i*3] = Math.cos(angle) * r;
  ringPositions[i*3+1] = Math.sin(angle) * r * 0.4;
  ringPositions[i*3+2] = -1.8;
}
ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
const ringPoints = new THREE.Points(ringGeo, new THREE.PointsMaterial({ color: 0xa78bfa, size: 0.09, blending: THREE.AdditiveBlending }));
scene.add(ringPoints);

scene.fog = new THREE.FogExp2(0x03050b, 0.008);

let targetCamX = 0, targetCamY = 0;
window.addEventListener('mousemove', (e) => {
  let mx = (e.clientX / window.innerWidth) * 2 - 1;
  let my = (e.clientY / window.innerHeight) * 2 - 1;
  targetCamX = mx * 0.9;
  targetCamY = my * 0.6;
});

let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.007;
  particleSys.rotation.y = time * 0.06;
  particleSys.rotation.x = Math.sin(time * 0.18) * 0.08;
  particleSys2.rotation.y = time * 0.04;
  particleSys3.rotation.x = time * 0.03;
  ringPoints.rotation.z = time * 0.12;
  camera.position.x += (targetCamX * 0.5 - camera.position.x) * 0.04;
  camera.position.y += (targetCamY * 0.4 - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
window.addEventListener('resize', onResize);
animate();
</script>

<!-- ========== 以下为原始业务逻辑（一字未改） ========== -->
<script>
// --- 原2D粒子物理效果（保留但画布已隐藏）---
const canvasOrig = document.getElementById('particles-canvas');
const ctxOrig = canvasOrig.getContext('2d');
let width, height;
let particles = [];

function resizeCanvasOrig() {
  width = canvasOrig.width = window.innerWidth;
  height = canvasOrig.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvasOrig);
resizeCanvasOrig();

class ParticleOrig {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.size = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
  }
  draw() {
    ctxOrig.fillStyle = `rgba(138, 138, 255, ${this.opacity})`;
    ctxOrig.beginPath();
    ctxOrig.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctxOrig.fill();
  }
}
for (let i = 0; i < 80; i++) particles.push(new ParticleOrig());

function connectParticles() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      const dx = particles[a].x - particles[b].x;
      const dy = particles[a].y - particles[b].y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < 120) {
        ctxOrig.strokeStyle = `rgba(138, 138, 255, ${0.15 * (1 - distance / 120)})`;
        ctxOrig.lineWidth = 0.5;
        ctxOrig.beginPath();
        ctxOrig.moveTo(particles[a].x, particles[a].y);
        ctxOrig.lineTo(particles[b].x, particles[b].y);
        ctxOrig.stroke();
      }
    }
  }
}

function animateOrig() {
  ctxOrig.clearRect(0, 0, width, height);
  particles.forEach(p => { p.update(); p.draw(); });
  connectParticles();
  requestAnimationFrame(animateOrig);
}
animateOrig();

// --- 日期输入框点击唤起选择器（保留原有功能）---
document.querySelectorAll('.date-input input[type="date"]').forEach(input => {
  input.addEventListener('click', function() {
    this.showPicker();
  });
});
// 点击图标也触发
document.querySelectorAll('.date-input').forEach(item => {
  item.addEventListener('click', function(e) {
    if (e.target.closest('.date-icon')) {
      this.querySelector('input[type="date"]').showPicker();
    }
  });
});

// --- 以下为原有功能代码（完全保留，未作修改）---
const titleSel = document.getElementById('titleSel');
const titleInputBox = document.getElementById('titleInputBox');
const eventLabel = document.getElementById('eventLabel');

function updateLabel() {
  let val = titleSel.value;
  titleInputBox.style.display = val === '自定义' ? 'block' : 'none';
  if (val === '自定义' || val.indexOf('、') > -1) {
    eventLabel.innerText = '服务事项明细（粘贴字段：系统名称、事件内容、具体问题、完成状态、服务对象、需求提出、处理日期、处理人）';
  } else {
    eventLabel.innerText = '服务事项明细（粘贴字段：事件内容、具体问题、完成状态、服务对象、需求提出、处理日期、处理人）';
  }
}
titleSel.addEventListener('change', updateLabel);
updateLabel();

function fmt(dateStr){
  if(!dateStr) return '';
  let d = new Date(dateStr);
  let y = d.getFullYear();
  let m = String(d.getMonth() + 1).padStart(2, '0');
  let day = String(d.getDate()).padStart(2, '0');
  return `${y}年${m}月${day}日`;
}

function getMonthList(startDateStr, endDateStr) {
  let start = new Date(startDateStr);
  let end = new Date(endDateStr);
  let list = [];
  let current = new Date(start);
  while(current <= end){
    let y = current.getFullYear();
    let m = current.getMonth() + 1;
    list.push(`${y}年${m}月`);
    current.setMonth(current.getMonth() + 1);
  }
  return list;
}

function splitLine(str){
  return str.trim().split(/\t/);
}

function copyEvent(){let t=document.getElementById('eventList');t.select();document.execCommand('copy');alert('复制成功');}

function getStageHolidays(startDateStr, endDateStr) {
  let start = new Date(startDateStr);
  let end = new Date(endDateStr);
  let holidays = [
    { name: '元旦', time: '1月1日', desc: '元旦（%Y年1月）' },
    { name: '春节', time: '1月28日-2月4日', desc: '春节（%Y年1月28日-2月4日）' },
    { name: '清明', time: '4月4日-4月6日', desc: '清明（%Y年4月4日-4月6日）' },
    { name: '劳动', time: '5月1日-5月5日', desc: '劳动（%Y年5月1日-5月5日）' }
  ];
  let res = [];
  holidays.forEach(h => {
    let hYear = start.getFullYear();
    let checkDate = new Date(`${hYear}-${h.time.split('-')[0]}`);
    if(checkDate >= start && checkDate <= end){
      res.push({
        name: h.name,
        time: h.desc.replace(/%Y/g, hYear),
        tableTime: h.time
      });
    }
  });
  return res;
}

/**
 * 新增：解析竖版故障键值文本
 * @param {string} text 输入框原始文本
 * @param {string} sysName 当前选择的平台名称
 * @returns {Array<Array<string>>} 二维数组，每条[处理时间,系统,故障内容,处理方式,处理结果,处理人]
 */
function parseFaultVerticalText(text, sysName) {
  const blocks = text.split(/\n\s*\n/).filter(b => b.trim());
  const result = [];
  for (const block of blocks) {
    const lines = block.split('\n').map(l => l.trim()).filter(l => l);
    const map = {};
    for (const line of lines) {
      const arr = line.split('\t');
      if (arr.length >= 2) {
        const key = arr[0].trim();
        const val = arr.slice(1).join('\t').trim();
        map[key] = val;
      }
    }
    // 字段映射
    const row = [
      map['故障发生时间'] || '',
      sysName,
      map['故障现象描述'] || '',
      map['处置过程'] || '',
      map['处置结果'] || '',
      map['处理人'] || ''
    ];
    result.push(row);
  }
  return result;
}
