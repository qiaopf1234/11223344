<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育装备 - 学校填报状态查询工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #3a1c71, #d76d77, #ffaf7b, #2c3e99);
            background-size: 400% 400%;
            animation: bgAnim 15s ease infinite;
            display: flex;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        @keyframes bgAnim {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        /*粒子画布铺满全屏*/
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top:0;left:0;
            z-index:1;
            pointer-events:none;
        }
        /*全局玻璃容器*/
        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 26px;
            box-shadow: 0 8px 32px rgba(31,38,135,0.2);
            padding: 42px;
            z-index:2;
            position:relative;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity:0; transform: translateY(25px); }
            to { opacity:1; transform: translateY(0); }
        }
        h1 {
            text-align: center;
            color:#ffffff;
            margin-bottom:8px;
            font-size:25px;
        }
        .desc {
            text-align:center;
            color:rgba(255,255,255,0.75);
            margin-bottom:32px;
            font-size:14px;
        }
        .box {margin-bottom:22px;}
        label {
            display:block;
            margin-bottom:8px;
            color:#fff;
            font-weight:500;
        }
        /*输入框玻璃样式*/
        input, textarea {
            width:100%;
            padding:15px;
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:14px;
            color:#fff;
            font-size:15px;
            backdrop-filter: blur(6px);
            transition:0.3s;
        }
        input::placeholder,textarea::placeholder {
            color:rgba(255,255,255,0.55);
        }
        input:focus,textarea:focus {
            outline:none;
            border-color:rgba(255,255,255,0.6);
            background:rgba(255,255,255,0.18);
            box-shadow:0 0 12px rgba(255,255,255,0.15);
        }
        .btn-group {
            display:flex;
            gap:14px;
            margin:28px 0;
        }
        /*按钮玻璃特效*/
        button {
            flex:1;
            padding:16px;
            border:none;
            border-radius:14px;
            font-weight:600;
            color:#fff;
            cursor:pointer;
            backdrop-filter: blur(8px);
            border:1px solid rgba(255,255,255,0.2);
            transition:0.3s;
            position:relative;
            overflow:hidden;
        }
        button::after {
            content:"";
            position:absolute;
            left:-100%;top:0;
            width:100%;height:100%;
            background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
            transition:left 0.5s;
        }
        button:hover::after {left:100%;}
        button:nth-child(1){background:rgba(255,180,30,0.25);}
        button:nth-child(2){background:rgba(60,160,255,0.25);}
        button:nth-child(3){background:rgba(30,220,130,0.25);}
        button:hover {
            transform:translateY(-3px);
            box-shadow:0 8px 24px rgba(0,0,0,0.15);
            background:rgba(255,255,255,0.18);
        }
        #result {height:380px;resize:none;font-family:Consolas;line-height:1.7;}
        .tip {font-size:12px;color:rgba(255,255,255,0.6);margin-top:5px;}
    </style>
</head>

<body>
<canvas id="particles"></canvas>
<div class="container">
    <h1>🏫 教育装备 - 学校填报状态查询工具</h1>
    <p class="desc">功能：查询学校各表填报状态（纯查询，不修改任何数据）</p>

    <div class="box">
        <label>📅 年度版本（可直接修改）</label>
        <input type="text" id="year" value="2026" placeholder="请输入年份">
    </div>

    <div class="box">
        <label>🏫 单学校名称</label>
        <input type="text" id="singleSchool" placeholder="请输入学校全称，例如：准格尔旗大路第一小学">
        <div class="tip">生成单学校查询SQL</div>
    </div>

    <div class="box">
        <label>🏫🏫 多学校名称（一行一个）</label>
        <textarea id="multiSchool" placeholder="请输入多个学校名称，一行一个"></textarea>
        <div class="tip">生成多学校查询SQL</div>
    </div>

    <div class="btn-group">
        <button onclick="genSingleQuery()">🏫 生成【单学校查询】</button>
        <button onclick="genMultiQuery()">🏫🏫 生成【多学校查询】</button>
        <button onclick="copyResult()">📋 一键复制</button>
    </div>

    <div class="box">
        <label>📄 查询SQL结果（只读，安全）</label>
        <textarea id="result" placeholder="生成的SQL语句将显示在这里..."></textarea>
    </div>
</div>

<script>
//粒子动画
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let w,h,particles=[];
function resize(){
    w=canvas.width=innerWidth;
    h=canvas.height=innerHeight;
}
window.onresize=resize;resize();
class P{
    constructor(){
        this.x=Math.random()*w;
        this.y=Math.random()*h;
        this.r=Math.random()*2+0.5;
        this.sx=(Math.random()-0.5)*0.6;
        this.sy=(Math.random()-0.5)*0.6;
    }
    update(){
        this.x+=this.sx;this.y+=this.sy;
        if(this.x<0||this.x>w)this.sx*=-1;
        if(this.y<0||this.y>h)this.sy*=-1;
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.35)';
        ctx.fill();
    }
}
for(let i=0;i<90;i++) particles.push(new P());
function loop(){
    ctx.clearRect(0,0,w,h);
    particles.forEach(p=>{p.update();p.draw();})
    requestAnimationFrame(loop);
}
loop();

//原有业务JS不变
const tables = [
    "tbl_equ_two_ptjslbsb",
    "tbl_equ_two_ptjsjrcs",
    "tbl_equ_two_jsjjssb",
    "tbl_equ_two_ptjssszd",
    "tbl_equ_two_library_staff",
    "tbl_equ_two_electrifyed_status",
    "tbl_equ_two_library_build",
    "tbl_equ_two_laboratory_staff",
    "tbl_equ_two_laboratory_activity"
];

function getYear() {
    return document.getElementById('year').value || '2026';
}

function genSingleQuery() {
    const school = document.getElementById('singleSchool').value.trim();
    if (!school) { alert('请输入学校名称！'); return; }
    const year = getYear();
    const escSchool = school.replace(/'/g, "''");
    let sql = '';
    tables.forEach((t, i) => {
        sql += `-- 表${i+1} 查询 ${school} 填报状态
SELECT e.state, d.name AS 学校名称
FROM ${t} e
JOIN sys_user u ON u.id = e.create_by
JOIN sys_dept d ON u.dept_id = d.id
WHERE d.name = '${escSchool}' AND e.version = '${year}';

`;
    });
    document.getElementById('result').value = sql.trim();
}

function genMultiQuery() {
    const text = document.getElementById('multiSchool').value.trim();
    if (!text) { alert('请输入学校名称！'); return; }
    const schools = text.split('\n').map(s=>s.trim()).filter(s=>s);
    const year = getYear();
    const inStr = schools.map(s => `'${s.replace(/'/g, "''")}'`).join(',');
    let sql = '';
    tables.forEach((t, i) => {
        sql += `-- 表${i+1} 批量查询学校状态
SELECT e.state, d.name AS 学校名称
FROM ${t} e
JOIN sys_user u ON u.id = e.create_by
JOIN sys_dept d ON u.dept_id = d.id
WHERE d.name IN (${inStr}) AND e.version = '${year}';

`;
    });
    document.getElementById('result').value = sql.trim();
}

function copyResult() {
    const res = document.getElementById('result');
    if (!res.value) { alert('无内容'); return; }
    res.select();
    document.execCommand('copy');
    alert('复制成功！');
}
</script>
</body>
</html>
