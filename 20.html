<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>运维季度报告生成器</title>
<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
}
body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #e0e0e0;
}
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 30px;
  background: rgba(22, 33, 62, 0.7);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 1px rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}
h2 {
  text-align: center;
  color: #fff;
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(90deg, #72edf2, #5151e5, #ee00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.item {
  margin-bottom: 24px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #a0a0ff;
  font-size: 14px;
}
input, textarea {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 8px;
  font-size: 14px;
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  transition: all 0.3s ease;
}
select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(114, 237, 242, 0.5);
  border-radius: 8px;
  font-size: 14px;
  background: #1a1a2e;
  color: #ffffff;
  transition: all 0.3s ease;
}
select:focus {
  outline: none;
  border-color: #72edf2;
  box-shadow: 0 0 8px rgba(114, 237, 242, 0.5);
}
select option {
  background: #1a1a2e;
  color: #ffffff;
}
input:focus, textarea:focus {
  outline: none;
  border-color: #72edf2;
  box-shadow: 0 0 8px rgba(114, 237, 242, 0.5);
}
.date-row {
  display: flex;
  gap: 12px;
}
.date-row .item {
  flex: 1;
}
.btn-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.3s ease;
}
.btn-blue {
  background: linear-gradient(90deg, #5151e5, #72edf2);
  color: white;
}
.btn-blue:hover {
  box-shadow: 0 0 15px rgba(114, 237, 242, 0.6);
  transform: translateY(-2px);
}
.btn-green {
  background: linear-gradient(90deg, #00b894, #55efc4);
  color: white;
}
.btn-green:hover {
  box-shadow: 0 0 15px rgba(0, 184, 148, 0.6);
  transform: translateY(-2px);
}
.btn-gray {
  background: linear-gradient(90deg, #636e72, #b2bec3);
  color: white;
}
.btn-gray:hover {
  box-shadow: 0 0 15px rgba(99, 110, 114, 0.6);
  transform: translateY(-2px);
}
.btn-red {
  background: linear-gradient(90deg, #d63031, #ff7675);
  color: white;
}
.btn-red:hover {
  box-shadow: 0 0 15px rgba(214, 48, 49, 0.6);
  transform: translateY(-2px);
}
textarea {
  resize: vertical;
  min-height: 80px;
}
::placeholder {
  color: rgba(255, 255, 255, 0.5);
}
</style>
</head>
<body>
<div class="container">
  <h2>运维季度报告生成器</h2>

  <!-- 标题选择 单/多系统/自定义 -->
  <div class="item">
    <label>选择/自定义报告标题</label>
    <select id="titleSel">
      <option value="教育厅内蒙古基础教育大数据服务平台">教育厅内蒙古基础教育大数据服务平台</option>
      <option value="教育厅机关智能化管理平台、学生体质健康监测数据管理平台、民办机构管理系统运维服务">多系统模式</option>
      <option value="自定义">手动自定义输入</option>
    </select>
  </div>
  <div class="item" id="titleInputBox" style="display:none;">
    <input type="text" id="customTitle" placeholder="请手动输入报告主标题">
  </div>

  <!-- 季度起止日期 -->
  <div class="date-row">
    <div class="item">
      <label>季度开始日期</label>
      <input type="date" id="startDate">
    </div>
    <div class="item">
      <label>季度结束日期</label>
      <input type="date" id="endDate">
    </div>
  </div>

  <!-- 处理人（用于节假日保障表） -->
  <div class="item">
    <label>处理人（用于节假日保障表）</label>
    <input type="text" id="handler" placeholder="例如：乔鹏飞">
  </div>

  <!-- 服务事项明细（和月度表格逻辑完全一致） -->
  <div class="item">
    <label id="eventLabel">服务事项明细（粘贴字段：事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyEvent()">复制</button>
      <button class="btn-gray" onclick="cutEvent()">剪切</button>
      <button class="btn-red" onclick="clearEvent()">清空</button>
    </div>
    <textarea id="eventList" rows="6" placeholder="直接从Excel整行粘贴数据，填“无”=不生成表格"></textarea>
  </div>

  <!-- 漏洞修复明细 -->
  <div class="item">
    <label>漏洞修复明细（粘贴字段：序号、修复时间、漏洞修复内容、处理方式、处理人）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyBug()">复制</button>
      <button class="btn-gray" onclick="cutBug()">剪切</button>
      <button class="btn-red" onclick="clearBug()">清空</button>
    </div>
    <textarea id="bugList" rows="4" placeholder="直接从Excel整行粘贴数据，填“无”=显示无漏洞修复"></textarea>
  </div>

  <!-- 故障处理明细 -->
  <div class="item">
    <label>故障处理明细（粘贴字段：故障处理时间、系统、故障内容、处理方式、处理结果、处理人）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyFault()">复制</button>
      <button class="btn-gray" onclick="cutFault()">剪切</button>
      <button class="btn-red" onclick="clearFault()">清空</button>
    </div>
    <textarea id="faultList" rows="4" placeholder="直接从Excel整行粘贴数据，填“无”=显示0起故障"></textarea>
  </div>

  <!-- 需求处置明细 -->
  <div class="item">
    <label>需求处置明细（粘贴字段：序号、需求接收时间、需求内容、处理方式、处理结果）</label>
    <div class="btn-bar">
      <button class="btn-green" onclick="copyNeed()">复制</button>
      <button class="btn-gray" onclick="cutNeed()">剪切</button>
      <button class="btn-red" onclick="clearNeed()">清空</button>
    </div>
    <textarea id="needList" rows="4" placeholder="直接从Excel整行粘贴数据，填“无”=显示无需求处理"></textarea>
  </div>

  <div class="item" style="text-align:center;">
    <button class="btn-blue" onclick="generateAndExport()">生成并导出 Word 季度总结报告</button>
  </div>
</div>

<script>
const titleSel = document.getElementById('titleSel');
const titleInputBox = document.getElementById('titleInputBox');
const eventLabel = document.getElementById('eventLabel');

// 切换标题，同步字段提示（和月度逻辑一致）
function updateLabel() {
  let val = titleSel.value;
  titleInputBox.style.display = val === '自定义' ? 'block' : 'none';
  if (val === '自定义' || val.indexOf('、') > -1) {
    eventLabel.innerText = '服务事项明细（粘贴字段：系统名称、事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）';
  } else {
    eventLabel.innerText = '服务事项明细（粘贴字段：事件内容、问题分析、完成状态、服务对象、需求提出、处理日期、处理人）';
  }
}
titleSel.addEventListener('change', updateLabel);
updateLabel();

// 日期格式化：yyyy年mm月dd日
function fmt(dateStr){
  if(!dateStr) return '';
  let d = new Date(dateStr);
  let y = d.getFullYear();
  let m = String(d.getMonth() + 1).padStart(2, '0');
  let day = String(d.getDate()).padStart(2, '0');
  return `${y}年${m}月${day}日`;
}

// 获取季度连续三个月（用于安全审查表头）
function getQuarterThreeMonth(startDateStr){
  let d = new Date(startDateStr);
  let m1 = d.getMonth() + 1;
  let m2 = m1 + 1;
  let m3 = m1 + 2;
  return [`${m1}月`, `${m2}月`, `${m3}月`];
}

// 制表符分割Excel粘贴内容
function splitLine(str){
  return str.trim().split(/\t/);
}

// ========== 复制/剪切/清空 通用方法 ==========
function copyEvent(){let t=document.getElementById('eventList');t.select();document.execCommand('copy');alert('复制成功');}
function cutEvent(){let t=document.getElementById('eventList');t.select();document.execCommand('cut');alert('剪切成功');}
function clearEvent(){document.getElementById('eventList').value='';}

function copyBug(){let t=document.getElementById('bugList');t.select();document.execCommand('copy');alert('复制成功');}
function cutBug(){let t=document.getElementById('bugList');t.select();document.execCommand('cut');alert('剪切成功');}
function clearBug(){document.getElementById('bugList').value='';}

function copyFault(){let t=document.getElementById('faultList');t.select();document.execCommand('copy');alert('复制成功');}
function cutFault(){let t=document.getElementById('faultList');t.select();document.execCommand('cut');alert('剪切成功');}
function clearFault(){document.getElementById('faultList').value='';}

function copyNeed(){let t=document.getElementById('needList');t.select();document.execCommand('copy');alert('复制成功');}
function cutNeed(){let t=document.getElementById('needList');t.select();document.execCommand('cut');alert('剪切成功');}
function clearNeed(){document.getElementById('needList').value='';}

// 获取季度包含的月份
function getMonth(d) {
  return new Date(d).getMonth() + 1;
}

function getHolidays(start, end) {
  let m1 = getMonth(start);
  let list = [];
  if (m1 === 1) list.push({ month: '1月', name: '元旦', time: '1月1日' });
  if (m1 === 4 || m1 === 2 || m1 === 3) list.push({ month: '4月', name: '清明', time: '4月5日' });
  if (m1 === 5) list.push({ month: '5月', name: '劳动节', time: '5月1日-5月5日' });
  if (m1 === 6) list.push({ month: '6月', name: '端午', time: '6月10日' });
  if (m1 === 7 || m1 === 8) list.push({ month: '7月', name: '暑假' },{ month:'8月',name:'暑假' });
  if (m1 === 9) list.push({ month:'9月',name:'中秋' });
  if (m1 === 10) list.push({ month:'10月',name:'国庆',time:'10月1日-10月7日' });
  return list;
}

// ========== 核心生成导出 ==========
function generateAndExport(){
  // 1. 基础信息
  let titleSelVal = titleSel.value;
  let mainTitle = titleSelVal === '自定义' ? document.getElementById('customTitle').value.trim() : titleSelVal;
  const isMultiSys = (titleSelVal === '自定义') || (mainTitle.indexOf('、') > -1);
  let sysShort = mainTitle.includes('基础教育大数据') ? '基础教育大数据系统' : mainTitle;

  let startDate = document.getElementById('startDate').value;
  let endDate = document.getElementById('endDate').value;
  let startStr = fmt(startDate);
  let endStr = fmt(endDate);
  let periodStr = `（${startStr}-${endStr}）`;
  let [mon1, mon2, mon3] = getQuarterThreeMonth(startDate);
  let year = startStr.substring(0, 4);
  let handler = document.getElementById('handler').value || '运维人员';

  // 报告主标题
  let docTitle = `${mainTitle}${year}年${mon1}-${mon3}季度总结报告`;

  // 2. 服务事项明细（完全沿用月度表格逻辑）
  let eventText = document.getElementById('eventList').value.trim();
  let eventLines = eventText === '无' ? [] : eventText.split('\n').filter(item => item.trim());
  let serviceTotal = eventLines.length;
  let eventHtml = '';
  if (eventText !== '无') {
    eventLines.forEach((line, idx) => {
      let arr = splitLine(line);
      let xh = idx + 1;
      if(isMultiSys){
        let sys = arr[0] || '';
        let content = arr[1] || '';
        let status = arr[3] || '';
        let obj = arr[4] || '';
        let req = arr[5] || '';
        let dealDate = arr[6] || '';
        let dealUser = arr[7] || '';
        eventHtml += `<tr>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xh}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${sys}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${content}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${status}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${obj}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${req}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dealDate}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dealUser}</td>
        </tr>`;
      }else{
        let content = arr[0] || '';
        let status = arr[2] || '';
        let obj = arr[3] || '';
        let req = arr[4] || '';
        let dealDate = arr[5] || '';
        let dealUser = arr[6] || '';
        eventHtml += `<tr>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${xh}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${content}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${status}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${obj}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${req}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dealDate}</td>
          <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${dealUser}</td>
        </tr>`;
      }
    });
  }
  let eventThead = isMultiSys
    ? `<tr><th>序号</th><th>系统名称</th><th>事件内容</th><th>完成状态</th><th>服务对象</th><th>需求提出</th><th>处理日期</th><th>处理人</th></tr>`
    : `<tr><th>序号</th><th>事件内容</th><th>完成状态</th><th>服务对象</th><th>需求提出</th><th>处理日期</th><th>处理人</th></tr>`;

  // 3. 漏洞修复明细
  let bugText = document.getElementById('bugList').value.trim();
  let bugLines = bugText === '无' ? [] : bugText.split('\n').filter(item => item.trim());
  let bugTotal = bugLines.length;
  let bugHtml = '';
  if (bugText !== '无') {
    bugLines.forEach(line => {
      let arr = splitLine(line);
      bugHtml += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[0]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[1]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[2]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[3]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[4]||''}</td>
      </tr>`;
    });
  }

  // 4. 故障处理明细
  let faultText = document.getElementById('faultList').value.trim();
  let faultLines = faultText === '无' ? [] : faultText.split('\n').filter(item => item.trim());
  let faultTotal = faultLines.length;
  let faultHtml = '';
  if (faultText !== '无') {
    faultLines.forEach(line => {
      let arr = splitLine(line);
      faultHtml += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[0]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[1]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[2]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[3]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[4]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[5]||''}</td>
      </tr>`;
    });
  }

  // 5. 需求处置明细
  let needText = document.getElementById('needList').value.trim();
  let needLines = needText === '无' ? [] : needText.split('\n').filter(item => item.trim());
  let needTotal = needLines.length;
  let needHtml = '';
  if (needText !== '无') {
    needLines.forEach(line => {
      let arr = splitLine(line);
      needHtml += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[0]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[1]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[2]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[3]||''}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${arr[4]||''}</td>
      </tr>`;
    });
  }

  // 节假日保障
  let holidays = getHolidays(startDate, endDate);
  let hasHoliday = holidays.length > 0;
  let holidayText = '';
  let holidayTable = '';
  if (hasHoliday) {
    let names = holidays.map(h => h.month + h.name + '假期').join('、');
    holidayText = `<p>本季度${names}期间，${sysShort}开展运行保障工作，保障覆盖率100%。</p>`;
    holidayTable = `<table>
    <tr><th>保障时间</th><th>系统</th><th>保障内容</th><th>处理人</th></tr>`;
    holidays.forEach(h => {
      holidayTable += `<tr>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${h.time || h.month + h.name + '假期'}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${mainTitle}</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">系统运行监控与运维</td>
        <td style="border:1px solid #333;padding:6px;font-family:宋体;font-size:11pt;text-align:center;">${handler}</td>
      </tr>`;
    });
    holidayTable += `</table>`;
  } else {
    holidayText = `<p>本季度无节假日专项保障需求。</p>`;
  }

  // 6. 拼接Word文档HTML（字体、字号、缩进完全对标原月度模板，强制打印视图）
  let wordHtml = `<!DOCTYPE html>
<html
xmlns:v="urn:schemas-microsoft-com:vml"
xmlns:o="urn:schemas-microsoft-com:office:office"
xmlns:w="urn:schemas-microsoft-com:office:word"
xmlns:m="http://schemas.microsoft.com/office/2004/12/omml"
xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<![if gte mso 9]><xml>
<w:WordDocument>
  <w:View>Print</w:View>
  <w:Zoom>100</w:Zoom>
  <w:TrackMoves/>
  <w:TrackFormatting/>
</w:WordDocument>
</xml><![endif]>
<style>
body{margin:0;padding:20px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
.main-title-line1, .main-title-line2{
  font-family:"方正小标宋简体";
  font-size:22pt;
  font-weight:normal;
  text-align:center;
}
.main-title-line1{
  margin-bottom:5px;
}
.main-title-line2{
  margin-bottom:20px;
}
.main-content p{
  font-family:"仿宋";
  font-size:16pt;
  line-height:1.5;
  text-indent:2em;
  margin:0 0 8px 0;
}
.sub-title{
  font-family:"黑体";
  font-size:16pt;
  font-weight:normal;
  margin:15px 0 8px 0;
  text-indent:0;
}
.thr-title{
